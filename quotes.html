                </div>
            </div>

                        <option value="Off-Grid (Battery Backup)">Off-Grid (Battery Backup)</option>
                        <option value="Hybrid System">Hybrid System</option>
                    </select>
                </div>
                <div class="col-span-2">
                    <label>Subsidy Status</label>
                    <select id="subsidyType" class="w-full p-3 rounded-xl mt-1">
                        <option value="Subsidy Plant (PM Surya Ghar)">Subsidy Plant (PM Surya Ghar)</option>
                        <option value="Non-Subsidy Plant">Non-Subsidy Plant</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- Technical Specifications -->
        <div class="glass-card p-6 rounded-3xl space-y-4">
            <h2 class="text-sm font-bold text-orange-500 uppercase tracking-wider border-b border-white/10 pb-2">Technical Specifications</h2>
            <div class="grid grid-cols-2 gap-4">

                <div class="col-span-2">
                    <label>Inverter Make</label>
                    <select id="invName" class="w-full p-3 rounded-xl mt-1" onchange="toggleOther('invName', 'invNameOther')">
                        <option value="">Select Inverter Make</option>
                        <option value="VSOLE">VSOLE</option>
                        <option value="TATA KIT">TATA KIT</option>
                        <option value="Growatt">Growatt</option>
                        <option value="Sungrow">Sungrow</option>
                        <option value="Sofar Solar">Sofar Solar</option>
                        <option value="Waaree">Waaree</option>
                        <option value="Solis">Solis</option>
                        <option value="GoodWe">GoodWe</option>
                        <option value="Luminous">Luminous</option>

                        <option value="Fronius">Fronius</option>
                        <option value="Enphase">Enphase (Microinverter)</option>
                        <option value="Havells">Havells</option>
                        <option value="Polycab">Polycab</option>

                    <input type="text" id="invNameOther" class="w-full p-3 rounded-xl mt-2 hidden-input" placeholder="Type custom inverter name...">

                <!-- Panels -->

                    <label>Panel Make</label>
                    <select id="panelName" class="w-full p-3 rounded-xl mt-1" onchange="toggleOther('panelName', 'panelNameOther')">

                        <option value="Emmvee">Emmvee Solar</option>

                    </select>
                    <input type="text" id="panelNameOther" class="w-full p-3 rounded-xl mt-2 hidden-input" placeholder="Type custom panel name...">

                    <label>Panel Type</label>
                    <select id="panelType" class="w-full p-3 rounded-xl mt-1">
                        <option value="">Select Panel Type</option>
                        <option value="Bifacial (BI)">Bifacial (BI)</option>

                <div class="col-span-2">
                    <label class="text-emerald-400">Total Plant Capacity (kW) - Auto</label>
                    <input type="text" id="plantCap" class="w-full p-3 rounded-xl mt-1 font-bold bg-white/10" placeholder="0 kW" readonly>

                <!-- Structure & BOS -->
                <div class="mt-4 col-span-2">

                    <select id="structType" class="w-full p-3 rounded-xl mt-1" onchange="toggleOther('structType', 'structTypeOther')">

                    </select>
                    <input type="text" id="structTypeOther" class="w-full p-3 rounded-xl mt-2 hidden-input" placeholder="Type custom structure type...">
                </div>
                <div class="col-span-2">
                    <label>Structure Cap. (kW)</label>
                    <input type="text" id="structCap" class="w-full p-3 rounded-xl mt-1" placeholder="e.g. 5">
                </div>
                <div class="col-span-2">
                    <label>Pipe Dimensions</label>
                    <select id="pipeDim" class="w-full p-3 rounded-xl mt-1" onchange="toggleOther('pipeDim', 'pipeDimOther')">
                        <option value="">Select Pipe Dimensions</option>
                        <option value="75mm x 75mm , 40mm x 40mm , 60mm x 40mm">75mm x 75mm , 40mm x 40mm , 60mm x 40mm</option>
                        <option value="Standard">Standard </option>
                        <option value="Mono Rail">Mono Rail</option>
                        <option value="Standard with DBL PURLIN">Standard with DBL PURLIN</option>

                <div class="col-span-2 mt-4">

                    <select id="meters" class="w-full p-3 rounded-xl mt-1" onchange="toggleOther('meters', 'metersOther')">
                        <option value="">Select Meters</option>
                        <option value="Net Meter Only L&T/SECURE/AVON AS AVAILABLE">Net Meter Only</option>
                        <option value="Solar Meter Only L&T/SECURE/AVON AS AVAILABLE">Solar Meter Only</option>
                        <option value="Net Meter + Solar Meter L&T/SECURE/AVON AS AVAILABLE">Net Meter + Solar Meter</option>

                        <option value="4 sqmm DC / Al service cable as required">4 sqmm DC / Al Service Cable as required</option>
                        <option value="6 sqmm DC / 6 sqmm AC (Polycab/Havells/Finolex)">6 sqmm DC / 6 sqmm AC (Polycab/Havells)</option>
                        <option value="10 sqmm DC / 10 sqmm AC (Polycab/Havells/Finolex)">10 sqmm DC / 10 sqmm AC (Polycab/Havells)</option>

                <div class="col-span-2">

        <!-- Pricing & Notes -->

            <div class="grid grid-cols-1 gap-4">
                <div>

                    <input type="number" id="projCost" class="w-full p-3 rounded-xl mt-1 font-bold text-lg" placeholder="Enter Total Amount">

        <div class="grid grid-cols-1 gap-4">
            <button onclick="saveToCloud()" id="saveBtn" class="w-full bg-blue-600 hover:bg-blue-500 text-white py-4 rounded-2xl font-bold uppercase tracking-wider flex items-center justify-center gap-3 shadow-lg transition-colors">

            </button>
            <button onclick="sendWhatsApp()" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white py-4 rounded-2xl font-bold uppercase tracking-wider flex items-center justify-center gap-3 shadow-lg transition-colors">
                <i data-lucide="message-circle"></i> Send WhatsApp

            <button onclick="makePDF()" class="w-full bg-orange-600 hover:bg-orange-500 text-white py-4 rounded-2xl font-bold uppercase tracking-wider flex items-center justify-center gap-3 shadow-lg transition-colors">

    <!-- Search Modal -->
    <div id="searchModal" class="hidden fixed inset-0 bg-black/90 z-50 p-4 overflow-y-auto">
        <div class="max-w-xl mx-auto pt-10">
            <div class="flex items-center justify-between mb-6">
                <h2 class="text-2xl font-bold text-orange-500">Search Database</h2>
                <button onclick="toggleSearchModal()" class="p-2 bg-white/10 rounded-full hover:bg-white/20">
                    <i data-lucide="x" class="text-white w-6 h-6"></i>
                </button>

            <div class="flex gap-2 mb-6">
                <input type="text" id="searchInput" class="flex-1 p-4 rounded-xl" placeholder="Search by Name or Mobile...">
                <button onclick="searchDatabase()" id="searchBtn" class="bg-orange-600 px-6 rounded-xl font-bold flex items-center justify-center">

    <!-- Preloading the logo for PDF -->
    <img id="logoImg" src="udbhav.jpg" style="display:none;" crossorigin="anonymous">

    <script>
        // ==========================================
        // PASTE YOUR GOOGLE APPS SCRIPT WEB APP URL HERE
        // ==========================================
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycby41rmQZO1Ebt7uRCDFf5enwcsme203ZCfNaUMBos0Gm52X2ILfhoZxm_F_gbY77gNNTA/exec';

        // Initialize Lucide icons
        lucide.createIcons();

        // Set default date to today
        document.getElementById('quoteDate').valueAsDate = new Date();

        // Function to show/hide the "Other" input box
        function toggleOther(selectId, inputId) {
            const selectEl = document.getElementById(selectId);
            const inputEl = document.getElementById(inputId);
            if (selectEl.value === 'OTHER') {
                inputEl.style.display = 'block';
            } else {
                inputEl.style.display = 'none';
                inputEl.value = ''; // clear out the text if they switch back
            }
        }

        // Helper to get final value (Select or Custom Text)
        function getFinalValue(selectId, inputId) {
            const selectEl = document.getElementById(selectId);
            if (!selectEl) return '-';
            
            if (selectEl.value === 'OTHER') {
                const inputEl = document.getElementById(inputId);
                return inputEl && inputEl.value.trim() !== '' ? inputEl.value : 'Not Specified';
            }
            return selectEl.value || '-';
        }

        // Auto calculate plant capacity
        function calculatePlantCap() {
            const count = parseFloat(document.getElementById('panelCount').value) || 0;
            const capW = parseFloat(document.getElementById('panelCap').value) || 0;
            const totalKW = (count * capW) / 1000;
            document.getElementById('plantCap').value = totalKW > 0 ? totalKW.toFixed(2) : '';
        }

        function formatKW(val) {
            if (!val || val === '-') return "-";
            let clean = val.toString().trim().toUpperCase();
            clean = clean.replace(/\s*KW$/, "");
            return clean + " kW";
        }

        function getQuoteData() {
            return {
                date: document.getElementById('quoteDate').value,
                name: document.getElementById('custName').value,
                mobile: document.getElementById('custMobile').value,
                address: document.getElementById('custAddress').value,
                gridType: document.getElementById('gridType').value || '-',
                subsidyType: document.getElementById('subsidyType').value || '-',
                
                invName: getFinalValue('invName', 'invNameOther'),
                invCap: formatKW(document.getElementById('invCap').value),
                invPhase: document.getElementById('invPhase').value || '-',
                
                panelName: getFinalValue('panelName', 'panelNameOther'),
                panelType: document.getElementById('panelType').value || '-',
                dcrSpec: document.getElementById('dcrSpec').value || '-',
                panelCount: document.getElementById('panelCount').value || '0',
                panelCap: document.getElementById('panelCap').value || '0',
                plantCap: formatKW(document.getElementById('plantCap').value),
                
                structType: getFinalValue('structType', 'structTypeOther'),
                structCap: formatKW(document.getElementById('structCap').value),
                pipeDim: getFinalValue('pipeDim', 'pipeDimOther'),
                
                meters: getFinalValue('meters', 'metersOther'),
                wires: getFinalValue('wires', 'wiresOther'),
                
                earthing: document.getElementById('earthing').value || '-',
                conduits: document.getElementById('conduits').value || '-',
                
                cost: document.getElementById('projCost').value || '0',
                comments: document.getElementById('comments').value || ''
            };
        }

        // --- NEW CLOUD DATABASE FUNCTIONS ---

        async function saveToCloud() {
            if (!SCRIPT_URL.includes("script.google.com")) {
                alert("Please add your Google Apps Script Web App URL in the HTML code.");
                return;
            }

            const d = getQuoteData();
            if (!d.name || !d.mobile) {
                alert("Customer Name and Mobile Number are required to save.");
                return;
            }

            const btn = document.getElementById('saveBtn');
            const originalHTML = btn.innerHTML;
            btn.innerHTML = '<i data-lucide="loader-2" class="animate-spin w-5 h-5"></i> Saving...';
            btn.disabled = true;
            lucide.createIcons();

            try {
                const response = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    // Using text/plain circumvents strict CORS preflight checks in Apps Script
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify(d)
                });
                const result = await response.json();
                
                if (result.status === 'success') {
                    alert('Quote saved to Google Drive successfully!');
                } else {
                    alert('Error saving data: ' + result.message);
                }
            } catch (error) {
                console.error("Save Error:", error);
                alert("Failed to save data. Check your internet connection or script URL.");
            }

            btn.innerHTML = originalHTML;
            btn.disabled = false;
            lucide.createIcons();
        }

        function toggleSearchModal() {
            const modal = document.getElementById('searchModal');
            if (modal.classList.contains('hidden')) {
                modal.classList.remove('hidden');
                document.getElementById('searchInput').focus();
            } else {
                modal.classList.add('hidden');
                document.getElementById('searchResults').innerHTML = '';
                document.getElementById('searchInput').value = '';
            }
        }

        async function searchDatabase() {
            if (!SCRIPT_URL.includes("script.google.com")) {
                alert("Please add your Google Apps Script Web App URL.");
                return;
            }

            const query = document.getElementById('searchInput').value.trim();
            if (!query) return;

            const resultsContainer = document.getElementById('searchResults');
            const searchBtn = document.getElementById('searchBtn');
            const originalBtnHTML = searchBtn.innerHTML;

            searchBtn.innerHTML = '<i data-lucide="loader-2" class="animate-spin w-5 h-5 text-white"></i>';
            searchBtn.disabled = true;
            lucide.createIcons();
            
            resultsContainer.innerHTML = '<p class="text-center text-gray-400 py-4">Searching database...</p>';

            try {
                const response = await fetch(`${SCRIPT_URL}?query=${encodeURIComponent(query)}`);
                const results = await response.json();

                if (results.length === 0) {
                    resultsContainer.innerHTML = '<p class="text-center text-gray-400 py-4">No results found for "' + query + '"</p>';
                } else {
                    let html = '';
                    results.forEach(res => {
                        html += `
                        <div class="glass-card p-5 rounded-2xl border border-white/10 space-y-2 relative overflow-hidden">
                            <div class="absolute top-0 right-0 bg-white/10 px-3 py-1 rounded-bl-xl text-xs font-bold text-gray-300">
                                ${res.date || 'No Date'}
                            </div>
                            <h3 class="text-lg font-bold text-white uppercase">${res.name || 'N/A'}</h3>
                            <p class="text-sm text-gray-300"><strong class="text-orange-400 uppercase text-xs">Mobile:</strong> ${res.mobile || 'N/A'}</p>
                            <p class="text-sm text-gray-300"><strong class="text-orange-400 uppercase text-xs">Plant Specs:</strong> ${res.plantCap} | ${res.gridType}</p>
                            <p class="text-sm text-gray-300"><strong class="text-orange-400 uppercase text-xs">Total Cost:</strong> ₹${res.cost ? parseFloat(res.cost).toLocaleString('en-IN') : '0'}</p>
                            <p class="text-sm text-gray-300"><strong class="text-orange-400 uppercase text-xs">Address:</strong> ${res.address || 'N/A'}</p>
                        </div>`;
                    });
                    resultsContainer.innerHTML = html;
                }
            } catch (error) {
                console.error("Search Error:", error);
                resultsContainer.innerHTML = '<p class="text-center text-red-400 py-4">Error fetching search results.</p>';
            }

            searchBtn.innerHTML = originalBtnHTML;
            searchBtn.disabled = false;
            lucide.createIcons();
        }

        // --- ORIGINAL FUNCTIONS (INTACT) ---

        function sendWhatsApp() {
            const d = getQuoteData();
            if(!d.mobile) { alert("Please enter mobile number"); return; }
            
            const message = `*SOLAR QUOTATION FROM UDBHAV SOLAR SOLUTIONS*%0A%0A` +
                `*Customer:* ${d.name}%0A` +
                `*Address:* ${d.address}%0A%0A` +
                `*Project Type:* ${d.gridType} (${d.subsidyType})%0A%0A` +
                `*System Details:*%0A` +
                `- Inverter: ${d.invName} (${d.invCap}, ${d.invPhase})%0A` +
                `- Panels: ${d.panelName} ${d.panelType} [${d.dcrSpec}]%0A` +
                `- Config: ${d.panelCount} Nos of ${d.panelCap}W%0A` +
                `- Plant Capacity: ${d.plantCap}%0A` +
                `- Structure: ${d.structType} (${d.structCap})%0A` +
                `- Meters: ${d.meters}%0A` +
                `- Wires: ${d.wires}%0A%0A` +
                `*Total Project Cost: ₹${parseFloat(d.cost).toLocaleString('en-IN')}*%0A%0A` +
                `Visit us: WWW.USSGREEN.IN.NET`;
            
            const url = `https://wa.me/91${d.mobile}?text=${message}`;
            window.open(url, '_blank');
        }

        async function makePDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            const d = getQuoteData();
            
            if(!d.name || !d.mobile) { 
                alert("Please enter a name and mobile number"); 
                return; 
            }

            const navy = [15, 23, 42];
            const solarOrange = [249, 115, 22];
            const textGray = [71, 85, 105];
            const pageHeight = doc.internal.pageSize.height;

            // 1. HEADER
            doc.setFillColor(solarOrange[0], solarOrange[1], solarOrange[2]);
            doc.rect(0, 0, 210, 5, 'F');

            const logo = document.getElementById('logoImg');
            try {
                const canvas = document.createElement("canvas");
                canvas.width = logo.naturalWidth || 500;
                canvas.height = logo.naturalHeight || 400;
                const ctx = canvas.getContext("2d");
                ctx.drawImage(logo, 0, 0);
                const logoData = canvas.toDataURL("image/jpeg");
                doc.addImage(logoData, 'JPEG', 15, 12, 75, 35);
            } catch (e) {
                doc.setTextColor(navy[0], navy[1], navy[2]);
                doc.setFontSize(22);
                doc.setFont("helvetica", "bold");
                doc.text("UDBHAV SOLAR ", 15, 30);
            }

            // Company Info
            doc.setTextColor(navy[0], navy[1], navy[2]);
            doc.setFont("helvetica", "bold");
            doc.setFontSize(18);
            doc.text("UDBHAV SOLAR SOLUTIONS", 95, 25);
            

            doc.setFontSize(9);
            doc.setFont("helvetica", "normal");
            doc.setTextColor(textGray[0], textGray[1], textGray[2]);
            doc.text(" (IN PARTNERSHIP WITH SAURON ENERGY)", 95, 28);
            doc.text("Shop No. 2, Dumada, Ajmer, Rajasthan ", 95, 32);
            doc.text("Phone: +91 9660711101", 95, 37);
            doc.text("Web: www.ussgreen.in.net (IN PARTNERSHIP WITH SAURON ENERGY)", 95, 42);

            doc.setDrawColor(226, 232, 240);
            doc.line(15, 50, 195, 50);

            // 2. DOCUMENT INFO
            doc.setTextColor(navy[0], navy[1], navy[2]);
            doc.setFontSize(16);
            doc.setFont("helvetica", "bold");
            doc.text("SOLAR QUOTATION", 15, 65);

            doc.setFontSize(9);
            doc.setFont("helvetica", "normal");
            doc.setTextColor(textGray[0], textGray[1], textGray[2]);
            
            const dateObj = new Date(d.date || new Date());
            const formattedDate = dateObj.toLocaleDateString('en-IN', { day: '2-digit', month: 'long', year: 'numeric' });
            
            // GENERATE DYNAMIC REFERENCE NUMBER: USS/YYYY/MM/DDHHMM
            const now = new Date();
            const yyyy = now.getFullYear();
            const mm = String(now.getMonth() + 1).padStart(2, '0');
            const dd = String(now.getDate()).padStart(2, '0');
            const hh = String(now.getHours()).padStart(2, '0');
            const mins = String(now.getMinutes()).padStart(2, '0');
            const refString = `USS/${yyyy}/${mm}/${dd}${hh}${mins}`;
            
            doc.text(`DATE: ${formattedDate}`, 155, 65);
            doc.text(`REF: ${refString}`, 155, 70);

            // Bill To
            doc.autoTable({
                startY: 75,
                margin: { left: 15, right: 15 },
                head: [['BILL TO']],
                body: [[`${d.name}`], [`${d.mobile}`], [`${d.address}`]],
                theme: 'plain',
                headStyles: { fillColor: [241, 245, 249], textColor: navy, fontStyle: 'bold', fontSize: 9 },
                bodyStyles: { fontSize: 9, cellPadding: 1.5, textColor: textGray }
            });

            // 3. SPECIFICATIONS
            doc.setTextColor(navy[0], navy[1], navy[2]);
            doc.setFontSize(11);
            doc.setFont("helvetica", "bold");
            doc.text("TECHNICAL SPECIFICATIONS", 15, doc.lastAutoTable.finalY + 10);

            doc.autoTable({
                startY: doc.lastAutoTable.finalY + 14,
                margin: { left: 15, right: 15 },
                head: [['#', 'ITEM DESCRIPTION', 'SPECIFICATION']],
                body: [
                    ['1', 'Project Grid Category', d.gridType],
                    ['2', 'Subsidy Category', d.subsidyType],
                    ['3', 'Solar Inverter Unit', `${d.invName} (${d.invCap}) - ${d.invPhase}`],
                    ['4', 'Solar PV Modules', `${d.panelName} - ${d.panelType} (${d.dcrSpec})`],
                    ['5', 'Panel Configuration', `${d.panelCount} Nos x ${d.panelCap} Watts`],
                    ['6', 'Installed Plant Capacity', d.plantCap],
                    ['7', 'Mounting Structure', `${d.structType} (${d.structCap})`],
                    ['8', 'Structure Pipe Dims', d.pipeDim],
                    ['9', 'Earthing & Protection', d.earthing],
                    ['10', 'Conduit System', d.conduits],
                    ['11', 'Metering Equipment', d.meters],
                    ['12', 'Wiring Type & Specs', d.wires]
                ],
                theme: 'grid',
                headStyles: { fillColor: navy, textColor: [255, 255, 255], fontStyle: 'bold', fontSize: 9 },
                bodyStyles: { fontSize: 9, cellPadding: 3, textColor: navy },
                columnStyles: { 0: { cellWidth: 10, halign: 'center' }, 1: { fontStyle: 'bold' } }
            });

            let currentY = doc.lastAutoTable.finalY + 10;

            // 4. COMMENTS (If Any)
            if (d.comments.trim() !== '') {
                if (currentY + 25 > pageHeight) {
                    doc.addPage();
                    currentY = 20;
                }
                
                doc.setTextColor(navy[0], navy[1], navy[2]);
                doc.setFontSize(9);
                doc.setFont("helvetica", "bold");
                doc.text("NOTES & COMMENTS", 15, currentY);
                
                doc.setFont("helvetica", "normal");
                doc.setFontSize(8);
                doc.setTextColor(textGray[0], textGray[1], textGray[2]);
                
                const splitComments = doc.splitTextToSize(d.comments, 180);
                doc.text(splitComments, 15, currentY + 6);
                
                currentY += (splitComments.length * 4) + 10;
            }

            // PAGE BREAK CHECK BEFORE TOTAL & T&C
            if (currentY + 75 > pageHeight) {
                doc.addPage();
                currentY = 20; 
            }

            // 5. TOTAL
            doc.setFillColor(navy[0], navy[1], navy[2]);
            doc.rect(130, currentY, 65, 20, 'F');
            doc.setTextColor(255, 255, 255);
            doc.setFontSize(10);
            doc.text("GRAND TOTAL", 135, currentY + 7);
            doc.setFontSize(14);
            doc.setFont("helvetica", "bold");
            doc.text(`INR ${parseFloat(d.cost).toLocaleString('en-IN')}/-`, 135, currentY + 15);

            // 6. TERMS & CONDITIONS
            const tcY = currentY + 30; 
            doc.setTextColor(navy[0], navy[1], navy[2]);
            doc.setFontSize(9);
            doc.setFont("helvetica", "bold");
            doc.text("TERMS & CONDITIONS", 15, tcY);
            
            doc.setFont("helvetica", "normal");
            doc.setFontSize(8);
            doc.setTextColor(textGray[0], textGray[1], textGray[2]);
            doc.text("1. This quotation is valid for 15 days from the date of issue.", 15, tcY + 6);
            doc.text("2. Payment Terms: 90% advance, 5% after installation completion , 5% after net metering. For Loan terms refer to work order", 15, tcY + 11);
            doc.text("3. Any civil work, roof modifications, or strengthening are not included unless specified.", 15, tcY + 16);
            doc.text("4. Udbhav Solar is responsible for standard installation as per safety guidelines.", 15, tcY + 21);
            doc.text("5. Warranty on solar panels, inverter, and other components is subject to OEM policies.", 15, tcY + 26);
            doc.text("6. Net metering process time depends on local DISCOM authority approvals.", 15, tcY + 31);

            // Signature
            doc.setDrawColor(navy[0], navy[1], navy[2]);
            doc.line(140, pageHeight - 35, 195, pageHeight - 35);
            doc.setTextColor(navy[0], navy[1], navy[2]);
            doc.setFontSize(10);
            doc.text("Authorized Signatory", 145, pageHeight - 30);

            // Footer
            doc.setFillColor(248, 250, 252);
            doc.rect(0, pageHeight - 12, 210, 12, 'F');
            doc.setTextColor(textGray[0], textGray[1], textGray[2]);
            doc.setFontSize(8);
            doc.text("Official Quote from UDBHAV SOLAR SOLUTIONS.", 105, pageHeight - 5, { align: "center" });

            const pdfBase64 = doc.output('datauristring');
            if (window.AndroidInterface) {
                window.AndroidInterface.saveAndSharePDF(pdfBase64, d.name, d.mobile);
            } else {
                doc.save(`Quote_${d.name}.pdf`);
            }
        }
    </script>
