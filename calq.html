    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Udbhav Solar Solution | Pro Calculator & Quoter</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --solar-black: #020617; --solar-orange: #f97316; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--solar-black); color: #f8fafc; padding-bottom: 140px; min-height: 100vh; }

        .bg-mesh {
            background-color: #020617;
            background-image:
                radial-gradient(at 0% 0%, hsla(222,47%,11%,1) 0, transparent 50%),
                radial-gradient(at 50% 0%, hsla(217,91%,60%,0.15) 0, transparent 50%),
                radial-gradient(at 100% 0%, hsla(25,95%,53%,0.1) 0, transparent 50%);
            background-attachment: fixed;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
        }

        .input-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 18px; 
            padding: 12px 16px; 
            margin-bottom: 12px;
            transition: all 0.2s ease;
        }
        .input-card:focus-within {
            border-color: var(--solar-orange);
            background: rgba(249, 115, 22, 0.05);
            box-shadow: 0 0 0 1px rgba(249, 115, 22, 0.3);
        }

        label { font-size: 10px; font-weight: 800; color: #94a3b8; text-transform: uppercase; display: block; margin-bottom: 4px; letter-spacing: 0.05em; }
        select, input { background: transparent; border: none; width: 100%; font-size: 16px; font-weight: 700; color: white; outline: none; }
        option { background: #0f172a; color: white; }
        
        input::placeholder { color: #475569; font-weight: 600; }

        .mode-btn { transition: all 0.3s ease; border-radius: 12px; font-weight: 800; color: #64748b; }
        .mode-active { 
            background: var(--solar-orange) !important;
            color: white !important;
            box-shadow: 0 0 20px rgba(249, 115, 22, 0.2);
        }

        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0, 0, 0, 0.85); z-index: 1000; backdrop-filter: blur(12px); padding: 20px; overflow-y: auto; }
        .diag-item { background: rgba(255, 255, 255, 0.05); padding: 12px; border-radius: 14px; border: 1px solid rgba(255, 255, 255, 0.1); }
        .diag-item span { display: block; font-size: 9px; font-weight: 800; color: #64748b; text-transform: uppercase; }
        .diag-item b { font-size: 15px; color: white; }

        .step-section { display: none; }
        .step-section.visible { display: block; animation: fadeIn 0.4s ease forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-mesh">

    <!-- Header Section -->
    <header class="p-6">
        <div class="max-w-xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-4">
                <div class="w-14 h-14 bg-slate-900 rounded-2xl border-2 border-orange-500 overflow-hidden shadow-lg shadow-orange-500/20">
                    <img src="udbhav.jpg" alt="Logo" class="w-full h-full object-cover">
                </div>
                <div>
                    <h1 class="text-2xl font-black text-white leading-none tracking-tight">UDBHAV</h1>
                    <p class="text-[10px] font-bold text-orange-500 uppercase tracking-[0.3em]">Solar Calculator</p>
                </div>
            </div>
            <button onclick="toggleAdmin(true)" class="w-12 h-12 bg-white/5 backdrop-blur-md rounded-2xl flex items-center justify-center text-white border border-white/10 hover:bg-orange-500 transition-all">
                <i data-lucide="settings"></i>
            </button>
        </div>
    </header>

    <!-- Main Calculator Inputs -->
    <main class="max-w-xl mx-auto p-4">
        <div class="flex gap-2 mb-8 p-1.5 bg-white/5 border border-white/10 rounded-2xl backdrop-blur-sm">
            <button id="btnStandard" onclick="setMode('standard')" class="mode-btn mode-active flex-1 py-3 text-xs tracking-widest">STANDARD</button>
            <button id="btnKit" onclick="setMode('kit')" class="mode-btn flex-1 py-3 text-xs tracking-widest">KIT MODE</button>
        </div>

        <div class="glass-card p-6">
            <!-- Kit Mode Section -->
            <div id="sec-kit" class="step-section">
                <label>Kit Configuration</label>
                <div class="input-card">
                    <select id="kitBrand">
                        <option>Tata Power Solutions</option>
                        <option>Waaree Energies</option>
                        <option>Premier Solar</option>
                    </select>
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div class="input-card"><label>Kit Rate</label><input type="number" id="k1" placeholder="₹" oninput="runCalculations()"></div>
                    <div class="input-card"><label>System kW</label><input type="number" id="d1" placeholder="kW" oninput="runCalculations()"></div>
                </div>
                <div class="input-card">
                    <label>BOS Estimate</label>
                    <input type="number" id="kitBos" placeholder="Enter Amount" oninput="runCalculations()">
                </div>
                <button onclick="showNext('sec-struct')" class="w-full mt-4 bg-orange-600 text-white font-black py-4 rounded-2xl shadow-xl shadow-orange-500/20 uppercase text-xs tracking-widest hover:bg-orange-500">Next Step</button>
            </div>

            <!-- Standard Mode Sections -->
            <div id="sec-brand" class="step-section visible">
                <label>1. Brand Partnership</label>
                <div class="input-card">
                    <select id="pBrand" onchange="showNext('sec-panels')">
                        <option value="">Choose Panel Brand...</option>
                        <option>Tata Solar</option><option>Waaree</option><option>Adani</option><option>Vikram</option><option>Luminous</option><option>Rayzon</option><option>P.E.</option>
                    </select>
                </div>
            </div>

            <div id="sec-panels" class="step-section">
                <h3 class="text-[10px] font-black text-orange-500 mb-3 tracking-widest uppercase">Panel Inventory</h3>
                <div class="grid grid-cols-3 gap-2 mb-4">
                    <div class="input-card"><label>DCR Qty</label><input type="number" id="dcrQty" oninput="runCalculations()" placeholder="0"></div>
                    <div class="input-card"><label>Wp</label><input type="number" id="dcrCap" oninput="runCalculations()" placeholder="0"></div>
                    <div class="input-card"><label>Rate</label><input type="number" id="dcrRate" oninput="runCalculations()" placeholder="₹"></div>
                </div>
                <div class="grid grid-cols-3 gap-2">
                    <div class="input-card"><label>Non-DCR</label><input type="number" id="ndcrQty" oninput="runCalculations()" placeholder="0"></div>
                    <div class="input-card"><label>Wp</label><input type="number" id="ndcrCap" oninput="runCalculations()" placeholder="0"></div>
                    <div class="input-card"><label>Rate</label><input type="number" id="ndcrRate" oninput="runCalculations()" placeholder="₹"></div>
                </div>
                <button onclick="showNext('sec-inverter')" class="w-full mt-4 bg-orange-600 text-white font-black py-4 rounded-2xl uppercase text-xs tracking-widest hover:bg-orange-500">Confirm Panels</button>
            </div>

            <div id="sec-inverter" class="step-section">
                <label>2. Inverter Specification</label>
                <div class="input-card">
                    <select id="iBrand"><option>Vsole</option><option>Havells</option><option>Ksolare</option><option>Luminous</option><option>Growatt</option><option>Solis</option><option>Sungrow</option><option>Deye</option></select>
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div class="input-card"><label>Cap (kW)</label><input type="number" id="iCap" oninput="runCalculations()" placeholder="kW"></div>
                    <div class="input-card"><label>Net Rate</label><input type="number" id="iRate" oninput="runCalculations()" placeholder="₹"></div>
                </div>
                <button onclick="showNext('sec-struct')" class="w-full mt-2 bg-orange-600 text-white font-black py-4 rounded-2xl uppercase text-xs tracking-widest hover:bg-orange-500">Confirm Inverter</button>
            </div>

            <!-- Structure & Final sections common to both -->
            <div id="sec-struct" class="step-section">
                <label>3. Structure GI Rates</label>
                <div class="input-card"><label>Total Panels (Nos)</label><input type="number" id="pCount" placeholder="e.g. 10" oninput="runCalculations()"></div>
                <div class="input-card"><label>Rate / Kg</label><input type="number" id="sRate" oninput="runCalculations()" placeholder="₹"></div>
                <div class="grid grid-cols-3 gap-2">
                    <div class="input-card"><label>75x75</label><input type="number" id="q75" oninput="runCalculations()" placeholder="No"></div>
                    <div class="input-card"><label>60x40</label><input type="number" id="q60" oninput="runCalculations()" placeholder="No"></div>
                    <div class="input-card"><label>40x40</label><input type="number" id="q40" oninput="runCalculations()" placeholder="No"></div>
                </div>
                <button onclick="showNext('sec-final')" class="w-full mt-2 bg-orange-600 text-white font-black py-4 rounded-2xl uppercase text-xs tracking-widest hover:bg-orange-500">Almost Done</button>
            </div>

            <div id="sec-final" class="step-section">
                <label>Infrastructure & BOS</label>
                <div class="input-card">
                    <select id="mType" onchange="runCalculations()">
                        <option value="0">Net Metering...</option>
                        <option value="6500">1-Phase</option><option value="10500">3-Phase</option><option value="10000">1+3 Set</option>
                    </select>
                </div>
                <div id="stdBosContainer" class="input-card">
                    <label>Balance of System</label>
                    <select id="bType" onchange="runCalculations()">
                        <option value="0">Select BOS Package...</option>
                        <option value="12000">1-Phase Std</option><option value="18000">3-Phase Std</option>
                    </select>
                </div>
                <button onclick="revealFooter()" class="w-full mt-6 bg-white text-black font-black py-5 rounded-2xl shadow-2xl uppercase tracking-widest active:scale-95 transition-transform text-xs hover:bg-slate-200">Calculate Estimates</button>
            </div>
        </div>
    </main>

    <!-- Admin Cost Breakdown Modal -->
    <div id="adminModal" class="modal-overlay">
        <div class="max-w-md mx-auto glass-card p-8 mt-10">
            <div class="flex justify-between items-center mb-6 shrink-0">
                <h2 class="font-black text-orange-500 text-sm tracking-widest uppercase">Analysis Report</h2>
                <button onclick="toggleAdmin(false)" class="w-10 h-10 flex items-center justify-center bg-white/10 rounded-full text-white hover:bg-white/20">✕</button>
            </div>
            <div id="diagContent" class="grid grid-cols-2 gap-3"></div>
            <button onclick="copyData()" class="w-full mt-6 bg-orange-600 text-white py-4 rounded-2xl font-black uppercase text-xs tracking-widest hover:bg-orange-500">Copy to Clipboard</button>
        </div>
    </div>

    <!-- Generate Quote Modal (The Missing Details Form) -->
    <div id="quoteModal" class="modal-overlay">
        <div class="max-w-xl mx-auto glass-card p-6 mt-4 relative">
            <div class="flex justify-between items-center mb-6">
                <div>
                    <h2 class="text-xl font-extrabold text-white">Client Information</h2>
                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mt-1">Finalize Quotation Details</p>
                </div>
                <button onclick="toggleQuoteModal(false)" class="w-10 h-10 flex items-center justify-center bg-white/10 rounded-full text-white hover:bg-white/20">✕</button>
            </div>

            <div class="space-y-4 mb-8">
                <!-- Header Image Loader -->
                <div class="bg-white/5 p-3 rounded-2xl flex items-center justify-between border border-white/10">
                    <div id="imageStatus" class="flex items-center gap-2 text-[10px] font-bold text-red-400 uppercase tracking-widest">
                        <div class="w-2 h-2 rounded-full bg-red-500 animate-pulse"></div> Letterhead Missing
                    </div>
                    <input type="file" id="logoInput" accept="image/*" class="hidden">
                    <button onclick="document.getElementById('logoInput').click()" class="bg-white/10 hover:bg-white/20 text-white px-4 py-2 rounded-xl text-[10px] font-bold uppercase tracking-widest transition-colors">
                        Load Image
                    </button>
                </div>

                <div class="input-card">
                    <label>Client / Company Name</label>
                    <input type="text" id="custName" placeholder="e.g. Mani's Opulent Pvt Ltd">
                </div>
                <div class="input-card">
                    <label>Mobile Number</label>
                    <input type="tel" id="custMobile" placeholder="e.g. +91 9876543210">
                </div>
                <div class="input-card">
                    <label>Site Address</label>
                    <input type="text" id="custAddress" placeholder="e.g. Shamgarh, MP">
                </div>
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <button onclick="sendWhatsApp()" class="group bg-white/5 hover:bg-emerald-600/20 text-emerald-400 py-4 rounded-2xl font-black text-[11px] uppercase tracking-widest flex items-center justify-center gap-3 transition-all border border-emerald-500/30">
                    <i data-lucide="message-circle" class="w-5 h-5 group-hover:scale-110 transition-transform"></i> WhatsApp
                </button>
                <button onclick="makePDF()" class="group bg-orange-600 hover:bg-orange-500 text-white py-4 rounded-2xl font-black text-[11px] uppercase tracking-widest flex items-center justify-center gap-3 shadow-lg shadow-orange-500/20 transition-all">
                    <i data-lucide="file-text" class="w-5 h-5 group-hover:scale-110 transition-transform"></i> Download PDF
                </button>
            </div>
        </div>
    </div>

    <!-- Hidden cache for letterhead image -->
    <img id="logoCache" src="" style="display:none;" alt="logo cache">

    <!-- Sticky Bottom Footer -->
    <div id="footerQuote" class="fixed bottom-0 left-0 right-0 p-5 bg-slate-950/80 backdrop-blur-xl border-t border-white/10 rounded-t-[30px] hidden z-40">
        <div class="max-w-xl mx-auto flex justify-between items-center">
            <div>
                <p id="systemSize" class="text-[9px] font-black text-slate-500 uppercase tracking-widest">0.00 kW SYSTEM</p>
                <h2 id="totalView" class="text-2xl sm:text-3xl font-black text-white">₹ 0</h2>
            </div>
            <div class="flex gap-2">
                <button onclick="toggleQuoteModal(true)" class="bg-orange-600 text-white px-5 py-3 sm:px-8 rounded-xl font-black text-[10px] uppercase tracking-widest transition-all hover:bg-orange-500">Prepare Quote</button>
                <button onclick="location.reload()" class="bg-white/10 text-white px-4 py-3 rounded-xl hover:bg-white/20 transition-all flex items-center justify-center"><i data-lucide="rotate-ccw" class="w-4 h-4"></i></button>
            </div>
        </div>
    </div>

    <!-- Floating Home Button -->
    <a href="portal.html" class="fixed bottom-24 right-6 w-14 h-14 bg-white rounded-full flex items-center justify-center shadow-2xl border-2 border-orange-500 z-30 hover:scale-110 active:scale-95 transition-all">
        <i data-lucide="home" class="text-slate-900 w-6 h-6"></i>
    </a>

    <script>
        // Initialize Icons
        lucide.createIcons();

        // Global Variables
        let currentMode = 'standard';
        let headerImageData = null;
        let globalQuoteData = {}; // Stores dynamically calculated stats for PDF/WA

        // UI & Flow Toggles
        function setMode(mode) {
            currentMode = mode;
            document.getElementById('btnStandard').classList.toggle('mode-active', mode === 'standard');
            document.getElementById('btnKit').classList.toggle('mode-active', mode === 'kit');
            document.querySelectorAll('.step-section').forEach(s => s.classList.remove('visible'));
            document.getElementById('footerQuote').classList.add('hidden');
            if(mode === 'kit') {
                document.getElementById('sec-kit').classList.add('visible');
                document.getElementById('stdBosContainer').style.display = 'none';
            } else {
                document.getElementById('sec-brand').classList.add('visible');
                document.getElementById('stdBosContainer').style.display = 'block';
            }
        }

        function showNext(id) {
            document.getElementById(id).classList.add('visible');
            setTimeout(() => { window.scrollTo({ top: document.getElementById(id).offsetTop - 100, behavior: 'smooth' }); }, 100);
        }

        function toggleAdmin(show) { 
            runCalculations(); 
            document.getElementById('adminModal').style.display = show ? 'block' : 'none'; 
        }

        function toggleQuoteModal(show) {
            runCalculations(); // Ensure final figures are updated
            document.getElementById('quoteModal').style.display = show ? 'block' : 'none';
        }

        function revealFooter() { 
            runCalculations(); 
            document.getElementById('footerQuote').classList.remove('hidden'); 
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        }

        // Image Handling Logic
        document.getElementById('logoInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(event) {
                headerImageData = event.target.result;
                document.getElementById('logoCache').src = headerImageData;

                // Update UI Status
                const status = document.getElementById('imageStatus');
                status.innerHTML = `<div class="w-2 h-2 rounded-full bg-emerald-400"></div> Letterhead Ready`;
                status.classList.replace('text-red-400', 'text-emerald-400');
            };
            reader.readAsDataURL(file);
        });

        // Core Calculation Engine
        function runCalculations() {
            const getVal = (id) => parseFloat(document.getElementById(id).value) || 0;
            const fmt = (n) => "₹" + Math.round(n).toLocaleString('en-IN');
            
            let totalWp = 0, r11 = 0, breakdownHtml = "";
            let weight = (getVal('q75') * 28) + (getVal('q60') * 18) + (getVal('q40') * 15);
            let r7 = (weight * getVal('sRate')) * 1.18;
            let r9 = getVal('mType');
            let logistic = 9000;
            
            // Dynamic PDF variables
            let pdfPanelDesc = "";
            let pdfInvDesc = "";

            if (currentMode === 'standard') {
                let sr1 = (getVal('dcrQty') * getVal('dcrCap') * getVal('dcrRate')) * 1.05;
                let sr2 = (getVal('ndcrQty') * getVal('ndcrCap') * getVal('ndcrRate')) * 1.05;
                totalWp = (getVal('dcrQty') * getVal('dcrCap')) + (getVal('ndcrQty') * getVal('ndcrCap'));
                let r2 = getVal('iRate') * 1.05, r8 = totalWp * 1.60, r10 = getVal('bType') * 1.18;
                r11 = sr1 + sr2 + r2 + r7 + r8 + r9 + r10 + (totalWp > 0 ? logistic : 0);
                
                // Construct strings for quotes
                let pb = document.getElementById('pBrand').value || "Standard Module";
                pdfPanelDesc = `${pb} (${getVal('dcrQty') + getVal('ndcrQty')} Nos)`;
                let ib = document.getElementById('iBrand').value || "Standard Inverter";
                pdfInvDesc = `${ib} (${getVal('iCap')} kW)`;

                breakdownHtml = `
                    <div class="diag-item"><span>Capacity</span><b>${(totalWp/1000).toFixed(2)} kW</b></div>
                    <div class="diag-item"><span>Panels</span><b>${fmt(sr1 + sr2)}</b></div>
                    <div class="diag-item"><span>Inverter</span><b>${fmt(r2)}</b></div>
                    <div class="diag-item"><span>Structure</span><b>${fmt(r7)}</b></div>
                    <div class="diag-item"><span>Labour</span><b>${fmt(r8)}</b></div>
                    <div class="diag-item"><span>Logistics</span><b>${fmt(logistic)}</b></div>
                    <div class="diag-item"><span>Metering</span><b>${fmt(r9)}</b></div>
                    <div class="diag-item"><span>BOS</span><b>${fmt(r10)}</b></div>
                `;
            } else {
                let k1 = getVal('k1'), d1 = getVal('d1');
                totalWp = d1 * 1000;
                let k2 = k1 * 1.05, k3 = getVal('kitBos') * 1.18, k5 = totalWp * 1.60;
                r11 = k2 + k3 + r7 + r9 + k5 + (totalWp > 0 ? logistic : 0);
                
                // Construct strings for quotes
                let kb = document.getElementById('kitBrand').value || "Solar Kit";
                pdfPanelDesc = `${kb} Premium Modules`;
                pdfInvDesc = `${kb} Inverter (Included in Kit)`;

                breakdownHtml = `
                    <div class="diag-item"><span>Kit Net</span><b>${fmt(k2)}</b></div>
                    <div class="diag-item"><span>BOS Net</span><b>${fmt(k3)}</b></div>
                    <div class="diag-item"><span>Install</span><b>${fmt(k5)}</b></div>
                    <div class="diag-item"><span>Structure</span><b>${fmt(r7)}</b></div>
                    <div class="diag-item"><span>Net Meter</span><b>${fmt(r9)}</b></div>
                `;
            }

            // Panel Structure Count explicitly requested
            let structureCountHtml = `<div class="diag-item"><span>Structure Capacity</span><b>${getVal('pCount')} Panels</b></div>`;
            
            let margin = r11 * 0.25;
            let r12 = r11 + margin; // Final Total Price

            // Construct global data for generation
            globalQuoteData = {
                plantCap: (totalWp/1000).toFixed(2) + " kW",
                panelDesc: pdfPanelDesc,
                invDesc: pdfInvDesc,
                structDesc: getVal('pCount') > 0 ? getVal('pCount') + " Panels Structure (GI)" : "Standard GI Structure",
                finalCost: r12
            };

            // Update UI
            document.getElementById('diagContent').innerHTML = breakdownHtml + structureCountHtml + `
                <div class="diag-item col-span-2 border-orange-500/20"><span class="text-orange-500">Margin (25%)</span><b class="text-orange-500">${fmt(margin)}</b></div>
            `;
            document.getElementById('totalView').innerText = fmt(r12);
            document.getElementById('systemSize').innerText = globalQuoteData.plantCap + " SYSTEM";
        }

        // Gather all merged form data for PDF/WhatsApp
        function compileFinalQuoteData() {
            return {
                name: document.getElementById('custName').value || "Valued Client",
                mobile: document.getElementById('custMobile').value,
                address: document.getElementById('custAddress').value || "N/A",
                invInfo: globalQuoteData.invDesc,
                panelInfo: globalQuoteData.panelDesc,
                plantCap: globalQuoteData.plantCap,
                structCap: globalQuoteData.structDesc,
                cost: globalQuoteData.finalCost
            };
        }

        // WhatsApp Integration
        function sendWhatsApp() {
            const d = compileFinalQuoteData();
            if(!d.mobile) { alert("Please enter a Mobile Number."); return; }

            const formattedCost = d.cost.toLocaleString('en-IN');

            const message = `*SOLAR QUOTATION FROM UDBHAV SOLAR SOLUTIONS*%0A%0A` +
                `*Client Name:* ${d.name}%0A` +
                `*Plant Capacity:* ${d.plantCap}%0A` +
                `*Panel Brand:* ${d.panelInfo}%0A` +
                `*Inverter:* ${d.invInfo}%0A` +
                `*Structure:* ${d.structCap}%0A` +
                `*Total Investment:* ₹${formattedCost}/-%0A%0A` +
                `_Professional PDF generated upon request._%0A` +
                `Visit us: www.ussgreen.in.net`;

            window.open(`https://wa.me/91${d.mobile}?text=${message}`, '_blank');
        }

        // PDF Generation Integration
        async function makePDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            const d = compileFinalQuoteData();

            // Palette
            const corpNavy = [15, 23, 42];
            const corpOrange = [249, 115, 22];
            const textGray = [71, 85, 105];
            const lightGray = [248, 250, 252];

            // Header Section
            doc.setFillColor(corpOrange[0], corpOrange[1], corpOrange[2]);
            doc.rect(0, 0, 210, 4, 'F');

            if (headerImageData) {
                doc.addImage(headerImageData, 'JPEG', 15, 10, 45, 30);
            } else {
                doc.setTextColor(corpNavy[0], corpNavy[1], corpNavy[2]);
                doc.setFontSize(22);
                doc.setFont("helvetica", "bold");
                doc.text("", 15, 25);
            }

            doc.setTextColor(corpNavy[0], corpNavy[1], corpNavy[2]);
            doc.setFontSize(16);
            doc.setFont("helvetica", "bold");
            doc.text("UDBHAV SOLAR SOLUTIONS", 75, 20);
            doc.setFontSize(9);
            doc.setFont("helvetica", "normal");
            doc.setTextColor(textGray[0], textGray[1], textGray[2]);
            doc.text("Shop No. 2, Dumada, Ajmer, Rajasthan", 75, 26);
            doc.text("Phone: +91 9660711101", 75, 31);
            doc.text("Web: www.ussgreen.in.net", 75, 36);

            doc.setDrawColor(226, 232, 240);
            doc.setLineWidth(0.5);
            doc.line(15, 45, 195, 45);

            // Metadata
            doc.setTextColor(corpNavy[0], corpNavy[1], corpNavy[2]);
            doc.setFontSize(16);
            doc.setFont("helvetica", "bold");
            doc.text("SOLAR QUOTATION", 15, 58);

            const dateObj = new Date();
            const dateStr = dateObj.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' });
            const quoteID = `USS/Q/${dateObj.toLocaleDateString('en-GB').replace(/\//g, '')}/${Math.floor(100 + Math.random() * 900)}`;

            doc.setFontSize(9);
            doc.setFont("helvetica", "normal");
            doc.text(`Date: ${dateStr}`, 155, 54);
            doc.text(`Quote ID: ${quoteID}`, 155, 59);

            // Client Info
            doc.autoTable({
                startY: 68,
                margin: { left: 15, right: 15 },
                head: [['BILL TO']],
                body: [
                    [d.name.toUpperCase()],
                    [`Mobile: +91 ${d.mobile}`],
                    [`Address: ${d.address}`]
                ],
                theme: 'plain',
                headStyles: { fillColor: lightGray, textColor: corpNavy, fontStyle: 'bold', fontSize: 10, cellPadding: 3 },
                bodyStyles: { fontSize: 10, cellPadding: 2, textColor: textGray }
            });

            // Specs table
            doc.setTextColor(corpNavy[0], corpNavy[1], corpNavy[2]);
            doc.setFontSize(11);
            doc.setFont("helvetica", "bold");
            doc.text("TECHNICAL SPECIFICATIONS", 15, doc.lastAutoTable.finalY + 12);

            doc.autoTable({
                startY: doc.lastAutoTable.finalY + 16,
                margin: { left: 15, right: 15 },
                head: [['#', 'ITEM DESCRIPTION', 'SPECIFICATION DETAILS']],
                body: [
                    ['1', 'Installed Plant Capacity', d.plantCap],
                    ['2', 'Solar Photovoltaic Modules', d.panelInfo],
                    ['3', 'Solar Inverter Unit', d.invInfo],
                    ['4', 'Mounting Structure', d.structCap]
                ],
                theme: 'grid',
                headStyles: { fillColor: corpNavy, textColor: [255, 255, 255], fontStyle: 'bold', fontSize: 9 },
                bodyStyles: { fontSize: 10, cellPadding: 5, textColor: corpNavy },
                alternateRowStyles: { fillColor: [248, 250, 252] },
                columnStyles: { 0: { cellWidth: 12, halign: 'center' }, 1: { fontStyle: 'bold' } }
            });

            // Totals
            const finalY = doc.lastAutoTable.finalY + 15;
            doc.setFillColor(corpNavy[0], corpNavy[1], corpNavy[2]);
            doc.rect(125, finalY, 70, 22, 'F');
            doc.setTextColor(255, 255, 255);
            doc.setFontSize(9);
            doc.text("TOTAL PROJECT COST", 130, finalY + 8);
            doc.setFontSize(14);
            doc.setFont("helvetica", "bold");
            doc.text(`INR ${d.cost.toLocaleString('en-IN')}/-`, 130, finalY + 16);

            // Terms
            doc.setTextColor(corpNavy[0], corpNavy[1], corpNavy[2]);
            doc.setFontSize(10);
            doc.setFont("helvetica", "bold");
            doc.text("TERMS & CONDITIONS", 15, finalY + 5);
            doc.setFont("helvetica", "normal");
            doc.setFontSize(8);
            doc.setTextColor(textGray[0], textGray[1], textGray[2]);
            doc.text("• Valid for 7 days from the date of issue.", 15, finalY + 10);
            doc.text("• Advance payment required for order confirmation.", 15, finalY + 14);
            doc.text("• Subject to final site inspection.", 15, finalY + 18);

            // Footer
            const pageHeight = doc.internal.pageSize.height;
            doc.setDrawColor(corpNavy[0], corpNavy[1], corpNavy[2]);
            doc.line(145, pageHeight - 35, 195, pageHeight - 35);
            doc.setFontSize(9);
            doc.setTextColor(corpNavy[0], corpNavy[1], corpNavy[2]);
            doc.text("Authorized Signatory", 152, pageHeight - 30);
            doc.setFontSize(8);
            doc.setTextColor(textGray[0], textGray[1], textGray[2]);
            doc.text("Sales Department", 157, pageHeight - 26);

            doc.setFillColor(lightGray[0], lightGray[1], lightGray[2]);
            doc.rect(0, pageHeight - 12, 210, 12, 'F');
            doc.text("This is a computer-generated official quotation from Udbhav Solar Solutions.", 105, pageHeight - 5, { align: "center" });

            // Save PDF
            const fileName = `Quote_${d.name.replace(/[^a-zA-Z0-9]/g, '_')}.pdf`;
            if (window.AndroidInterface) {
                const pdfBase64 = doc.output('datauristring');
                window.AndroidInterface.saveAndSharePDF(pdfBase64, d.name, d.mobile);
            } else {
                doc.save(fileName);
            }
        }

        // Copy Admin Data
        function copyData() {
            let text = `*UDBHAV SOLAR SOLUTION*\n*System:* ${document.getElementById('systemSize').innerText}\n*Total Investment:* ${document.getElementById('totalView').innerText}`;
            navigator.clipboard.writeText(text);
            alert("Analysis copied!");
        }
    </script>
