<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Udbhav OA | Interactive Control</title>
    <link rel="icon" type="image/png" href="unnamed.jpg">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script type="module">
        import { Client } from "https://cdn.jsdelivr.net/npm/@gradio/client/dist/index.min.js";
        window.GradioClient = Client;
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;900&display=swap');
        body { background: #020617; color: #f8fafc; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(249, 115, 22, 0.15); }
        .input-field { background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; padding: 10px; width: 100%; color: white; outline: none; transition: 0.3s; font-size: 13px; }
        .input-field:focus { border-color: #f97316; box-shadow: 0 0 10px rgba(249, 115, 22, 0.2); }
        .loader { border: 3px solid #1e293b; border-top: 3px solid #f97316; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; display: none; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        /* Dialogue Box / Window Styles */
        .dialogue-box { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); display: flex; flex-direction: column; }
        .dialogue-header { background: linear-gradient(90deg, #1e293b, #0f172a); border-bottom: 1px solid rgba(255,255,255,0.05); }
        .dialogue-content { overflow-y: auto; flex-grow: 1; }
        .dialogue-content::-webkit-scrollbar { width: 6px; height: 6px; }
        .dialogue-content::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
        
        /* Maximized State */
        .is-maximized { position: fixed !important; top: 1rem !important; left: 1rem !important; right: 1rem !important; bottom: 1rem !important; height: auto !important; width: auto !important; z-index: 50; }
        /* Minimized State */
        .is-minimized .dialogue-content { display: none !important; }
    </style>
</head>
<body class="p-4 md:p-8">

    <nav class="flex justify-between items-center mb-8 max-w-[1400px] mx-auto">
        <div class="flex items-center gap-4">
            <div class="w-12 h-12 rounded-xl border border-orange-500/30 overflow-hidden bg-slate-800">
                <img src="Donna Stroupe.jpg" class="w-full h-full object-cover" onerror="this.src='https://via.placeholder.com/150'">
            </div>
            <div>
                <h1 class="text-xl font-black uppercase tracking-tighter">Udbhav <span class="text-orange-500">OA</span></h1>
                <p class="text-[10px] text-slate-500 font-bold uppercase tracking-widest">Operations Portal</p>
            </div>
        </div>
        <div id="sync-status" class="px-4 py-2 rounded-full bg-slate-900/80 border border-white/10 text-[10px] font-bold text-slate-400 flex items-center gap-2">
            <div id="status-dot" class="w-2 h-2 rounded-full bg-green-500 shadow-[0_0_10px_green]"></div> 
            <span id="status-text">SYSTEM READY</span>
            <a id="core-btn" href="https://udbhav121-aii.hf.space" target="_blank" class="px-5 py-2 rounded-full bg-orange-600 hover:bg-orange-500 text-[10px] font-black tracking-widest text-white transition-all shadow-lg shadow-orange-900/20 flex items-center gap-2">
    <i data-lucide="external-link" class="w-3"></i> CORE
</a>
        </div>
    </nav>

    <main class="max-w-[1400px] mx-auto grid grid-cols-1 lg:grid-cols-12 gap-6">
        
        <div class="lg:col-span-3 space-y-6">
            <div class="glass p-5 rounded-2xl shadow-xl">
                <h3 class="text-xs font-black uppercase tracking-widest text-orange-500 mb-5 flex items-center gap-2">
                    <i data-lucide="sliders" class="w-4"></i> Site Parameters
                </h3>
                
                <div class="space-y-4">
                    <div>
                        <label class="text-[10px] uppercase font-bold text-slate-400">Coordinates</label>
                        <div class="flex gap-2 mt-1">
                            <input id="lat" type="number" step="0.01" value="26.45" class="input-field" title="Latitude">
                            <input id="lon" type="number" step="0.01" value="74.64" class="input-field" title="Longitude">
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-2">
                        <div>
                            <label class="text-[10px] uppercase font-bold text-slate-400">Month (1-12)</label>
                            <input id="month" type="number" min="1" max="12" value="6" class="input-field mt-1">
                        </div>
                        <div>
                            <label class="text-[10px] uppercase font-bold text-slate-400">Monthly Bill (₹)</label>
                            <input id="bill" type="number" value="2500" class="input-field mt-1">
                        </div>
                    </div>
                    <div>
                        <label class="text-[10px] uppercase font-bold text-slate-400">Rows / Panels Per Row</label>
                        <div class="flex gap-2 mt-1">
                            <input id="rows" type="number" value="2" class="input-field" title="Rows">
                            <input id="panels" type="number" value="4" class="input-field" title="Panels per Row">
                        </div>
                    </div>

                    <div class="pt-4 border-t border-white/10">
                        <h3 class="text-[10px] font-black uppercase tracking-widest text-slate-300 mb-3">Obstruction Data</h3>
                        <div class="grid grid-cols-2 gap-2">
                            <div>
                                <label class="text-[8px] uppercase font-bold text-slate-500">Height (ft)</label>
                                <input id="obs-h" type="number" value="20" class="input-field mt-1">
                            </div>
                            <div>
                                <label class="text-[8px] uppercase font-bold text-slate-500">Distance (ft)</label>
                                <input id="obs-d" type="number" value="30" class="input-field mt-1">
                            </div>
                            <div>
                                <label class="text-[8px] uppercase font-bold text-slate-500">Azimuth (°)</label>
                                <input id="obs-az" type="number" value="180" class="input-field mt-1">
                            </div>
                            <div>
                                <label class="text-[8px] uppercase font-bold text-slate-500">Width (ft)</label>
                                <input id="obs-w" type="number" value="10" class="input-field mt-1">
                            </div>
                        </div>
                    </div>

                    <button onclick="triggerPythonAnalysis()" id="submit-btn" class="w-full py-3 bg-orange-600 hover:bg-orange-500 text-white font-bold rounded-xl transition-all flex items-center justify-center gap-3 mt-6 shadow-lg shadow-orange-900/20">
                        <i data-lucide="zap" class="w-4"></i> 
                        <span id="btn-text" class="text-sm">EXECUTE</span>
                        <div id="loader" class="loader"></div>
                    </button>
                </div>
            </div>
        </div>

        <div class="lg:col-span-9">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                
                <div id="box-3d" class="glass rounded-xl dialogue-box shadow-xl h-[400px] relative">
                    <div class="dialogue-header p-3 flex justify-between items-center rounded-t-xl">
                        <div class="flex items-center gap-2">
                            <i data-lucide="box" class="w-4 text-slate-400"></i>
                            <span class="text-xs font-bold uppercase tracking-wider text-slate-300">3D Array Model</span>
                        </div>
                        <div class="flex gap-3">
                            <button onclick="toggleMinimize('box-3d')" class="text-slate-500 hover:text-white transition"><i data-lucide="minus" class="w-4"></i></button>
                            <button onclick="toggleMaximize('box-3d')" class="text-slate-500 hover:text-white transition"><i data-lucide="maximize" class="w-4"></i></button>
                        </div>
                    </div>
                    <div id="content-3d" class="dialogue-content p-2 bg-slate-900/50 flex justify-center items-center">
                        <p class="text-slate-500 text-sm">Awaiting execution...</p>
                    </div>
                </div>

                <div id="box-loss" class="glass rounded-xl dialogue-box shadow-xl h-[400px] relative">
                    <div class="dialogue-header p-3 flex justify-between items-center rounded-t-xl">
                        <div class="flex items-center gap-2">
                            <i data-lucide="bar-chart-2" class="w-4 text-slate-400"></i>
                            <span class="text-xs font-bold uppercase tracking-wider text-slate-300">Shading Trend</span>
                        </div>
                        <div class="flex gap-3">
                            <button onclick="toggleMinimize('box-loss')" class="text-slate-500 hover:text-white transition"><i data-lucide="minus" class="w-4"></i></button>
                            <button onclick="toggleMaximize('box-loss')" class="text-slate-500 hover:text-white transition"><i data-lucide="maximize" class="w-4"></i></button>
                        </div>
                    </div>
                    <div id="content-loss" class="dialogue-content p-2 bg-slate-900/50 flex justify-center items-center">
                        <p class="text-slate-500 text-sm">Awaiting execution...</p>
                    </div>
                </div>

                <div id="box-table" class="glass rounded-xl dialogue-box shadow-xl h-[300px] relative">
                    <div class="dialogue-header p-3 flex justify-between items-center rounded-t-xl">
                        <div class="flex items-center gap-2">
                            <i data-lucide="table" class="w-4 text-slate-400"></i>
                            <span class="text-xs font-bold uppercase tracking-wider text-slate-300">Data Matrix</span>
                        </div>
                        <div class="flex gap-3">
                            <button onclick="toggleMinimize('box-table')" class="text-slate-500 hover:text-white transition"><i data-lucide="minus" class="w-4"></i></button>
                            <button onclick="toggleMaximize('box-table')" class="text-slate-500 hover:text-white transition"><i data-lucide="maximize" class="w-4"></i></button>
                        </div>
                    </div>
                    <div id="content-table" class="dialogue-content p-4">
                        <p class="text-slate-500 text-sm text-center mt-10">Awaiting execution...</p>
                    </div>
                </div>

                <div id="box-summary" class="glass rounded-xl dialogue-box shadow-xl h-[300px] relative">
                    <div class="dialogue-header p-3 flex justify-between items-center rounded-t-xl">
                        <div class="flex items-center gap-2">
                            <i data-lucide="file-text" class="w-4 text-slate-400"></i>
                            <span class="text-xs font-bold uppercase tracking-wider text-slate-300">Engine Report</span>
                        </div>
                        <div class="flex gap-3">
                            <button onclick="toggleMinimize('box-summary')" class="text-slate-500 hover:text-white transition"><i data-lucide="minus" class="w-4"></i></button>
                            <button onclick="toggleMaximize('box-summary')" class="text-slate-500 hover:text-white transition"><i data-lucide="maximize" class="w-4"></i></button>
                        </div>
                    </div>
                    <div id="content-summary" class="dialogue-content p-6 flex flex-col justify-center">
                        <p class="text-slate-500 text-sm italic border-l-2 border-orange-500/30 pl-4">System idling. Ready to process parameters.</p>
                    </div>
                </div>

            </div>
        </div>
    </main>

    <script>
        lucide.createIcons();

        // Window Controls
        function toggleMaximize(boxId) {
            const box = document.getElementById(boxId);
            box.classList.toggle('is-maximized');
            // Re-render plotly charts on resize if they exist
            if(boxId === 'box-3d' || boxId === 'box-loss') {
                setTimeout(() => window.dispatchEvent(new Event('resize')), 100);
            }
        }

        function toggleMinimize(boxId) {
            const box = document.getElementById(boxId);
            box.classList.toggle('is-minimized');
        }

        // Render Helper for Plotly payloads from Gradio
        function renderGradioPlot(containerId, plotPayload) {
            document.getElementById(containerId).innerHTML = ''; // Clear existing
            let plotObj = plotPayload;
            // Gradio sometimes nests the plot data as a JSON string inside a 'plot' key
            if (plotPayload && plotPayload.plot) {
                plotObj = typeof plotPayload.plot === 'string' ? JSON.parse(plotPayload.plot) : plotPayload.plot;
            }
            if (plotObj && plotObj.data) {
                Plotly.newPlot(containerId, plotObj.data, plotObj.layout, {responsive: true});
            } else {
                document.getElementById(containerId).innerHTML = '<p class="text-red-500 text-sm p-4">Failed to load chart data.</p>';
            }
        }

        // Render Helper for Gradio Dataframes
        function renderTable(tablePayload, containerId) {
            const container = document.getElementById(containerId);
            if (!tablePayload || !tablePayload.headers || !tablePayload.data) {
                container.innerHTML = '<p class="text-red-500 text-sm p-4 text-center">Failed to load table data.</p>';
                return;
            }

            let html = `<table class="w-full text-left border-collapse"><thead><tr>`;
            tablePayload.headers.forEach(header => {
                html += `<th class="p-3 border-b border-white/10 text-[10px] font-bold text-orange-400 uppercase tracking-wider">${header}</th>`;
            });
            html += `</tr></thead><tbody>`;
            
            tablePayload.data.forEach((row, i) => {
                const bg = i % 2 === 0 ? 'bg-white/5' : '';
                html += `<tr class="${bg} hover:bg-white/10 transition">`;
                row.forEach(cell => {
                    html += `<td class="p-3 border-b border-white/5 text-xs text-slate-200">${cell}</td>`;
                });
                html += `</tr>`;
            });
            html += `</tbody></table>`;
            container.innerHTML = html;
        }

        // Main Execution
        async function triggerPythonAnalysis() {
            const btnText = document.getElementById('btn-text');
            const loader = document.getElementById('loader');
            const statusDot = document.getElementById('status-dot');
            const statusText = document.getElementById('status-text');
            
            btnText.innerText = "PROCESSING";
            loader.style.display = "block";
            statusDot.classList.replace('bg-green-500', 'bg-yellow-500');
            statusText.innerText = "ENGINE RUNNING";

            try {
                const app = await window.GradioClient.connect("udbhav121/aii");
                
                // SCRAPE OBSTRUCTION VALUES FROM UI
                const obsH = parseFloat(document.getElementById('obs-h').value) || 0;
                const obsD = parseFloat(document.getElementById('obs-d').value) || 0;
                const obsAz = parseFloat(document.getElementById('obs-az').value) || 0;
                const obsW = parseFloat(document.getElementById('obs-w').value) || 0;

                const obstructionData = {
                    "headers": ["Height (ft)", "Distance (ft)", "Direction (Azimuth)", "Width (ft)"],
                    "data": [[obsH, obsD, obsAz, obsW]]
                };

                const inputs = [
                    parseFloat(document.getElementById('lat').value),
                    parseFloat(document.getElementById('lon').value),
                    parseFloat(document.getElementById('month').value),
                    obstructionData, // Now dynamic!
                    parseFloat(document.getElementById('bill').value),
                    parseInt(document.getElementById('rows').value),
                    parseInt(document.getElementById('panels').value)
                ];

                console.log("Sending Payload:", inputs);

                const result = await app.predict("/process_survey", inputs);
                console.log("Engine Response:", result);

                const [plot3d, plotLoss, tableData, summaryText] = result.data;

                // 1. Output 3D Plot
                renderGradioPlot('content-3d', plot3d);

                // 2. Output Loss Plot
                renderGradioPlot('content-loss', plotLoss);

                // 3. Output Dataframe
                renderTable(tableData, 'content-table');

                // 4. Output Summary Text
                document.getElementById('content-summary').innerHTML = 
                    `<div class="bg-orange-500/10 p-4 rounded-lg border border-orange-500/20 text-orange-100 text-sm leading-relaxed">
                        ${summaryText.replace(/\n/g, '<br>')}
                     </div>`;

                statusDot.classList.replace('bg-yellow-500', 'bg-green-500');
                statusText.innerText = "ANALYSIS COMPLETE";

            } catch (error) {
                console.error("Engine Error:", error);
                document.getElementById('content-summary').innerHTML = `<p class="text-red-500 text-sm font-bold p-4 bg-red-500/10 rounded border border-red-500/20">Error: ${error.message}</p>`;
                statusDot.classList.replace('bg-yellow-500', 'bg-red-500');
                statusText.innerText = "SYSTEM ERROR";
            } finally {
                btnText.innerText = "EXECUTE";
                loader.style.display = "none";
            }
        }
    </script>
</body>
</html>
