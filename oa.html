<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Udbhav OA | Interactive Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script type="module">
        import { Client } from "https://cdn.jsdelivr.net/npm/@gradio/client/dist/index.min.js";
        window.GradioClient = Client;
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;900&display=swap');
        body { background: #020617; color: #f8fafc; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(12px); border: 1px solid rgba(249, 115, 22, 0.1); }
        .input-field { background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 12px; width: 100%; color: white; outline: none; transition: 0.3s; }
        .input-field:focus { border-color: #f97316; box-shadow: 0 0 10px rgba(249, 115, 22, 0.2); }
        #panel-canvas { width: 100%; height: 250px; border-radius: 1rem; }
        .loader { border: 3px solid #1e293b; border-top: 3px solid #f97316; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; display: none; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="p-6">

    <nav class="flex justify-between items-center mb-10 max-w-7xl mx-auto">
        <div class="flex items-center gap-4">
            <img src="Donna Stroupe.jpg" class="w-12 h-12 rounded-xl border border-orange-500/30 object-cover">
            <h1 class="text-xl font-black uppercase">Udbhav <span class="text-orange-500">OA</span></h1>
        </div>
        <div id="sync-status" class="text-[10px] font-bold text-slate-500 flex items-center gap-2">
            <div class="w-2 h-2 rounded-full bg-green-500 shadow-[0_0_10px_green]"></div> ENGINE ONLINE
        </div>
    </nav>

    <main class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-8">
        
        <div class="lg:col-span-4 space-y-6">
            <div class="glass p-6 rounded-[2rem]">
                <h3 class="text-sm font-black uppercase tracking-widest text-orange-500 mb-6">Site Parameters</h3>
                
                <div class="space-y-4">
                    <div>
                        <label class="text-[10px] uppercase font-bold text-slate-500 ml-2">Coordinates (Lat / Lon)</label>
                        <div class="flex gap-2 mt-1">
                            <input id="lat" type="number" value="26.45" class="input-field" placeholder="Lat">
                            <input id="lon" type="number" value="74.64" class="input-field" placeholder="Lon">
                        </div>
                    </div>

                    <div>
                        <label class="text-[10px] uppercase font-bold text-slate-500 ml-2">Plant Design (Rows / Panels)</label>
                        <div class="flex gap-2 mt-1">
                            <input id="rows" type="number" value="2" class="input-field">
                            <input id="panels" type="number" value="4" class="input-field">
                        </div>
                    </div>

                    <div>
                        <label class="text-[10px] uppercase font-bold text-slate-500 ml-2">Monthly Bill (₹)</label>
                        <input id="bill" type="number" value="2500" class="input-field mt-1">
                    </div>

                    <button onclick="triggerPythonAnalysis()" id="btn-text" class="w-full py-4 bg-orange-600 hover:bg-orange-500 text-white font-bold rounded-xl transition-all flex items-center justify-center gap-3 mt-4">
                        <i data-lucide="zap" class="w-4"></i> 
                        <span>RUN ANALYSIS</span>
                        <div id="loader" class="loader"></div>
                    </button>
                </div>
            </div>
        </div>

        <div class="lg:col-span-8 space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="glass p-6 rounded-[2rem]">
                    <div id="panel-canvas"></div>
                    <p class="text-center text-[10px] text-slate-500 mt-2 font-bold uppercase tracking-widest">3D Array Geometry</p>
                </div>

                <div class="space-y-6">
                    <div class="glass p-8 rounded-[2rem]">
                        <p class="text-[10px] font-bold text-slate-500 uppercase mb-2">Estimated Capacity</p>
                        <div id="cap-val" class="text-5xl font-black text-white">-- kW</div>
                    </div>
                    <div class="glass p-8 rounded-[2rem]">
                        <p class="text-[10px] font-bold text-slate-500 uppercase mb-2">Govt. Subsidy</p>
                        <div id="sub-val" class="text-5xl font-black text-orange-500">₹--</div>
                    </div>
                </div>
            </div>

            <div class="glass p-8 rounded-[2.5rem]">
                <h4 class="font-black uppercase tracking-tighter mb-4">Engine Logic Output</h4>
                <div id="summary-text" class="text-sm text-slate-400 leading-relaxed italic">
                    Enter site parameters and click "Run Analysis" to initiate calculations.
                </div>
            </div>
        </div>
    </main>

    <script>
        lucide.createIcons();

        // RUNNING THE PYTHON ANALYSIS
        async function triggerPythonAnalysis() {
            const btnText = document.querySelector('#btn-text span');
            const loader = document.getElementById('loader');
            
            // UI State
            btnText.innerText = "PROCESSING...";
            loader.style.display = "block";

            try {
                // Connect to your Hugging Face Space (Replace with your actual Space Name)
                const app = await window.GradioClient.connect("udbhav121/aii ");
                
                const result = await app.predict("/process_survey", [
                    parseFloat(document.getElementById('lat').value),
                    parseFloat(document.getElementById('lon').value),
                    6, // Default Month
                    [[20, 30, 180, 10]], // Default Obstruction
                    parseFloat(document.getElementById('bill').value),
                    parseInt(document.getElementById('rows').value),
                    parseInt(document.getElementById('panels').value)
                ]);

                // The Python code automatically saves to data1.json and pushes to GitHub
                // We update the UI here immediately for speed
                updateUI();
                
            } catch (error) {
                console.error(error);
                alert("Connection Error: Ensure your HF Space is running.");
            } finally {
                btnText.innerText = "RUN ANALYSIS";
                loader.style.display = "none";
            }
        }

        async function updateUI() {
            try {
                const response = await fetch('data1.json');
                const data = await response.json();
                document.getElementById('cap-val').innerText = data.plant_capacity + " kW";
                document.getElementById('sub-val').innerText = "₹" + data.subsidy_amount.toLocaleString();
                document.getElementById('summary-text').innerText = data.summary;
            } catch (e) { console.log("JSON not ready yet..."); }
        }

        // Initialize 3D Visualizer (Simplified for the panel)
        function init3D() {
            const container = document.getElementById('panel-canvas');
            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(75, container.clientWidth / container.clientHeight, 0.1, 1000);
            const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(container.clientWidth, container.clientHeight);
            container.appendChild(renderer.domElement);

            const geometry = new THREE.BoxGeometry(3.5, 0.05, 2);
            const material = new THREE.MeshPhongMaterial({ color: 0x1e293b, specular: 0x3b82f6 });
            const panel = new THREE.Mesh(geometry, material);
            scene.add(panel);

            const light = new THREE.DirectionalLight(0xffffff, 1);
            light.position.set(5, 5, 5);
            scene.add(light);
            camera.position.z = 4;
            panel.rotation.x = 0.5;

            function animate() {
                requestAnimationFrame(animate);
                panel.rotation.y += 0.01;
                renderer.render(scene, camera);
            }
            animate();
        }

        window.onload = () => {
            init3D();
            updateUI();
        };
    </script>
</body>
</html>
