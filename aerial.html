     * UDBHAV SECURITY PROTOCOL: SIR ACCESS CONTROL
     * 1. Validates Admin Session

     */

        const isLoggedIn = sessionStorage.getItem("isSolarAdmin") === "true";

<script>
lucide.createIcons();

/* --- GLOBAL STATE --- */
let map, roofPoly, sunMarker;
let panelLayers = L.layerGroup();
let drawPoints = [];
let drawingActive = false;

/* --- INITIALIZATION --- */
function initMap() {
    // Standard Leaflet Init
    map = L.map('map', { zoomControl: false, preferCanvas: true }).setView([26.4499, 74.6399], 19);
    
    // Google Satellite Hybrid
    L.tileLayer('https://{s}.google.com/vt/lyrs=y,h&x={x}&y={y}&z={z}', {
        maxZoom: 22,
        subdomains: ['mt0', 'mt1', 'mt2', 'mt3']
    }).addTo(map);

    panelLayers.addTo(map);
    map.on('click', handleMapClick);
    
    // Initial Sun Calculation
    updateSunStats();
}

/* --- LOCATION HUB --- */
async function searchLocation() {
    const q = document.getElementById('search-input').value;
    if(!q) return;
    
    try {
        const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(q)}`);
        const data = await res.json();
        if(data.length > 0) {
            map.flyTo([data[0].lat, data[0].lon], 20);
            updateSunStats(data[0].lat, data[0].lon);
        }
    } catch(e) { console.error("Search Failed", e); }
}

function locateUser() {
    if (!navigator.geolocation) return alert("Browser does not support GPS");
    navigator.geolocation.getCurrentPosition(pos => {
        const coords = [pos.coords.latitude, pos.coords.longitude];
        map.flyTo(coords, 21);
        updateSunStats(coords[0], coords[1]);
    }, () => alert("Location access denied."));
}

/* --- CAPACITY WIZARD --- */
function switchTab(t) {
    document.getElementById('view-bill').classList.toggle('hidden', t !== 'bill');
    document.getElementById('view-life').classList.toggle('hidden', t !== 'life');
    document.getElementById('tab-bill').classList.toggle('tab-active', t === 'bill');
    document.getElementById('tab-life').classList.toggle('tab-active', t === 'life');
}

function calcFromWizard() {
    let kw = 0;
    if(!document.getElementById('view-bill').classList.contains('hidden')) {
        const units = document.getElementById('bill-units').value || 0;
        kw = (units / 120).toFixed(1);
    } else {
        const ac = document.getElementById('life-ac').value || 0;
        const ev = document.getElementById('life-ev').value || 0;
        kw = ((ac * 1.5) + (ev > 0 ? 1.5 : 0)).toFixed(1);
    }
    updateDashboard(kw);
}

/* --- DRAW ENGINE --- */
function handleModeChange() {
    const mode = document.getElementById('tool-mode').value;
    drawingActive = (mode === 'draw');
    document.getElementById('finish-draw-btn').classList.toggle('hidden', !drawingActive);
    
    if(mode === 'auto') {
        autoFillRoof();
        document.getElementById('tool-mode').value = 'pan';
    }
}

function handleMapClick(e) {
    if(!drawingActive) return;
    drawPoints.push(e.latlng);
    
    if(window.tempLine) map.removeLayer(window.tempLine);
    window.tempLine = L.polyline(drawPoints, {color: '#f97316', weight: 4}).addTo(map);
}

function finishDrawing() {
    if(drawPoints.length < 3) return alert("Click at least 3 points on the roof corners");
    
    if(roofPoly) map.removeLayer(roofPoly);
    roofPoly = L.polygon(drawPoints, {color: '#3b82f6', weight: 2, fillOpacity: 0.3}).addTo(map);
    
    // Calculate Area
    const area = L.GeometryUtil.geodesicArea(drawPoints);
    document.getElementById('area-val').innerHTML = `${Math.round(area)} <span class="text-xs">sqm</span>`;
    
    drawPoints = [];
    if(window.tempLine) map.removeLayer(window.tempLine);
    drawingActive = false;
    document.getElementById('tool-mode').value = 'pan';
    handleModeChange();
}

function autoFillRoof() {
    if(!roofPoly) return alert("Draw roof boundary first!");
    panelLayers.clearLayers();
    
    const bounds = roofPoly.getBounds();
    const pW = 1.1, pH = 2.2; // Standard 550W Panel Dimensions
    const latStep = (pH + 0.1) / 111320;
    const lngStep = (pW + 0.1) / (111320 * Math.cos(bounds.getCenter().lat * Math.PI/180));
    
    let count = 0;
    for(let lat = bounds.getSouth(); lat <= bounds.getNorth(); lat += latStep) {
        for(let lng = bounds.getWest(); lng <= bounds.getEast(); lng += lngStep) {
            const center = L.latLng(lat, lng);
            if(isInside(center, roofPoly)) {
                createPanel(center, pW, pH);
                count++;
            }
        }
    }
    updateDashboard((count * 0.55).toFixed(1));
}

function createPanel(center, w, h) {
    const mToLat = 1/111320;
    const mToLng = 1/(111320 * Math.cos(center.lat * Math.PI/180));
    const dLat = (h/2) * mToLat, dLng = (w/2) * mToLng;

    const corners = [
        [center.lat + dLat, center.lng - dLng],
        [center.lat + dLat, center.lng + dLng],
        [center.lat - dLat, center.lng + dLng],
        [center.lat - dLat, center.lng - dLng]
    ];
    L.polygon(corners, {color: '#f97316', weight: 1, fillOpacity: 0.7}).addTo(panelLayers);
}

function isInside(point, poly) {
    const x = point.lat, y = point.lng;
    const vs = poly.getLatLngs()[0];
    let inside = false;
    for (let i = 0, j = vs.length - 1; i < vs.length; j = i++) {
        const xi = vs[i].lat, yi = vs[i].lng;
        const xj = vs[j].lat, yj = vs[j].lng;
        const intersect = ((yi > y) != (yj > y)) && (x < (xj - xi) * (y - yi) / (yj - yi) + xi);
        if (intersect) inside = !inside;
    }
    return inside;
}

/* --- MATH & DASHBOARD --- */
function updateDashboard(kw) {
    document.getElementById('rec-kw').innerHTML = `${kw} <span class="text-xs">kW</span>`;
    const gen = Math.round(kw * 1450);
    document.getElementById('est-gen').innerText = `${gen.toLocaleString()} kWh`;
    document.getElementById('mo-savings').innerText = `₹ ${Math.round(gen * 8 / 12).toLocaleString()}`;
    document.getElementById('co2-val').innerText = `${(kw * 1.2).toFixed(1)} Tons/yr`;
}

function updateSunStats(lat = 26.44, lng = 74.63) {
    const times = SunCalc.getTimes(new Date(), lat, lng);
    const sunPos = SunCalc.getPosition(times.solarNoon, lat, lng);
    const altitude = (sunPos.altitude * 180 / Math.PI).toFixed(1);
    document.getElementById('sun-angle').innerText = `${altitude}° Elevation`;
}

function clearMap() {
    panelLayers.clearLayers();
    if(roofPoly) map.removeLayer(roofPoly);
    roofPoly = null;
    updateDashboard(0);
}

function toggleSidebar() {
    document.getElementById('sidebar').classList.toggle('sidebar-hidden');
}

function bookConsultation() {
    const kw = document.getElementById('rec-kw').innerText.split(' ')[0];
    const msg = `Hi Udbhav Solar! I've used the AI Hub and designed a *${kw} kW* system. Please check for technical feasibility.`;
    window.open(`https://wa.me/919660711101?text=${encodeURIComponent(msg)}`);
}

// Leaflet Geometry Utility Fallback
L.GeometryUtil = L.extend(L.GeometryUtil || {}, {
    geodesicArea: function (latLngs) {
        var pointsCount = latLngs.length, area = 0.0, d2r = Math.PI / 180, p1, p2;
        if (pointsCount > 2) {
            for (var i = 0; i < pointsCount; i++) {
                p1 = latLngs[i]; p2 = latLngs[(i + 1) % pointsCount];
                area += ((p2.lng - p1.lng) * d2r) * (2 + Math.sin(p1.lat * d2r) + Math.sin(p2.lat * d2r));
            }
            area = area * 6378137.0 * 6378137.0 / 2.0;
        }
        return Math.abs(area);
    }
});

window.onload = initMap;
</script>
