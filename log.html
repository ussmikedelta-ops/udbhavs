<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Access | Udbhav Solar</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #020617; color: #f8fafc; }
        .bg-mesh {
            background-color: #020617;
            background-image:
                radial-gradient(at 0% 0%, hsla(222,47%,11%,1) 0, transparent 50%),
                radial-gradient(at 50% 0%, hsla(217,91%,60%,0.15) 0, transparent 50%),
                radial-gradient(at 100% 0%, hsla(25,95%,53%,0.1) 0, transparent 50%);
        }
        .form-glass { 
            background: rgba(255, 255, 255, 0.03); 
            backdrop-filter: blur(40px); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
        }
        .link-box {
            background: rgba(15, 23, 42, 0.6);
            border: 1px dashed rgba(249, 115, 22, 0.3);
        }
    </style>
</head>

<body class="bg-mesh min-h-screen flex items-center justify-center p-6">

    <div class="form-glass p-10 rounded-[2.5rem] max-w-md w-full shadow-2xl border border-orange-500/20 text-center">
        <div class="mb-8">
            <div class="w-16 h-16 bg-orange-500/10 rounded-2xl flex items-center justify-center mx-auto mb-4">
                <i data-lucide="key-round" class="text-orange-500 w-8 h-8"></i>
            </div>
            <h1 class="text-2xl font-black text-white uppercase tracking-tighter">Admin <span class="text-orange-500">Gateway</span></h1>
            <p class="text-slate-400 text-xs mt-2 font-medium uppercase tracking-widest">Udbhav Solar Solutions Ajmer</p>
        </div>

        <div class="space-y-6">
            <p class="text-sm text-slate-300 leading-relaxed">
                Generate a secure, time-sensitive link for the AI Bill Scanner. 
                <span class="text-orange-500 font-bold">Expires in 15 minutes.</span>
            </p>

            <button onclick="generateLink()" class="w-full bg-orange-600 hover:bg-orange-500 text-white py-5 rounded-2xl font-black uppercase tracking-[0.2em] shadow-xl transition-all active:scale-[0.98] flex items-center justify-center gap-3">
                Generate Access Link <i data-lucide="external-link" class="w-5 h-5"></i>
            </button>

            <div id="result-container" class="hidden space-y-4 animate-in fade-in zoom-in duration-300">
                <div class="link-box p-4 rounded-2xl text-left">
                    <p class="text-[9px] font-black text-orange-500 uppercase tracking-widest mb-2">Secure Link Generated:</p>
                    <div id="linkArea" class="text-[10px] text-slate-300 break-all font-mono bg-black/20 p-3 rounded-lg border border-white/5">
                        </div>
                </div>
                
                <button onclick="copyLink()" class="text-[10px] font-black text-white uppercase tracking-widest flex items-center justify-center gap-2 mx-auto hover:text-orange-500 transition-colors">
                    <i data-lucide="copy" class="w-3 h-3"></i> Copy to Clipboard
                </button>
            </div>
        </div>

        <footer class="mt-10 pt-6 border-t border-white/5">
            <p class="text-[9px] text-slate-600 font-black uppercase tracking-[0.3em]">Internal Use Only • 2026</p>
        </footer>
    </div>

    <script>
        lucide.createIcons();

        function generateLink() {
            // Get the current timestamp in seconds
            const ts = Math.floor(Date.now() / 1000);
            
            // Create the link pointing to index.html (your scanner page)
            // It assumes index.html is in the same folder as login.html
            const currentUrl = window.location.href;
            const baseUrl = currentUrl.substring(0, currentUrl.lastIndexOf('/'));
            const finalLink = baseUrl + '/index.html?t=' + ts;

            // Show UI elements
            document.getElementById('result-container').classList.remove('hidden');
            document.getElementById('linkArea').innerHTML = `<a href="${finalLink}" target="_blank" class="hover:text-orange-500 transition-colors">${finalLink}</a>`;
            
            // Refresh icons
            lucide.createIcons();
        }

        function copyLink() {
            const linkText = document.getElementById('linkArea').innerText;
            navigator.clipboard.writeText(linkText).then(() => {
                alert("Link copied! Send this to the client. It will expire in 15 minutes.");
            });
        }
    </script>

</body>
</html>
