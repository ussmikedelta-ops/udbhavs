<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Bill Scanner | Udbhav Solar Solutions</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #020617; color: #f8fafc; }
        .bg-mesh {
            background-color: #020617;
            background-image:
                radial-gradient(at 0% 0%, hsla(222,47%,11%,1) 0, transparent 50%),
                radial-gradient(at 50% 0%, hsla(217,91%,60%,0.15) 0, transparent 50%),
                radial-gradient(at 100% 0%, hsla(25,95%,53%,0.1) 0, transparent 50%);
        }
        .form-glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(40px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .cycle-btn { transition: all 0.3s ease; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.02); color: #94a3b8; }
        .cycle-btn.active { background: #f97316; color: white; border-color: #f97316; box-shadow: 0 0 20px rgba(249, 115, 22, 0.3); }
        .loading-pulse { animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
        .whatsapp-float { position: fixed; bottom: 24px; right: 24px; z-index: 2001; width: 60px; height: 60px; background-color: #25d366; border-radius: 50px; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 20px rgba(37, 211, 102, 0.4); }
    </style>
</head>

<body class="bg-mesh min-h-screen flex flex-col items-center">

<div id="security-dialog" class="fixed inset-0 z-[3000] flex items-center justify-center bg-slate-950/95 backdrop-blur-xl">
    <div class="form-glass p-10 rounded-[2.5rem] max-w-sm w-full mx-6 border border-orange-500/30 text-center shadow-2xl">
        <div class="mb-6">
            <div class="w-16 h-16 bg-orange-500/20 rounded-2xl flex items-center justify-center mx-auto mb-4">
                <i data-lucide="shield-check" class="text-orange-500 w-8 h-8"></i>
            </div>
            <h3 class="text-xl font-black text-white uppercase tracking-tight">Security Access</h3>
            <p class="text-slate-400 text-xs mt-2 font-medium tracking-wide">Udbhav Solar Solutions AI</p>
        </div>
        <div class="space-y-4">
            <div class="bg-white/5 border border-white/10 p-4 rounded-2xl flex items-center justify-center gap-3">
                <input type="checkbox" id="captcha-check" class="w-5 h-5 accent-orange-500 cursor-pointer">
                <label for="captcha-check" class="text-sm font-bold text-white cursor-pointer italic">Verify Human</label>
            </div>
            <button id="access-btn" disabled class="w-full bg-slate-800 text-slate-500 py-4 rounded-2xl font-black uppercase tracking-widest text-[10px] transition-all">
                Enter Scanner
            </button>
        </div>
    </div>
</div>

<header class="w-full py-6 px-8 flex justify-between items-center border-b border-white/5 bg-slate-950/50 backdrop-blur-md sticky top-0 z-50">
    <div class="flex flex-col">
        <span class="font-black text-white uppercase tracking-tighter text-xl leading-none">Udbhav Solar</span>
        <span class="text-[10px] font-bold text-orange-500 tracking-[0.3em] uppercase">AI Scanner</span>
    </div>
    <div class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Ajmer, Rajasthan</div>
</header>

<main class="max-w-2xl w-full px-6 py-12 mb-20">
    <div class="form-glass p-8 md:p-10 rounded-[2.5rem] shadow-2xl">
        <div class="text-center mb-8">
            <h2 class="text-3xl font-black text-white uppercase tracking-tighter">Scan Your <span class="text-orange-500">Bill.</span></h2>
            <p class="text-slate-400 text-sm mt-2">Bring your electricity bill to zero with AI.</p>
        </div>

        <div class="space-y-6">
            <div class="space-y-3">
                <label class="text-[9px] font-black text-slate-500 uppercase tracking-widest ml-1">Billing Cycle</label>
                <div class="grid grid-cols-2 gap-4">
                    <button id="cycle-30" onclick="setCycle(30)" class="cycle-btn py-4 rounded-2xl text-[10px] font-black uppercase tracking-widest active">30 Days</button>
                    <button id="cycle-60" onclick="setCycle(60)" class="cycle-btn py-4 rounded-2xl text-[10px] font-black uppercase tracking-widest">60 Days</button>
                </div>
            </div>

            <div class="space-y-3" onclick="document.getElementById('billInput').click()">
                <label class="text-[9px] font-black text-slate-500 uppercase tracking-widest ml-1">Upload Bill Photo</label>
                <div class="border-2 border-dashed border-white/10 rounded-2xl p-10 text-center hover:border-orange-500 transition-all bg-white/5 group cursor-pointer">
                    <input type="file" id="billInput" class="hidden" accept="image/*">
                    <i data-lucide="camera" class="w-10 h-10 text-orange-500 mx-auto mb-2"></i>
                    <p id="status-text" class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Tap to Take Photo</p>
                </div>
            </div>

            <button id="scanBtn" class="w-full bg-orange-600 hover:bg-orange-500 text-white py-5 rounded-2xl font-black uppercase tracking-[0.2em] shadow-2xl transition-all flex items-center justify-center gap-3">
                Start AI Analysis <i data-lucide="zap" class="w-5 h-5"></i>
            </button>

            <div id="loader" class="hidden text-center py-4">
                <p class="text-orange-500 text-[10px] font-black uppercase tracking-widest loading-pulse italic">AI is reading the bill...</p>
            </div>

            <div id="captcha-box" class="hidden mt-6 p-6 rounded-3xl bg-white/5 border border-white/10 space-y-4">
                <div class="flex justify-between items-center">
                    <h3 class="text-[10px] font-black text-orange-500 uppercase tracking-widest">Security Code</h3>
                    <span id="captcha-display" class="bg-orange-500/20 text-orange-500 px-4 py-1 rounded-lg font-black tracking-[0.3em]">XXXXXX</span>
                </div>
                <input type="text" id="captcha-input" placeholder="Enter the code" class="w-full bg-slate-900 border border-white/10 rounded-xl py-4 px-4 text-white text-center font-bold uppercase tracking-widest outline-none">
                <button id="verify-scan-btn" class="w-full bg-white text-black py-4 rounded-xl font-black uppercase tracking-widest text-[10px] hover:bg-orange-500 hover:text-white transition-all">
                    Confirm & Analyze
                </button>
            </div>

            <div id="result" class="hidden mt-8 p-6 rounded-3xl bg-white/5 border border-orange-500/30 space-y-4">
                <div class="flex justify-between items-center border-b border-white/10 pb-4">
                    <h3 class="text-[10px] font-black text-orange-500 uppercase tracking-widest">Bill Details Found</h3>
                    <i data-lucide="check-circle" class="w-4 h-4 text-green-500"></i>
                </div>
                <div id="output" class="text-white text-sm leading-relaxed whitespace-pre-line font-medium bg-black/20 p-4 rounded-xl">
                    </div>
                <div class="mt-4 p-6 bg-orange-600 rounded-2xl text-center shadow-xl">
                    <p class="text-[9px] font-black text-white/80 uppercase tracking-widest">Recommended Solar Plant</p>
                    <p id="plant-size" class="text-4xl font-black text-white italic">-- kW</p>
                </div>
            </div>
        </div>
    </div>
</main>

<a href="https://wa.me/919660711101" class="whatsapp-float" target="_blank">
    <svg width="32" height="32" fill="white" viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.395 0 .01 5.388 0 12.044c0 2.129.54 4.207 1.579 6.075L0 24l6.135-1.61a11.803 11.803 0 005.911 1.586h.005c6.654 0 12.05-5.39 12.056-12.047a11.82 11.82 0 00-3.536-8.509z"/></svg>
</a>

<script>
    lucide.createIcons();
    
    // --- SETTINGS ---
    const HF_API_URL = "https://udbhav121-bill.hf.space/analyze";
    let currentCycle = 30;

    // First Security logic
    const captchaCheck = document.getElementById('captcha-check');
    const accessBtn = document.getElementById('access-btn');
    captchaCheck.onchange = () => {
        accessBtn.disabled = !captchaCheck.checked;
        accessBtn.classList.toggle('bg-slate-800', !captchaCheck.checked);
        accessBtn.classList.toggle('bg-orange-600', captchaCheck.checked);
        accessBtn.classList.toggle('text-white', captchaCheck.checked);
    };
    accessBtn.onclick = () => document.getElementById('security-dialog').style.display = 'none';

    function setCycle(days) {
        currentCycle = days;
        document.querySelectorAll('.cycle-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById(`cycle-${days}`).classList.add('active');
    }

    function generateCaptcha() {
        return Math.random().toString(36).substring(2, 8).toUpperCase();
    }

    // Step 1: Generate Code
    document.getElementById('scanBtn').onclick = () => {
        if (!document.getElementById('billInput').files[0]) return alert("Select a bill image first!");
        document.getElementById('captcha-box').classList.remove('hidden');
        document.getElementById('captcha-display').innerText = generateCaptcha();
        document.getElementById('captcha-box').scrollIntoView({ behavior: 'smooth' });
    };

    // Step 2: Core Analysis & Calculation
    document.getElementById('verify-scan-btn').onclick = async () => {
        const userInput = document.getElementById('captcha-input').value.toUpperCase();
        const actualCode = document.getElementById('captcha-display').innerText;
        
        if (userInput !== actualCode) return alert("Incorrect Code!");

        document.getElementById('captcha-box').classList.add('hidden');
        const loader = document.getElementById('loader');
        const resDiv = document.getElementById('result');
        const outBox = document.getElementById('output');

        loader.classList.remove('hidden');
        resDiv.classList.add('hidden');

        try {
            const file = document.getElementById('billInput').files[0];
            const base64 = await toBase64(file);

            const response = await fetch(HF_API_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ base64_image: base64 })
            });

            const data = await response.json();
            
            // 1. Get content safely (handles different AI key names)
            const content = data.analysis || data.result || data.text || "Scanning complete but no text was returned.";

            // 2. Display the raw text
            outBox.innerHTML = content.replace(/\n/g, '<br>');

            // 3. IMPROVED CALC LOGIC (Cleans up the text first)
            // Remove ** symbols, commas, and the word "units"
            const cleaned = content.replace(/\*/g, '').replace(/,/g, '').replace(/units/gi, '');

            // Use flexible Regex to find numbers after keywords
            const avgMatch = cleaned.match(/(?:Avg|Average).*?[:\s-]*(\d+)/i);
            const unitMatch = cleaned.match(/(?:Total|Units|Consumed).*?[:\s-]*(\d+)/i);

            let val = 0;
            let cycle = currentCycle;

            if (avgMatch && avgMatch[1]) {
                val = parseInt(avgMatch[1]);
                cycle = 30; // Average is always per month
            } else if (unitMatch && unitMatch[1]) {
                val = parseInt(unitMatch[1]);
                cycle = currentCycle; // Consumption depends on button clicked
            }

            // 4. Update the Plant Size
            if (val > 0) {
                const kw = ((val / cycle) / 4).toFixed(1);
                document.getElementById('plant-size').innerText = kw + " kW";
            } else {
                document.getElementById('plant-size').innerText = "Check Bill";
            }

            // Show result
            resDiv.classList.remove('hidden');

        } catch (err) {
            console.error("Error:", err);
            alert("Connection error. Check your Hugging Face Space.");
        } finally {
            loader.classList.add('hidden');
        }
    };

    const toBase64 = f => new Promise((res, rej) => {
        const r = new FileReader();
        r.readAsDataURL(f);
        r.onload = () => res(r.result);
        r.onerror = e => rej(e);
    });
</script>
</body>
</html>
