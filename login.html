<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Portal | Udbhav Solar Solutions</title>
    <link rel="icon" type="image/jpeg" href="Donna Stroupe.jpg">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .glass-panel { 
            background: rgba(255, 255, 255, 0.9); 
            backdrop-filter: blur(12px); 
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        .solar-bg {
            background: linear-gradient(rgba(30, 58, 138, 0.8), rgba(30, 58, 138, 0.9)), 
                        url('SOLAR PANELS1.JPG');
            background-size: cover;
            background-position: center;
        }
    </style>
</head>
<body class="solar-bg min-h-screen flex items-center justify-center p-6">

    <div class="glass-panel w-full max-w-md rounded-[2.5rem] shadow-2xl overflow-hidden">
        <div class="p-8 md:p-12">
            
            <div class="flex flex-col items-center mb-10">
                <img src="udbhav.jpg" alt="Udbhav Logo" class="h-16 w-auto mb-4 rounded shadow-sm">
                <div class="text-center">
                    <h1 class="text-2xl font-black text-blue-900 uppercase tracking-tight">Employee Portal</h1>
                    <p class="text-[10px] font-bold text-orange-600 tracking-[0.3em] uppercase mt-1">Udbhav Solar Solutions</p>
                </div>
            </div>

            <form id="loginForm" class="space-y-5">
                <div>
                    <label class="block text-xs font-black text-blue-900 uppercase tracking-widest mb-2 ml-1">Employee ID</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-slate-400">
                            <i data-lucide="user" class="w-5 h-5"></i>
                        </span>
                        <input type="text" id="empId" placeholder="USS-EMP-001" required
                               class="w-full pl-12 pr-4 py-4 bg-white/50 border border-slate-200 rounded-2xl focus:ring-2 focus:ring-orange-500 outline-none transition-all font-medium text-slate-700">
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-black text-blue-900 uppercase tracking-widest mb-2 ml-1">Password</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-slate-400">
                            <i data-lucide="lock" class="w-5 h-5"></i>
                        </span>
                        <input type="password" id="password" placeholder="••••••••" required
                               class="w-full pl-12 pr-4 py-4 bg-white/50 border border-slate-200 rounded-2xl focus:ring-2 focus:ring-orange-500 outline-none transition-all font-medium text-slate-700">
                    </div>
                </div>

                <button type="submit" 
                        class="w-full bg-blue-900 text-white py-4 rounded-2xl font-black uppercase tracking-widest shadow-lg hover:bg-orange-600 transition-all active:scale-[0.98] mt-4 flex items-center justify-center gap-2">
                    Access Portal <i data-lucide="arrow-right" class="w-5 h-5"></i>
                </button>
            </form>

            <div class="mt-10 text-center">
                <a href="index.html" class="inline-flex items-center gap-2 text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] hover:text-blue-900 transition">
                    <i data-lucide="chevron-left" class="w-4 h-4"></i> Back to Main Website
                </a>
            </div>
        </div>
    </div>
<script>
    lucide.createIcons();

    const localEmployees = {
        "USS-EMP-001": { pass: "solar2026", name: "EKLAVYA" },
        "USS-EMP-002": { pass: "ajmer99", name: "RAJ KUMAR" },
        "admin": { pass: "udbhav123", name: "Administrator" },  "1": { pass: "1", name: "TEST" }  
    };

    const loginForm = document.getElementById('loginForm');

    loginForm.addEventListener('submit', function(e) {
        e.preventDefault();
        const empIdInput = document.getElementById('empId');
        const passwordInput = document.getElementById('password');
        
        const inputId = empIdInput.value;
        const inputPass = passwordInput.value;

        if (localEmployees[inputId] && localEmployees[inputId].pass === inputPass) {
            // SAVE THE NAME TO STORAGE
            sessionStorage.setItem("userName", localEmployees[inputId].name);
            alert("Login Successful! Welcome " + localEmployees[inputId].name);
            window.location.href = "portal.html"; 
        } else {
            alert("Invalid Credentials.");
            empIdInput.value = "";
            passwordInput.value = "";
            empIdInput.focus();
        }
    });
</script>
</body>
</html>
