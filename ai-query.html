<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> AI Solar Audit | Udbhav Solar</title>
    
    <link rel="icon" type="image/jpeg" href="Donna Stroupe.jpg">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script type="module">
        import { Client } from "https://cdn.jsdelivr.net/npm/@gradio/client/dist/index.min.js";
        window.GradioClient = Client;
    </script>

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #020617; color: #f8fafc; }
        .bg-mesh { 
            background-image: radial-gradient(at 0% 0%, hsla(222,47%,11%,1) 0, transparent 50%), 
                              radial-gradient(at 50% 0%, hsla(217,91%,60%,0.15) 0, transparent 50%); 
        }
        .form-glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(40px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .cycle-btn { transition: all 0.3s ease; }
        .cycle-btn.active { background: #f97316; color: white; border-color: #f97316; box-shadow: 0 0 20px rgba(249, 115, 22, 0.3); }
        .scanner-line { height: 2px; background: #f97316; width: 100%; position: absolute; top: 0; animation: scan 2s linear infinite; z-index: 10; }
        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }
    </style>
</head>
<body class="bg-mesh min-h-screen">

    <header class="w-full py-6 px-8 flex justify-between items-center border-b border-white/5 bg-slate-950/50 backdrop-blur-md sticky top-0 z-50">
        <div class="flex items-center gap-4">
            <img src="Donna Stroupe.jpg" class="h-10 w-10 rounded-full border-2 border-orange-500 shadow-lg shadow-orange-500/20">
            <div class="flex flex-col">
                <span class="font-black text-white uppercase text-lg leading-none">Udbhav Solar</span>
                <span class="text-[8px] font-bold text-orange-500 tracking-[0.3em] uppercase">Python AI Audit</span>
            </div>
        </div>
        <button onclick="location.reload()" class="text-xs font-black text-slate-400 uppercase tracking-widest hover:text-orange-500 transition-all">Reset Scan</button>
    </header>

    <main class="max-w-6xl mx-auto px-6 py-12">
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-16 items-start">
            
            <div class="space-y-8">
                <div class="inline-flex items-center gap-2 px-4 py-2 rounded-full bg-orange-500/10 border border-orange-500/20 text-orange-500 text-[10px] font-black uppercase tracking-widest">
                    <span class="w-2 h-2 rounded-full bg-orange-500 animate-pulse"></span> HF Space Connection Active
                </div>
                <h1 class="text-6xl lg:text-7xl font-black text-white leading-tight uppercase tracking-tighter">
                    AI Smart <br>
                    <span class="text-orange-500 italic">Audit.</span>
                </h1>
                <p class="text-slate-400 text-lg font-medium leading-relaxed max-w-lg">
                    Using the <b>udbhav121/ussgreen</b> Python engine to scan TPADL Ajmer bills with 101% precision.
                </p>
            </div>

            <div class="form-glass p-8 md:p-12 rounded-[3rem] relative overflow-hidden">
                <div id="upload-view" class="space-y-10">
                    <div class="text-center space-y-4">
                        <label class="block text-[10px] font-black text-slate-500 uppercase tracking-widest">1. Select Billing Cycle</label>
                        <div class="grid grid-cols-2 gap-4">
                            <button id="cycle-30" onclick="setCycle(30)" class="cycle-btn py-4 rounded-2xl border border-white/10 text-[10px] font-black uppercase">30 Days</button>
                            <button id="cycle-60" onclick="setCycle(60)" class="cycle-btn py-4 rounded-2xl border border-white/10 text-[10px] font-black uppercase active">60 Days</button>
                        </div>
                    </div>

                    <div class="space-y-4 text-center">
                        <label class="block text-[10px] font-black text-slate-500 uppercase tracking-widest">2. Share Bill Image</label>
                        <div onclick="document.getElementById('bill-input').click()" class="border-2 border-dashed border-white/10 rounded-[2.5rem] p-12 hover:border-orange-500 transition-all cursor-pointer bg-white/5 relative overflow-hidden group">
                            <div id="scan-bar" class="hidden scanner-line"></div>
                            <input type="file" id="bill-input" class="hidden" accept="image/*" onchange="processWithPython(event)">
                            <div class="flex flex-col items-center gap-6">
                                <i data-lucide="camera" class="w-12 h-12 text-orange-500 group-hover:scale-110 transition-transform"></i>
                                <div class="space-y-2">
                                    <p id="status-text" class="text-lg font-bold text-white uppercase tracking-tighter">Tap to Scan Bill</p>
                                    <p class="text-[10px] text-slate-500 font-bold uppercase tracking-widest">Optimized for Ajmer/MP Formats</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div id="result-view" class="hidden space-y-10 text-center animate-in fade-in duration-700">
                    <div class="w-20 h-20 bg-green-500/20 text-green-500 rounded-full flex items-center justify-center mx-auto mb-6 border border-green-500/30">
                        <i data-lucide="check-circle-2" class="w-10 h-10"></i>
                    </div>

                    <div class="space-y-2">
                        <h2 class="text-2xl font-black text-white uppercase">Analysis Successful</h2>
                        <p id="res-name" class="text-xl font-bold text-orange-500 italic">---</p>
                    </div>

                    <div class="grid grid-cols-2 gap-6 bg-white/5 p-8 rounded-[2.5rem] border border-white/5">
                        <div><p class="text-[9px] font-black text-slate-500 uppercase tracking-widest mb-2">Plant Size</p><p id="res-cap" class="text-5xl font-black text-white italic">--</p></div>
                        <div><p class="text-[9px] font-black text-slate-500 uppercase tracking-widest mb-2">Daily Gen</p><p id="res-gen" class="text-5xl font-black text-white italic">--</p></div>
                    </div>

                    <button onclick="shareToWhatsApp()" class="w-full bg-white text-black py-5 rounded-2xl font-black uppercase text-xs tracking-widest flex items-center justify-center gap-3 hover:bg-orange-500 hover:text-white transition-all shadow-xl">
                        <i data-lucide="send" class="w-4 h-4"></i> Get Quote on WhatsApp
                    </button>
                </div>
            </div>
        </div>
    </main>

    <script>
        lucide.createIcons();
        let currentCycle = 60;
        let detectedUnits = 0;
        let finalName = "Customer";
        const scriptURL = "https://script.google.com/macros/s/AKfycbwOwFXWaAq5j5ylSy19zbi7uz-ii33TkieCntYq23DP4SuTQojeFfJYm00YUL2zykzR7g/exec";

        function setCycle(days) {
            currentCycle = days;
            document.querySelectorAll('.cycle-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`cycle-${days}`).classList.add('active');
        }

        async function processWithPython(e) {
            const file = e.target.files[0];
            if(!file) return;

            document.getElementById('status-text').innerText = "Python AI Working...";
            document.getElementById('scan-bar').classList.remove('hidden');

            try {
                // Connecting to your specific Hugging Face Space
                const client = await GradioClient.connect("udbhav121/ussgreen");
                
                // Sending image to your 'analyze_bill' function in app.py
                const result = await client.predict("/predict", { 
                    image: file 
                });

                // Mapping outputs from your Python script
                // [name, address, units]
                finalName = result.data[0] || "Valued Client";
                const finalAddr = result.data[1] || "Ajmer Site";
                detectedUnits = parseInt(result.data[2]) || 450;

                // Solar Math
                const kwNeeded = (detectedUnits / currentCycle) / 4;
                const dailyGen = kwNeeded * 4;

                // Update UI
                document.getElementById('res-cap').innerHTML = kwNeeded.toFixed(1) + ' <span class="text-sm">kW</span>';
                document.getElementById('res-gen').innerHTML = dailyGen.toFixed(1) + ' <span class="text-sm text-orange-500">U</span>';
                document.getElementById('res-name').innerText = "Hello, " + finalName + "!";
                
                document.getElementById('upload-view').classList.add('hidden');
                document.getElementById('result-view').classList.remove('hidden');

                // Log data to Google Sheets
                const formData = new FormData();
                formData.append("Full Name", finalName);
                formData.append("Address", finalAddr);
                formData.append("Requirements", `PYTHON AI: ${kwNeeded.toFixed(1)}kW for ${detectedUnits} units.`);
                
                fetch(scriptURL, { method: 'POST', body: formData });

            } catch (err) {
                console.error(err);
                alert("AI Brain is busy. Please try one more time!");
                document.getElementById('status-text').innerText = "Tap to Scan Bill";
                document.getElementById('scan-bar').classList.add('hidden');
            }
        }

        function shareToWhatsApp() {
            const kw = (detectedUnits / currentCycle / 4).toFixed(1);
            const msg = `Hello Udbhav Solar! My name is ${finalName}. My bill usage is ${detectedUnits} units. The AI recommended a ${kw}kW system for me. Please provide a formal quote.`;
            window.open(`https://wa.me/919660711101?text=${encodeURIComponent(msg)}`);
        }
    </script>
</body>
</html>
