    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: #020617;
            color: #f8fafc;
            overflow-x: hidden;
        }

        /* Modern Gradient Background */
        .bg-mesh {
            background-color: #020617;
            background-image:
                radial-gradient(at 0% 0%, hsla(222,47%,11%,1) 0, transparent 50%),
                radial-gradient(at 50% 0%, hsla(217,91%,60%,0.15) 0, transparent 50%),
                radial-gradient(at 100% 0%, hsla(25,95%,53%,0.1) 0, transparent 50%);
        }

        .glass {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .form-glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(40px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .trust-card {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid rgba(255, 255, 255, 0.05);
            background: rgba(255, 255, 255, 0.02);
        }

        .trust-card:hover {
            transform: translateY(-8px) scale(1.02);
            background: rgba(255, 255, 255, 0.08);
            border-color: #f97316;
            box-shadow: 0 20px 25px -5px rgba(249, 115, 22, 0.1);
        }

        .input-style {
            background: rgba(30, 41, 59, 0.5) !important;
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white !important;
            transition: all 0.3s ease;
        }

        .input-style:focus {
            background: rgba(30, 41, 59, 0.8) !important;
            border-color: #f97316;
            box-shadow: 0 0 0 4px rgba(249, 115, 22, 0.1);
            outline: none;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .animate-float {
            animation: float 4s ease-in-out infinite;
        }

        .glow-text {
            text-shadow: 0 0 20px rgba(249, 115, 22, 0.5);
        }

        /* Pulsing Glow for Toggle Button */
        @keyframes pulse-orange {
            0% { box-shadow: 0 0 0 0 rgba(249, 115, 22, 0.4); }
            70% { box-shadow: 0 0 0 20px rgba(249, 115, 22, 0); }
            100% { box-shadow: 0 0 0 0 rgba(249, 115, 22, 0); }
        }
        .pulse-btn {
            animation: pulse-orange 2s infinite;
        }

        /* Captcha Styles */
        .captcha-box {
            background: rgba(249, 115, 22, 0.1);
            letter-spacing: 4px;
            text-decoration: line-through;
            font-style: italic;
            user-select: none;
        }
    
        body { margin: 0; overflow: hidden; background: #020617; color: #f8fafc; font-family: 'Segoe UI', Tahoma, sans-serif; transition: background-color 0.5s; }
        #canvas-container { width: 100vw; height: 100vh; position: absolute; z-index: 1; }
        
        /* Floating Top Controls */
        #top-controls { position: absolute; top: 15px; left: 50%; transform: translateX(-50%); z-index: 20; display: flex; gap: 10px; background: rgba(15, 23, 42, 0.7); padding: 8px 15px; border-radius: 30px; backdrop-filter: blur(5px); border: 1px solid #334155; }
        .toggle-btn { background: #1e293b; color: #cbd5e1; border: 1px solid #475569; padding: 6px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; cursor: pointer; transition: 0.2s; text-transform: uppercase; letter-spacing: 0.5px;}
        .toggle-btn:hover { background: #0ea5e9; color: white; border-color: #0ea5e9;}
        .active-btn { background: #0ea5e9; color: white; border-color: #0ea5e9;}

        /* Panels */
        .panel { position: absolute; background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(12px); border: 1px solid #334155; border-radius: 8px; z-index: 10; padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); overflow-y: auto; max-height: 85vh; transition: 0.3s opacity, 0.3s transform; }
        #ui-panel { top: 70px; left: 20px; width: 350px; }
        #results-panel { top: 70px; right: 20px; width: 380px; border-color: #0ea5e9; display: none; }
        
        /* Inputs & Form */
        .input-group { margin-bottom: 12px; }
        label { display: block; font-size: 11px; font-weight: 600; color: #94a3b8; text-transform: uppercase; margin-bottom: 4px; }
        input, select { width: 100%; background: #1e293b; border: 1px solid #475569; color: white; padding: 8px; border-radius: 4px; font-size: 13px; outline: none; }
        input:focus, select:focus { border-color: #0ea5e9; }
        .section-title { font-size: 12px; font-weight: 800; color: #0ea5e9; border-bottom: 1px solid #334155; padding-bottom: 5px; margin: 20px 0 10px 0; text-transform: uppercase; }
        
        .action-btn { width: 100%; background: #0ea5e9; color: white; padding: 12px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.2s; text-transform: uppercase; margin-top: 15px; }
        .action-btn:hover { background: #0284c7; }
        
        .data-row { display: flex; justify-content: space-between; border-bottom: 1px solid #334155; padding: 6px 0; font-size: 12px; }
        .data-val { font-weight: bold; font-family: monospace; color: #38bdf8; }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 3px; }
    </style>

<body>
<header class="w-full z-50 py-6 px-8 flex justify-between items-center border-b border-white/5 bg-slate-950/50 backdrop-blur-md">
        <div class="flex items-center gap-4">
            <img src="Donna Stroupe.jpg" alt="Udbhav Solar" class="h-12 w-12 rounded-full border-2 border-orange-500 shadow-lg shadow-orange-500/20">
            <div class="flex flex-col">
                <span class="font-black text-white uppercase tracking-tighter text-xl leading-none">Udbhav Solar</span>
                <span class="text-[10px] font-bold text-orange-500 tracking-[0.3em] uppercase">Solutions</span>
            </div>
        </div>
        <a href="index.html" class="flex items-center gap-2 text-xs font-black text-slate-400 uppercase tracking-widest hover:text-orange-500 transition-all">
            <i data-lucide="home" class="w-4 h-4"></i> Home
        </a>

    <div id="canvas-container"></div>

    <div id="top-controls">
        <button id="btn-ui" class="toggle-btn active-btn" onclick="togglePanel('ui-panel', 'btn-ui')">Input Data</button>
        <button id="btn-rpt" class="toggle-btn" onclick="togglePanel('results-panel', 'btn-rpt')">PE Report</button>
        <button id="btn-theme" class="toggle-btn" onclick="toggleTheme()">☀️ Day Mode</button>
    </div>

    <div id="ui-panel" class="panel">
        <h2 class="text-xl font-black mb-1">PRO Solar Engineer</h2>
        <p class="text-[10px] text-slate-400 mb-2 border-b border-slate-700 pb-2">Multi-Profile Steel Configuration</p>
        
        <div class="section-title">Leg Heights (Feet)</div>
        <div class="grid grid-cols-2 gap-2">
            <div class="input-group">
                <label>Front Leg (ft)</label>
                <input type="number" id="hFront" value="4.0" step="0.5" onchange="generateStructure()">
            </div>
            <div class="input-group">
                <label>Back Leg (ft)</label>
                <input type="number" id="hBack" value="8.0" step="0.5" onchange="generateStructure()">
            </div>
        </div>
        
        <div class="section-title">Array Sizing</div>
        <div class="grid grid-cols-2 gap-2">
            <div class="input-group">
                <label>Total Panels</label>
                <input type="number" id="pTotal" value="12" min="1" step="1" onchange="generateStructure()">
            </div>
            <div class="input-group">
                <label>Panels Per Row</label>
                <input type="number" id="pPerRow" value="6" min="1" step="1" onchange="generateStructure()">
            </div>
        </div>
        <p class="text-[9px] text-slate-400 mt-1 uppercase text-center bg-slate-800 p-1 rounded">Panel Specs: 8ft x 4ft (66 lbs / 30kg)</p>

        <div class="section-title">Site Parameters</div>
        <div class="input-group">
            <label>Location / Wind Speed</label>
            <select id="windZone">
                <option value="90">Standard Inland (90 mph)</option>
                <option value="110">Coastal / High Wind (110 mph)</option>
                <option value="150">Hurricane Zone (150 mph)</option>
            </select>
        </div>
        <div class="input-group">
            <label>Structure Attachment</label>
            <select id="wallAttached" onchange="generateStructure()">
                <option value="no">Freestanding (Ground/Flat Roof)</option>
                <option value="yes">Anchored to Rear Wall</option>
            </select>
        </div>

        <button onclick="runEngineeringCalculation()" class="action-btn">Calculate BOM & Physics</button>
    </div>

    <div id="results-panel" class="panel">
        <h3 class="text-lg font-black text-white mb-2 uppercase tracking-wide border-b border-sky-500 pb-2">Engineering Report</h3>
        <div id="report-content"></div>
    </div>

    <script>
        // --- UI TOGGLES ---
        function togglePanel(panelId, btnId) {
            const panel = document.getElementById(panelId);
            const btn = document.getElementById(btnId);
            if (panel.style.display === 'none' || panel.style.display === '') {
                panel.style.display = 'block';
                btn.classList.add('active-btn');
            } else {
                panel.style.display = 'none';
                btn.classList.remove('active-btn');
            }
        }

        // --- THREE.JS INITIALIZATION ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color('#020617'); // Start in Night mode
        
        const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(25, 15, 25);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        container.appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.target.set(0, 5, 0);

        // Lighting Variables
        let ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        let dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(20, 50, 20);
        dirLight.castShadow = true;
        scene.add(ambientLight);
        scene.add(dirLight);

        // Grid
        let gridHelper = new THREE.GridHelper(100, 100, 0x1e293b, 0x0f172a);
        scene.add(gridHelper);

        // Materials
        const legMat = new THREE.MeshStandardMaterial({ color: 0x94a3b8, metalness: 0.7, roughness: 0.3 });
        const rafMat = new THREE.MeshStandardMaterial({ color: 0xcbd5e1, metalness: 0.8, roughness: 0.2 });
        const purMat = new THREE.MeshStandardMaterial({ color: 0xe2e8f0, metalness: 0.9, roughness: 0.1 });
        const panelMat = new THREE.MeshStandardMaterial({ color: 0x0f172a, metalness: 0.9, roughness: 0.1, transparent: true, opacity: 0.9 });
        const wallMat = new THREE.MeshStandardMaterial({ color: 0x334155, transparent: true, opacity: 0.4 });

        let structureGroup = new THREE.Group();
        scene.add(structureGroup);

        // --- DAY/NIGHT TOGGLE ---
        let isDayMode = false;
        function toggleTheme() {
            isDayMode = !isDayMode;
            const btn = document.getElementById('btn-theme');
            if(isDayMode) {
                scene.background = new THREE.Color('#e0f2fe'); // Sky blue
                ambientLight.intensity = 1.2; // Bright ambient
                dirLight.intensity = 1.5;
                gridHelper.material.color.setHex(0x94a3b8); // Lighter grid
                btn.innerText = "🌙 Night Mode";
                btn.classList.add('active-btn');
            } else {
                scene.background = new THREE.Color('#020617'); // Dark slate
                ambientLight.intensity = 0.4;
                dirLight.intensity = 0.8;
                gridHelper.material.color.setHex(0x1e293b); // Dark grid
                btn.innerText = "☀️ Day Mode";
                btn.classList.remove('active-btn');
            }
        }

        // --- CONSTANTS & SPECS ---
        const PANEL_W = 4.0; // ft
        const PANEL_H = 8.0; // ft
        const PANEL_WT_LBS = 66.1; // 30kg
        const MAX_STEEL_SPAN = 12.1; // ft (Allows 3 panels of 4ft each plus a small margin)

        // Explicit Pipe Dimensions (converted to feet for 3D generation)
        // Leg: 3" x 3"
        const LEG_W = 3.0 / 12; 
        const LEG_D = 3.0 / 12;
        // Rafter: 1.57" width x 2.36" depth (stood up vertically for strength)
        const RAF_W = 1.57 / 12; 
        const RAF_D = 2.36 / 12;
        // Purlin: 2" x 2"
        const PUR_W = 2 / 12;
        const PUR_D = 2 / 12;

        let simData = {}; // Stores calculated lengths and weights

        function createProfile(length, width_ft, depth_ft, material) {
            let geo = new THREE.BoxGeometry(width_ft, length, depth_ft);
            let mesh = new THREE.Mesh(geo, material);
            mesh.castShadow = true;
            mesh.receiveShadow = true;
            return mesh;
        }

        function generateStructure() {
            // Clear Scene
            while(structureGroup.children.length > 0){ structureGroup.remove(structureGroup.children[0]); }
            
            // Reset Data
            simData = { lenLeg: 0, lenRaf: 0, lenPur: 0, numLegs: 0, numRafters: 0, wallAnchors: 0, tiltDeg: 0 };

            // Fetch Inputs
            const hF = parseFloat(document.getElementById('hFront').value);
            const hB = parseFloat(document.getElementById('hBack').value);
            const pTotal = parseInt(document.getElementById('pTotal').value);
            const pPerRow = parseInt(document.getElementById('pPerRow').value);
            const useWall = document.getElementById('wallAttached').value === 'yes';

            const numRows = Math.ceil(pTotal / pPerRow);
            const totalWidth = pPerRow * PANEL_W;
            const rafterLength = numRows * PANEL_H;
            
            // MATH: Calculate Tilt Angle based on Front/Back leg difference
            // Must ensure the height diff isn't longer than the rafter itself.
            let heightDiff = hB - hF;
            if (Math.abs(heightDiff) >= rafterLength) {
                heightDiff = (rafterLength * 0.9) * Math.sign(heightDiff); // Clamp it so math doesn't break
            }
            
            const tiltRad = Math.asin(heightDiff / rafterLength);
            simData.tiltDeg = tiltRad * (180 / Math.PI);
            
            const spanDepth = Math.cos(tiltRad) * rafterLength;
            
            // Calculate number of support frames needed
            const numLegPairs = Math.max(2, Math.ceil(totalWidth / MAX_STEEL_SPAN) + 1);
            const legSpacing = totalWidth / (numLegPairs - 1);
            simData.numLegs = numLegPairs * 2;
            simData.numRafters = numLegPairs;
            
            const zFront = spanDepth / 2;
            const zBack = -spanDepth / 2;

            // Optional Rear Wall Render
            if(useWall) {
                let wallHeight = Math.max(hB + 2, hF + 2);
                let wallMesh = new THREE.Mesh(new THREE.BoxGeometry(totalWidth + 4, wallHeight, 1), wallMat);
                wallMesh.position.set(0, wallHeight/2, zBack - 1);
                structureGroup.add(wallMesh);
                simData.wallAnchors = numLegPairs;
            }

            // 1. GENERATE LEGS & RAFTERS
            for(let i = 0; i < numLegPairs; i++) {
                let xPos = (-totalWidth/2) + (i * legSpacing);

                // Front Leg (3x3)
                let fLeg = createProfile(hF, LEG_W, LEG_D, legMat);
                fLeg.position.set(xPos, hF/2, zFront);
                structureGroup.add(fLeg);
                simData.lenLeg += hF;

                // Back Leg (3x3)
                let bLeg = createProfile(hB, LEG_W, LEG_D, legMat);
                bLeg.position.set(xPos, hB/2, zBack);
                structureGroup.add(bLeg);
                simData.lenLeg += hB;

                // Rafter (1.57 x 2.36)
                let rafter = createProfile(rafterLength, RAF_W, RAF_D, rafMat);
                rafter.rotation.x = tiltRad + Math.PI/2;
                rafter.position.set(xPos, hF + (heightDiff/2) + (LEG_W/2), 0); // Offset to sit on top of legs
                structureGroup.add(rafter);
                simData.lenRaf += rafterLength;

                // Cross Bracing for stability if tall and no wall
                if (Math.max(hF, hB) > 5 && !useWall && i < numLegPairs - 1) {
                    const braceLen = Math.sqrt(Math.pow(legSpacing, 2) + Math.pow(hB, 2));
                    const angle = Math.atan2(hB, legSpacing);
                    
                    let brace1 = createProfile(braceLen, PUR_W, PUR_D, purMat);
                    brace1.position.set(xPos + legSpacing/2, hB/2, zBack);
                    brace1.rotation.z = Math.PI/2 - angle;
                    structureGroup.add(brace1);
                    simData.lenPur += braceLen;
                }
            }

            // 2. GENERATE PURLINS (1.57 x 1.57)
            const numPurlins = numRows * 2; // 2 mounting rails per row of panels
            for(let p = 0; p < numPurlins; p++) {
                let purlin = createProfile(totalWidth, PUR_W, PUR_D, purMat);
                purlin.rotation.z = Math.PI/2;
                purlin.rotation.x = tiltRad;
                
                let frac = (p + 0.5) / numPurlins;
                let zPos = zFront - (frac * spanDepth);
                let yPos = hF + (zFront - zPos) * Math.tan(tiltRad) + LEG_W + (RAF_D);
                
                purlin.position.set(0, yPos, zPos);
                structureGroup.add(purlin);
                simData.lenPur += totalWidth;
            }

            // 3. GENERATE PANELS
            let panelsDrawn = 0;
            const startX = -(totalWidth/2) + (PANEL_W/2);
            for(let r = 0; r < numRows; r++) {
                for(let c = 0; c < pPerRow; c++) {
                    if (panelsDrawn >= pTotal) break;
                    let xPos = startX + (c * PANEL_W);
                    let frac = (r + 0.5) / numRows;
                    let zPos = zFront - (frac * spanDepth);
                    let yPos = hF + (zFront - zPos) * Math.tan(tiltRad) + LEG_W + RAF_D + (PUR_D);

                    let pMesh = new THREE.Mesh(new THREE.BoxGeometry(PANEL_W - 0.05, 0.12, PANEL_H - 0.05), panelMat);
                    pMesh.position.set(xPos, yPos, zPos);
                    pMesh.rotation.x = tiltRad;
                    structureGroup.add(pMesh);
                    panelsDrawn++;
                }
            }
        }

        function runEngineeringCalculation() {
            const V = parseFloat(document.getElementById('windZone').value);
            const pTotal = parseInt(document.getElementById('pTotal').value);
            const useWall = document.getElementById('wallAttached').value === 'yes';

            // Fixed Linear Weights (lbs per linear foot, standard 2mm / 14-gauge structural steel)
            const wt_leg = 4.88; // 3x3x0.125
            const wt_raf = 2.04; // 2.36x1.57x0.08
            const wt_pur = 1.63; // 1.57x1.57x0.08

            // 1. DEAD LOADS (Total Weights)
            const wLegsTotal = simData.lenLeg * wt_leg;
            const wRafTotal = simData.lenRaf * wt_raf;
            const wPurTotal = simData.lenPur * wt_pur;
            const wPanelsTotal = pTotal * PANEL_WT_LBS;
            
            const totalSteelWt = wLegsTotal + wRafTotal + wPurTotal;
            const deadLoad_lbs = totalSteelWt + wPanelsTotal;

            // 2. WIND PHYSICS
            const qz = 0.00256 * 1.0 * 0.85 * Math.pow(V, 2); // Velocity Pressure
            const totalArea_sqft = pTotal * (PANEL_W * PANEL_H);
            
            let Cp = 1.2;
            if(Math.abs(simData.tiltDeg) > 25) Cp = 1.5;
            if(useWall) Cp = 1.8; // Wall stagnation

            const normalForce = qz * totalArea_sqft * Cp;
            const tiltRad = simData.tiltDeg * (Math.PI / 180);
            
            const upliftForce = normalForce * Math.cos(tiltRad); // Vertical pull
            let shearForce = normalForce * Math.sin(tiltRad); // Horizontal push
            if(useWall) shearForce = shearForce * 0.1; // Wall takes 90% of lateral load

            // 3. BALLASTING (Factor of Safety = 1.5)
            const reqResistForce = upliftForce * 1.5;
            let deficit = reqResistForce - deadLoad_lbs;
            let concretePerLeg = 0;
            if(deficit > 0) {
                concretePerLeg = Math.ceil(deficit / simData.numLegs);
            }

            // HTML Report Generation
            const rpt = document.getElementById('report-content');
            rpt.innerHTML = `
                <div class="data-row bg-slate-800 px-2 rounded mt-2"><span>Calculated Tilt Angle:</span> <span class="data-val text-white">${simData.tiltDeg.toFixed(1)}°</span></div>
                
                <div class="text-[11px] text-sky-400 font-bold uppercase tracking-widest mb-1 mt-4">Bill of Materials (BOM)</div>
                <div class="data-row"><span>Panels (8x4, 30kg):</span> <span class="data-val">${pTotal} pcs</span></div>
                <div class="data-row"><span>Legs (3"x3"):</span> <span class="data-val">${simData.lenLeg.toFixed(1)} ft</span></div>
                <div class="data-row"><span>Rafters (2.36"x1.57"):</span> <span class="data-val">${simData.lenRaf.toFixed(1)} ft</span></div>
                <div class="data-row"><span>Purlins (1.57"x1.57"):</span> <span class="data-val">${simData.lenPur.toFixed(1)} ft</span></div>
                <div class="data-row"><span>Total Steel Weight:</span> <span class="data-val text-yellow-400">${totalSteelWt.toFixed(0)} lbs</span></div>
                ${useWall ? `<div class="data-row"><span>Wall Anchors Req:</span> <span class="data-val text-yellow-400">${simData.wallAnchors}</span></div>` : ''}

                <div class="text-[11px] text-sky-400 font-bold uppercase tracking-widest mb-1 mt-4">ASCE 7-22 Forces</div>
                <div class="data-row"><span>System Dead Load:</span> <span class="data-val">${deadLoad_lbs.toFixed(0)} lbs</span></div>
                <div class="data-row"><span>Wind Uplift (Up):</span> <span class="data-val text-red-400">${upliftForce.toFixed(0)} lbs</span></div>
                <div class="data-row"><span>Base Shear (Lateral):</span> <span class="data-val text-orange-400">${shearForce.toFixed(0)} lbs</span></div>
                
                <div class="mt-4 p-3 ${concretePerLeg > 0 ? 'bg-red-900/40 border-red-500' : 'bg-emerald-900/40 border-emerald-500'} rounded border">
                    <div class="text-xs text-slate-300 font-bold uppercase mb-2">Foundation Needed</div>
                    ${concretePerLeg > 0 
                        ? `<span class="text-xl font-black text-white">${concretePerLeg} lbs</span> <span class="text-sm text-slate-400">concrete per leg</span><br><span class="text-[10px] text-red-300 block mt-1">Required to achieve 1.5 Safety Factor against wind uplift.</span>`
                        : `<span class="text-emerald-400 font-bold">Structure is Self-Ballasted.</span><span class="text-[10px] text-emerald-200 block mt-1">Dead weight is sufficient to resist max wind uplift.</span>`
                    }
                </div>
            `;
            
            // Show report panel and set active button
            document.getElementById('results-panel').style.display = 'block';
            document.getElementById('btn-rpt').classList.add('active-btn');
        }

        // Window resize handler
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Render Loop
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }

        // Initialize
        generateStructure();
        animate();
    </script>
</body>
</html>
