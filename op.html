<!DOCTYPE html>
<html lang="en">
<head>
<script>
    /**
     * UDBHAV SECURITY PROTOCOL: SIR ACCESS CONTROL
     * 1. Validates Admin Session
     * 2. Validates Entry Origin (Must come from control.html)
     */
    (function() {
        const isLoggedIn = sessionStorage.getItem("isSolarAdmin") === "true";
        const cameFromControl = document.referrer.includes("control.html");

        // If not logged in OR accessed directly/wrongly, kick back to panel
        if (!isLoggedIn || !cameFromControl) {
            console.warn("Security Alert: Unauthorized access attempt to SIR.");
            window.location.replace("panel.html");
        }
    })();
</script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Operator Dashboard | Udbhav Solar</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Urbanist:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        :root {
            --bg-dark: #020617;
            --orange-main: #f97316;
            --green-main: #22c55e;
            --red-main: #ef4444;
            --text-muted: #94a3b8;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: 'Urbanist', sans-serif; 
            background-color: var(--bg-dark); 
            color: #f8fafc; 
            min-height: 100vh;
        }

        .main-header {
            width: 100%; padding: 20px 40px; display: flex; justify-content: space-between; align-items: center;
            background: rgba(2, 6, 23, 0.8); border-bottom: 1px solid var(--glass-border);
        }
        .brand-text { font-family: 'Plus Jakarta Sans', sans-serif; font-weight: 800; font-size: 20px; text-transform: uppercase; }
        .brand-text span { color: var(--orange-main); }

        .dashboard-container {
            max-width: 1100px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .header-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .glass-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            overflow-x: auto;
        }

        /* Table Styling */
        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            min-width: 800px;
        }
        th {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-muted);
            padding: 15px;
            border-bottom: 1px solid var(--glass-border);
        }
        td {
            padding: 20px 15px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            font-weight: 500;
        }
        tr:last-child td { border-bottom: none; }
        tr:hover { background: rgba(255,255,255,0.02); }

        .ref-badge {
            background: rgba(249, 115, 22, 0.1);
            color: var(--orange-main);
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 800;
        }

        .status-pending { color: #eab308; font-weight: 700; font-size: 14px; }

        .action-buttons {
            display: flex;
            gap: 8px;
        }

        .btn-convert {
            background: rgba(34, 197, 94, 0.1);
            color: var(--green-main);
            border: 1px solid rgba(34, 197, 94, 0.3);
            padding: 8px 16px;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 12px;
        }
        .btn-convert:hover:not(:disabled) {
            background: var(--green-main);
            color: white;
            box-shadow: 0 0 15px rgba(34, 197, 94, 0.4);
        }

        .btn-close {
            background: rgba(239, 68, 68, 0.1);
            color: var(--red-main);
            border: 1px solid rgba(239, 68, 68, 0.3);
            padding: 8px 16px;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 12px;
        }
        .btn-close:hover:not(:disabled) {
            background: var(--red-main);
            color: white;
            box-shadow: 0 0 15px rgba(239, 68, 68, 0.4);
        }

        .btn-convert:disabled, .btn-close:disabled { opacity: 0.5; cursor: not-allowed; }

        .empty-state { text-align: center; padding: 40px; color: var(--text-muted); }
        .loader { border: 2px solid transparent; border-top: 2px solid white; border-radius: 50%; width: 14px; height: 14px; animation: spin 1s linear infinite; display: inline-block; vertical-align: middle; margin-right: 5px; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <header class="main-header">
        <div class="brand-text">Udbhav Solar <span>Operator</span></div>
        <div style="font-size: 12px; font-weight: 700; color: var(--text-muted);"><i class="fa-solid fa-shield-halved"></i> Secure Connection</div>
    </header>

    <div class="dashboard-container">
        
        <div class="header-section">
            <div>
                <h1 style="font-family: 'Plus Jakarta Sans'; font-size: 32px; margin-bottom: 5px;">Lead Control Center</h1>
                <p style="color: var(--text-muted);">Manage, convert, or close pending references.</p>
            </div>
            <button onclick="loadPendingLeads()" style="background: var(--glass-bg); border: 1px solid var(--glass-border); color: white; padding: 10px 20px; border-radius: 100px; cursor: pointer; transition: 0.3s;">
                <i class="fa-solid fa-rotate-right"></i> Refresh Data
            </button>
        </div>

        <div class="glass-card">
            <table id="leads-table">
                <thead>
                    <tr>
                        <th>Ref ID</th>
                        <th>Referred By</th>
                        <th>Lead Name</th>
                        <th>Lead Contact</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="table-body">
                    <tr><td colspan="6" class="empty-state">Loading leads...</td></tr>
                </tbody>
            </table>
        </div>

    </div>

    <script>
        // --- PASTE YOUR APP SCRIPT URL HERE ---
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyz2OH0JvLRM414ltbsoJSlDOV--5ags2jIU1gq6DaNeajJD7oRDCPyV-sr2QCiavjQ/exec";

        window.onload = loadPendingLeads;

        async function loadPendingLeads() {
            const tbody = document.getElementById('table-body');
            tbody.innerHTML = `<tr><td colspan="6" class="empty-state"><div class="loader"></div> Synchronizing with Master Database...</td></tr>`;

            try {
                const res = await fetch(`${SCRIPT_URL}?action=getPendingLeads`);
                const data = await res.json();
                
                if (data.status === 'success') {
                    if (data.data.length === 0) {
                        tbody.innerHTML = `<tr><td colspan="6" class="empty-state"><i class="fa-solid fa-check-circle" style="font-size: 30px; color: var(--green-main); margin-bottom: 10px; display: block;"></i>All caught up! No pending leads.</td></tr>`;
                        return;
                    }

                    tbody.innerHTML = '';
                    data.data.forEach(lead => {
                        const tr = document.createElement('tr');
                        tr.id = `row-${lead.row}`;
                        tr.innerHTML = `
                            <td><span class="ref-badge">${lead.refId}</span></td>
                            <td>${lead.clientName}</td>
                            <td style="color: white; font-weight: 700;">${lead.leadName}</td>
                            <td>${lead.leadPhone}</td>
                            <td class="status-pending"><i class="fa-regular fa-clock"></i> Pending</td>
                            <td>
                                <div class="action-buttons" id="actions-${lead.row}">
                                    <button class="btn-convert" onclick="updateLeadStatus(${lead.row}, 'Converted', this)">
                                        <i class="fa-solid fa-check"></i> Convert
                                    </button>
                                    <button class="btn-close" onclick="updateLeadStatus(${lead.row}, 'Closed', this)">
                                        <i class="fa-solid fa-xmark"></i> Close
                                    </button>
                                </div>
                            </td>
                        `;
                        tbody.appendChild(tr);
                    });
                }
            } catch (err) {
                tbody.innerHTML = `<tr><td colspan="6" class="empty-state" style="color: #ef4444;">Connection failed. Please check network.</td></tr>`;
            }
        }

        async function updateLeadStatus(rowNum, newStatus, btnElement) {
            let confirmMessage = newStatus === 'Converted' 
                ? "Are you sure you want to mark this lead as CONVERTED? This will grant a reward to the referrer."
                : "Are you sure you want to mark this lead as CLOSED? This lead was unsuccessful.";
            
            if(!confirm(confirmMessage)) return;

            // Disable all buttons in this row to prevent duplicate clicks
            const actionDiv = document.getElementById(`actions-${rowNum}`);
            const buttons = actionDiv.querySelectorAll('button');
            buttons.forEach(b => b.disabled = true);

            const originalText = btnElement.innerHTML;
            btnElement.innerHTML = `<div class="loader"></div> Updating...`;

            try {
                const p = new URLSearchParams();
                p.append('action', 'updateStatus');
                p.append('row', rowNum);
                p.append('status', newStatus);

                const res = await fetch(SCRIPT_URL, { method: 'POST', body: p });
                const data = await res.json();

                if (data.status === 'success') {
                    // Remove row from UI with a small fade animation
                    const row = document.getElementById(`row-${rowNum}`);
                    row.style.transition = "opacity 0.3s ease";
                    row.style.opacity = '0';
                    setTimeout(() => { row.remove(); }, 300);
                } else {
                    alert("Error updating sheet.");
                    buttons.forEach(b => b.disabled = false);
                    btnElement.innerHTML = originalText;
                }
            } catch (err) {
                alert("Network error.");
                buttons.forEach(b => b.disabled = false);
                btnElement.innerHTML = originalText;
            }
        }
    </script>
</body>
</html>
