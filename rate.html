    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: #020617;
            color: #f8fafc;
            overflow-x: hidden;
        }

        .bg-mesh {
            background-color: #020617;
            background-image:
                radial-gradient(at 0% 0%, hsla(222,47%,11%,1) 0, transparent 50%),
                radial-gradient(at 50% 0%, hsla(217,91%,60%,0.15) 0, transparent 50%),
                radial-gradient(at 100% 0%, hsla(25,95%,53%,0.1) 0, transparent 50%);
        }

        .glass {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .card-glass {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(40px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .input-style {
            background: rgba(30, 41, 59, 0.4) !important;
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white !important;
            transition: all 0.3s ease;
        }

        .input-style:focus {
            background: rgba(30, 41, 59, 0.7) !important;
            border-color: #f97316;
            outline: none;
            box-shadow: 0 0 15px rgba(249, 115, 22, 0.1);
        }

        .row-hover:hover {
            background: rgba(249, 115, 22, 0.03);
        }

        /* Glowing Button Effects */
        .glow-orange {
            box-shadow: 0 0 20px rgba(249, 115, 22, 0.2);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .glow-orange:hover {
            box-shadow: 0 0 40px rgba(249, 115, 22, 0.4);
            transform: translateY(-5px);
        }

        .glow-blue {
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.2);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .glow-blue:hover {
            box-shadow: 0 0 40px rgba(59, 130, 246, 0.4);
            transform: translateY(-5px);
        }

        .panel-hidden {
            display: none;
            opacity: 0;
            transform: translateY(-20px);
            transition: all 0.3s ease;
        }

        .panel-visible {
            display: block;
            opacity: 1;
            transform: translateY(0);
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #020617; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #f97316; }
    </style>
