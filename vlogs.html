<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solar Vlogs & News | Udbhav Solar Solutions</title>

    <link rel="icon" type="image/jpeg" href="Donna Stroupe.jpg">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        html { scroll-behavior: smooth; }
        .glass-morphism { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        .vlog-card { transition: all 0.3s ease; border: 1px solid #f1f5f9; }
        .vlog-card:hover { transform: translateY(-5px); border-color: #f97316; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        
        #content-modal.active { display: flex; }
        .modal-animate { animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 selection:bg-orange-100">

    <div id="content-modal" class="fixed inset-0 bg-slate-900/90 z-[100] hidden items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white w-full max-w-2xl rounded-[2.5rem] overflow-hidden shadow-2xl modal-animate flex flex-col max-h-[85vh]">
            <div class="p-8 overflow-y-auto">
                <div class="flex justify-between items-start mb-6">
                    <div>
                        <span id="m-category" class="text-[10px] font-black text-orange-600 uppercase tracking-widest mb-1 block">Category</span>
                        <h3 id="m-title" class="text-3xl font-black text-blue-900 leading-tight">Post Title</h3>
                    </div>
                    <button onclick="closeContentModal()" class="bg-slate-100 p-2 rounded-full hover:bg-red-50 hover:text-red-500 transition">
                        <i data-lucide="x" class="w-6 h-6"></i>
                    </button>
                </div>
                
                <img id="m-image" src="" class="w-full h-64 object-cover rounded-3xl mb-8 border border-slate-100">
                
                <div id="m-desc" class="text-slate-600 leading-relaxed space-y-4 font-medium">
                    </div>

                <div id="m-link-container" class="mt-10 p-6 bg-slate-50 rounded-2xl border border-slate-100 hidden">
                    <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">Attached Link:</p>
                    <a id="m-link" href="#" target="_blank" class="text-blue-600 font-bold break-all hover:underline flex items-center gap-2">
                        <i data-lucide="link" class="w-4 h-4"></i>
                        <span id="m-link-text"></span>
                    </a>
                </div>
            </div>
            <div class="p-6 bg-slate-50 border-t border-slate-100 flex justify-end">
                <button onclick="closeContentModal()" class="bg-blue-900 text-white px-8 py-3 rounded-xl font-bold text-xs uppercase tracking-widest hover:bg-orange-600 transition">Close Reader</button>
            </div>
        </div>
    </div>

    <nav class="glass-morphism fixed w-full z-40 border-b border-gray-200">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-20 items-center">
                <div class="flex items-center gap-3">
                    <img src="Donna Stroupe.jpg" alt="Logo" class="h-10 w-10 rounded-full border-2 border-orange-500 object-cover">
                    <div class="flex flex-col">
                        <span class="font-black text-blue-900 uppercase tracking-tight text-md leading-none">Udbhav Solar</span>
                    </div>
                </div>
                <div class="flex space-x-6 font-bold text-[10px] text-slate-600 uppercase tracking-widest">
                    <a href="index.html" class="hover:text-orange-500 transition">Home</a>
                    <a href="vlogs.html" class="text-orange-600">Vlogs</a>
                </div>
            </div>
        </div>
    </nav>

    <main class="pt-32 pb-16 px-6">
        <div class="max-w-7xl mx-auto">
            <header class="text-center mb-16">
                <h1 class="text-[10px] font-black text-orange-600 uppercase tracking-[0.4em] mb-4">Udbhav Solar Portal</h1>
                <h2 class="text-4xl md:text-5xl font-black text-blue-900 uppercase italic">Vlogs & <span class="text-orange-500">Updates</span></h2>
            </header>

            <section id="featured-section" class="mb-20 hidden">
                <div class="aspect-video rounded-[2.5rem] overflow-hidden shadow-2xl border-8 border-white bg-slate-200 max-w-4xl mx-auto">
                    <iframe id="featured-video-iframe" class="w-full h-full" src="" frameborder="0" allowfullscreen></iframe>
                </div>
            </section>

            <section>
                <div id="vlogs-grid" class="grid md:grid-cols-3 gap-8">
                    </div>
            </section>
        </div>
    </main>

    <script>
        lucide.createIcons();

        let allVlogs = [];

        function openContentModal(index) {
            const vlog = allVlogs[index];
            const modal = document.getElementById('content-modal');
            
            document.getElementById('m-category').innerText = vlog.category || "Solar News";
            document.getElementById('m-title').innerText = vlog.title;
            document.getElementById('m-image').src = vlog.thumbnail || vlog.image;
            document.getElementById('m-desc').innerHTML = vlog.description.replace(/\n/g, '<br>');

            const linkContainer = document.getElementById('m-link-container');
            const linkTag = document.getElementById('m-link');
            const linkText = document.getElementById('m-link-text');
            const actualLink = vlog.link || vlog.url;

            if (actualLink && actualLink.trim() !== "") {
                linkContainer.classList.remove('hidden');
                linkTag.href = actualLink;
                linkText.innerText = actualLink;
            } else {
                linkContainer.classList.add('hidden');
            }

            modal.classList.remove('hidden');
            modal.classList.add('flex');
            document.body.style.overflow = 'hidden';
            lucide.createIcons();
        }

        function closeContentModal() {
            const modal = document.getElementById('content-modal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
            document.body.style.overflow = '';
        }

        function renderVlogs(data) {
            const grid = document.getElementById('vlogs-grid');
            grid.innerHTML = data.map((vlog, index) => `
                <div class="vlog-card bg-white rounded-[2rem] overflow-hidden flex flex-col shadow-sm">
                    <div class="h-48 overflow-hidden">
                        <img src="${vlog.thumbnail || vlog.image}" class="w-full h-full object-cover">
                    </div>
                    <div class="p-6 flex flex-col flex-grow">
                        <span class="text-[9px] font-black text-orange-500 uppercase tracking-[0.2em] mb-2">${vlog.category || 'Update'}</span>
                        <h4 class="text-lg font-black text-blue-900 mb-3 leading-tight">${vlog.title}</h4>
                        <p class="text-slate-500 text-xs font-medium mb-6 line-clamp-3">${vlog.description}</p>
                        
                        <button onclick="openContentModal(${index})" class="mt-auto inline-flex items-center gap-2 text-blue-900 font-black text-[10px] uppercase tracking-widest hover:text-orange-600 transition">
                            Read More <i data-lucide="chevron-right" class="w-3 h-3"></i>
                        </button>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        function loadData() {
            allVlogs = JSON.parse(localStorage.getItem('solar_vlogs') || '[]');
            const videoId = localStorage.getItem('solar_featured_video');
            
            if(videoId) {
                document.getElementById('featured-section').classList.remove('hidden');
                document.getElementById('featured-video-iframe').src = `https://www.youtube.com/embed/${videoId}`;
            }

            renderVlogs(allVlogs);
        }

        window.onload = loadData;
    </script>
</body>
</html>
