<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Udbhav Solar Solutions Ajmer| Vlogs & Updates</title>
    <link rel="icon" type="image/png" href="unnamed.jpg">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background-color: #0f172a; color: #f8fafc; }
        .glow-orange { border-color: #f97316; box-shadow: 0 0 20px rgba(249, 115, 22, 0.3); }
        .vlog-card:hover { transform: translateY(-5px); border-color: #f97316; box-shadow: 0 0 25px rgba(249, 115, 22, 0.2); }
        .modal-bg { background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(8px); }
        /* Custom Scrollbar for the detail modal */
        #modal-content-area::-webkit-scrollbar { width: 6px; }
        #modal-content-area::-webkit-scrollbar-track { background: #1e293b; }
        #modal-content-area::-webkit-scrollbar-thumb { background: #f97316; border-radius: 10px; }
    </style>
</head>
<body class="font-sans antialiased">

    <nav class="fixed w-full z-50 bg-[#0f172a]/80 backdrop-blur-md border-b border-slate-800 h-20 flex items-center px-8 justify-between">
        <div class="flex items-center gap-3">
            
            <div class="w-10 h-10 bg-orange-500 rounded-full flex items-center justify-center shadow-[0_0_15px_#f97316]"><img src="Donna Stroupe.jpg" class="w-full h-full object-cover rounded-full" alt="Logo"></div>
                
            <span class="font-black text-white tracking-tighter uppercase">Udbhav Solar Solutions</span>
        </div>
        <a href="index.html" class="text-xs font-bold text-slate-400 hover:text-orange-500 transition">BACK TO HOME</a>
    </nav>

    <main class="pt-32 pb-20 max-w-7xl mx-auto px-6">
        <div id="featured-box" class="hidden mb-20">
            <h2 class="text-center text-[10px] font-black text-orange-500 uppercase tracking-[0.4em] mb-6">Must Watch Today</h2>
            <div class="aspect-video max-w-5xl mx-auto rounded-3xl overflow-hidden glow-orange bg-black border-2">
                <iframe id="main-player" class="w-full h-full" frameborder="0" allowfullscreen></iframe>
            </div>
        </div>

        <div class="flex flex-wrap justify-center gap-3 mb-12">
            <button onclick="filter('all')" class="cat-btn active px-6 py-2 rounded-full border border-slate-700 text-xs font-bold uppercase hover:border-orange-500 transition">All</button>
            <button onclick="filter('News')" class="cat-btn px-6 py-2 rounded-full border border-slate-700 text-xs font-bold uppercase hover:border-orange-500 transition">News</button>
            <button onclick="filter('Installation')" class="cat-btn px-6 py-2 rounded-full border border-slate-700 text-xs font-bold uppercase hover:border-orange-500 transition">Installation</button>
            <button onclick="filter('Technical Guide')" class="cat-btn px-6 py-2 rounded-full border border-slate-700 text-xs font-bold uppercase hover:border-orange-500 transition">Technical</button>
        </div>

        <div id="vlog-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>

        <h2 class="mt-24 text-2xl font-black border-l-4 border-orange-500 pl-4 mb-8">INSTALLATION GALLERY</h2>
        <div id="photo-grid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-4"></div>
    </main>

    <div id="detail-modal" class="fixed inset-0 z-[60] modal-bg hidden flex items-center justify-center p-4">
        <div class="bg-[#1e293b] border border-slate-700 w-full max-w-4xl rounded-3xl overflow-hidden h-[90vh] flex flex-col relative shadow-2xl">
            <button onclick="closeModal()" class="absolute top-4 right-4 bg-black/50 p-2 rounded-full text-white z-[70] hover:bg-orange-600 transition"><i data-lucide="x"></i></button>
            
            <div id="modal-video-wrap" class="shrink-0 aspect-video bg-black hidden">
                <iframe id="modal-player" class="w-full h-full" frameborder="0" allowfullscreen></iframe>
            </div>

            <div id="modal-content-area" class="p-8 overflow-y-auto flex-1 bg-gradient-to-b from-[#1e293b] to-[#0f172a]">
                <img id="modal-img" src="" onclick="zoomPhoto(this.src)" class="w-full h-auto max-h-[500px] object-contain rounded-2xl mb-6 hidden cursor-zoom-in border border-slate-700 shadow-lg">
                
                <span id="modal-cat" class="text-orange-500 text-[10px] font-black uppercase tracking-widest px-2 py-1 bg-orange-500/10 rounded-md"></span>
                <h2 id="modal-title" class="text-3xl font-black mt-4 mb-6 text-white"></h2>
                
                <div class="w-12 h-1 bg-orange-500 mb-6 rounded-full"></div>
                
                <div id="modal-link-wrapper" class="mb-6 hidden">
                    <a id="modal-external-link" href="#" target="_blank" class="inline-flex items-center gap-2 text-orange-500 hover:text-orange-400 font-bold text-sm bg-orange-500/10 px-4 py-2 rounded-lg transition">
                        <i data-lucide="external-link" class="w-4 h-4"></i>
                        WATCH ON YOUTUBE
                    </a>
                </div>

                <p id="modal-desc" class="text-slate-300 text-lg leading-relaxed whitespace-pre-wrap pb-10"></p>
            </div>
        </div>
    </div>

    <div id="zoom-modal" class="fixed inset-0 z-[100] bg-black/95 hidden flex items-center justify-center p-4 cursor-zoom-out" onclick="this.classList.add('hidden')">
        <button class="absolute top-8 right-8 text-white p-2 bg-white/10 rounded-full hover:bg-red-600 transition"><i data-lucide="x"></i></button>
        <img id="zoomed-image" src="" class="max-w-full max-h-full rounded-lg shadow-2xl object-contain animate-in zoom-in duration-300">
    </div>

    <script>
        let vlogs = [];
        let photos = [];

        function getYouTubeID(url) {
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            const match = (url || "").match(regExp);
            return (match && match[2].length === 11) ? match[2] : null;
        }

        function init() {
            vlogs = JSON.parse(localStorage.getItem('solar_vlogs') || '[]');
            photos = JSON.parse(localStorage.getItem('solar_photos') || '[]');
            
            const featUrl = localStorage.getItem('featured_video');
            if(featUrl) {
                const vid = getYouTubeID(featUrl);
                if(vid) {
                    document.getElementById('main-player').src = `https://www.youtube.com/embed/${vid}`;
                    document.getElementById('featured-box').classList.remove('hidden');
                }
            }

            renderVlogs(vlogs);
            renderPhotos();
        }

        function renderVlogs(data) {
            const grid = document.getElementById('vlog-grid');
            grid.innerHTML = data.map((v, i) => `
                <div class="vlog-card bg-[#1e293b] rounded-3xl border border-slate-800 overflow-hidden cursor-pointer flex flex-col transition" onclick="openDetails(${i})">
                    <img src="${v.image || 'udbhav.jpg'}" class="h-48 w-full object-cover">
                    <div class="p-6">
                        <span class="text-orange-500 font-bold text-[9px] uppercase">${v.category}</span>
                        <h3 class="text-lg font-black mt-1 line-clamp-2">${v.title}</h3>
                        <p class="text-slate-400 text-xs mt-3 line-clamp-2">${v.description}</p>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        function renderPhotos() {
            document.getElementById('photo-grid').innerHTML = photos.map(p => `
                <div class="aspect-square rounded-2xl overflow-hidden border border-slate-800 hover:border-orange-500 transition cursor-zoom-in group" onclick="zoomPhoto('${p.url}')">
                    <img src="${p.url}" class="w-full h-full object-cover group-hover:scale-110 transition duration-500">
                </div>
            `).join('');
            lucide.createIcons();
        }

        function zoomPhoto(src) {
            const zModal = document.getElementById('zoom-modal');
            document.getElementById('zoomed-image').src = src;
            zModal.classList.remove('hidden');
        }

        function openDetails(idx) {
            const v = vlogs[idx];
            const modal = document.getElementById('detail-modal');
            const videoId = getYouTubeID(v.link);
            const linkWrapper = document.getElementById('modal-link-wrapper');
            const externalLink = document.getElementById('modal-external-link');
            
            document.getElementById('modal-cat').innerText = v.category;
            document.getElementById('modal-title').innerText = v.title;
            document.getElementById('modal-desc').innerText = v.description;
            
            // Check for valid YouTube link for external button
            if(v.link && (v.link.includes('youtube.com') || v.link.includes('youtu.be'))) {
                externalLink.href = v.link;
                linkWrapper.classList.remove('hidden');
            } else {
                linkWrapper.classList.add('hidden');
            }

            // Reset scroll position to top
            document.getElementById('modal-content-area').scrollTop = 0;

            if(videoId) {
                document.getElementById('modal-player').src = `https://www.youtube.com/embed/${videoId}?autoplay=1`;
                document.getElementById('modal-video-wrap').classList.remove('hidden');
                document.getElementById('modal-img').classList.add('hidden');
            } else {
                document.getElementById('modal-player').src = '';
                document.getElementById('modal-video-wrap').classList.add('hidden');
                document.getElementById('modal-img').src = v.image || 'udbhav.jpg';
                document.getElementById('modal-img').classList.remove('hidden');
            }
            
            modal.classList.remove('hidden');
            document.body.style.overflow = 'hidden'; // Lock background scroll
            lucide.createIcons();
        }

        function closeModal() {
            document.getElementById('detail-modal').classList.add('hidden');
            document.getElementById('modal-player').src = '';
            document.body.style.overflow = 'auto'; // Unlock background scroll
        }

        function filter(cat) {
            const buttons = document.querySelectorAll('.cat-btn');
            buttons.forEach(btn => {
                if(btn.innerText.toLowerCase() === cat.toLowerCase() || (cat === 'all' && btn.innerText.toLowerCase() === 'all')) {
                    btn.classList.add('border-orange-500', 'text-orange-500');
                } else {
                    btn.classList.remove('border-orange-500', 'text-orange-500');
                }
            });
            renderVlogs(cat === 'all' ? vlogs : vlogs.filter(v => v.category === cat));
        }

        window.onload = init;
    </script>
</body>
</html>
