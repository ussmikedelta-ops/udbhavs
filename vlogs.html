<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solar Vlogs & News | Udbhav Solar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .filter-btn.active { background: #f97316; color: white; border-color: #f97316; }
        .vlog-card { transition: transform 0.3s ease; border: 1px solid #f1f5f9; }
        .vlog-card:hover { transform: translateY(-5px); border-color: #f97316; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <nav class="fixed w-full z-50 bg-white/90 backdrop-blur-md border-b h-20 flex items-center px-6 justify-between">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-orange-500 rounded-full flex items-center justify-center text-white"><i data-lucide="sun"></i></div>
            <span class="font-black text-blue-900 uppercase">Udbhav Solar</span>
        </div>
        <a href="index.html" class="text-xs font-bold text-slate-500 hover:text-orange-500 transition">BACK TO HOME</a>
    </nav>

    <main class="pt-32 pb-20 max-w-7xl mx-auto px-6">
        <div id="featured-section" class="hidden mb-16">
            <h2 class="text-center text-[10px] font-black text-orange-600 uppercase tracking-widest mb-6">Featured Vlog</h2>
            <div class="aspect-video max-w-4xl mx-auto rounded-[2.5rem] overflow-hidden shadow-2xl border-4 border-white bg-black">
                <iframe id="featured-iframe" class="w-full h-full" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
            </div>
        </div>

        <div class="flex flex-wrap justify-center gap-3 mb-12">
            <button onclick="filterContent('all')" class="filter-btn active px-6 py-2 rounded-full border-2 text-xs font-bold uppercase transition">All</button>
            <button onclick="filterContent('News')" class="filter-btn px-6 py-2 rounded-full border-2 text-xs font-bold uppercase transition">News</button>
            <button onclick="filterContent('Project')" class="filter-btn px-6 py-2 rounded-full border-2 text-xs font-bold uppercase transition">Projects</button>
            <button onclick="filterContent('Subsidy')" class="filter-btn px-6 py-2 rounded-full border-2 text-xs font-bold uppercase transition">Subsidy</button>
        </div>

        <div id="vlog-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
    </main>

    <script>
        let allVlogs = [];

        function getYoutubeEmbedUrl(url) {
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            const match = url.match(regExp);
            const id = (match && match[2].length === 11) ? match[2] : null;
            return id ? `https://www.youtube.com/embed/${id}` : null;
        }

        function loadPage() {
            allVlogs = JSON.parse(localStorage.getItem('solar_vlogs') || '[]');
            const featUrl = localStorage.getItem('featured_vlog_url');

            if (featUrl) {
                const embedUrl = getYoutubeEmbedUrl(featUrl);
                if (embedUrl) {
                    document.getElementById('featured-iframe').src = embedUrl;
                    document.getElementById('featured-section').classList.remove('hidden');
                }
            }
            render(allVlogs);
        }

        function render(data) {
            const grid = document.getElementById('vlog-grid');
            grid.innerHTML = data.map(v => `
                <div class="vlog-card bg-white rounded-[2.5rem] overflow-hidden flex flex-col shadow-sm">
                    <img src="${v.thumbnail || v.image}" class="h-48 w-full object-cover">
                    <div class="p-6 flex flex-col flex-grow">
                        <span class="text-[9px] font-black text-orange-500 uppercase mb-2">${v.category || 'Update'}</span>
                        <h3 class="text-lg font-black text-blue-900 mb-2 leading-tight">${v.title}</h3>
                        <p class="text-slate-500 text-xs line-clamp-3 mb-6">${v.description}</p>
                        <a href="${v.link || v.url}" target="_blank" class="mt-auto text-[10px] font-bold text-blue-900 hover:text-orange-600 uppercase flex items-center gap-2">
                            Watch/Read Full <i data-lucide="external-link" class="w-3 h-3"></i>
                        </a>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        function filterContent(cat) {
            document.querySelectorAll('.filter-btn').forEach(btn => {
                const isMatch = btn.innerText.toLowerCase() === cat.toLowerCase() || (cat === 'all' && btn.innerText === 'All');
                btn.classList.toggle('active', isMatch);
            });
            render(cat === 'all' ? allVlogs : allVlogs.filter(v => v.category === cat));
        }

        window.onload = loadPage;
    </script>
</body>
</html>
