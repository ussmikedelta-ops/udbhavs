<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Solar Structure Pro - JS Physics Engine (Imperial / Feet)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #0f172a; color: white; font-family: sans-serif; }
        #canvas-container { width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; z-index: 1; }
        #ui-panel { position: absolute; top: 20px; left: 20px; width: 400px; height: calc(100vh - 40px); background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(10px); border: 1px solid #334155; border-radius: 12px; z-index: 10; overflow-y: auto; padding: 20px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
        #results-panel { position: absolute; top: 20px; right: 20px; width: 350px; background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(10px); border: 1px solid #3b82f6; border-radius: 12px; z-index: 10; padding: 20px; display: none; box-shadow: 0 0 20px rgba(59, 130, 246, 0.2); }
        .input-group { margin-bottom: 10px; }
        .input-group label { display: block; font-size: 10px; font-weight: bold; color: #94a3b8; text-transform: uppercase; margin-bottom: 3px; }
        .input-group input, .input-group select { width: 100%; background: #1e293b; border: 1px solid #475569; color: white; padding: 6px; border-radius: 4px; outline: none; font-size: 12px; }
        .input-group input:focus { border-color: #3b82f6; }
        .section-title { font-size: 12px; font-weight: black; color: #3b82f6; border-bottom: 1px solid #334155; padding-bottom: 4px; margin-top: 15px; margin-bottom: 10px; text-transform: uppercase; }
        .btn { width: 100%; background: #3b82f6; color: white; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.2s; margin-top: 15px; text-transform: uppercase; letter-spacing: 1px;}
        .btn-green { background: #10b981; }
        .btn-green:hover { background: #059669; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 3px; }
    </style>
</head>
<body>

    <div id="canvas-container"></div>

    <div id="ui-panel">
        <h2 class="text-xl font-black mb-1">Structure Configurator</h2>
        <p class="text-xs text-slate-400 mb-2">Parametric 3D Generation & JS Physics Calculator</p>
        
        <div class="section-title">Structure Dimensions (Feet)</div>
        <div class="grid grid-cols-2 gap-2">
            <div class="input-group">
                <label>Front Leg Height (ft)</label>
                <input type="number" id="hFront" value="5.0" step="0.5" onchange="generateStructure()">
            </div>
            <div class="input-group">
                <label>Back Leg Height (ft)</label>
                <input type="number" id="hBack" value="10.0" step="0.5" onchange="generateStructure()">
            </div>
            <div class="input-group">
                <label>Rafter Length (ft)</label>
                <input type="number" id="lRafter" value="16.5" step="0.5" onchange="generateStructure()">
            </div>
            <div class="input-group">
                <label>Purlin Length/Width (ft)</label>
                <input type="number" id="lPurlin" value="20.0" step="0.5" onchange="generateStructure()">
            </div>
            <div class="input-group">
                <label>Number of Leg Pairs</label>
                <input type="number" id="numLegs" value="3" step="1" min="2" onchange="generateStructure()">
            </div>
        </div>

        <div class="section-title">Pipe Specifications (Inches)</div>
        <div class="grid grid-cols-2 gap-2">
            <div class="input-group">
                <label>Pipe Width/Dia (in)</label>
                <input type="number" id="pipeWidth" value="3.15" step="0.1" onchange="generateStructure()">
            </div>
            <div class="input-group">
                <label>Pipe Thickness (in)</label>
                <input type="number" id="pipeThick" value="0.1" step="0.01" onchange="generateStructure()">
            </div>
        </div>

        <div class="section-title">Panel Array Setup</div>
        <div class="grid grid-cols-2 gap-2">
            <div class="input-group">
                <label>Panel Height (ft)</label>
                <input type="number" id="pHeight" value="7.5" step="0.1" onchange="generateStructure()">
            </div>
            <div class="input-group">
                <label>Panel Width (ft)</label>
                <input type="number" id="pWidth" value="3.7" step="0.1" onchange="generateStructure()">
            </div>
            <div class="input-group">
                <label>Panels Per Row</label>
                <input type="number" id="pPerRow" value="5" step="1" onchange="generateStructure()">
            </div>
            <div class="input-group">
                <label>Total Panels</label>
                <input type="number" id="pTotal" value="10" step="1" onchange="generateStructure()">
            </div>
            <div class="input-group">
                <label>Panel Weight (lbs)</label>
                <input type="number" id="pWeight" value="62" step="1">
            </div>
        </div>

        <div class="section-title">Environmental Forces</div>
        <div class="grid grid-cols-1 gap-2">
            <div class="input-group">
                <label>Design Wind Speed (mph)</label>
                <input type="number" id="windSpeed" value="90" step="5">
            </div>
        </div>

        <div class="flex justify-between items-center bg-black/50 p-3 rounded-lg mt-4 border border-slate-700">
            <span class="text-xs text-slate-400 font-bold uppercase">Tilt Angle:</span>
            <span id="display-angle" class="text-lg font-black text-orange-400">0.0°</span>
        </div>

        <button onclick="runLocalAnalysis()" class="btn btn-green">Calculate Strength & Loads</button>
    </div>

    <div id="results-panel">
        <h3 class="text-lg font-black border-b border-slate-700 pb-2 mb-3 text-white">Structural Report (Imperial)</h3>
        <div id="report-content" class="text-sm space-y-2 text-slate-300 font-mono"></div>
        <button onclick="document.getElementById('results-panel').style.display='none'" class="mt-4 w-full bg-slate-700 hover:bg-slate-600 p-2 rounded text-xs font-bold text-white transition-colors">Close Report</button>
    </div>

    <script>
        // Three.js Setup
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color('#020617');
        
        // Scaled camera position for Feet measurements
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(40, 30, 40);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        container.appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.target.set(0, 5, 0);

        // Lighting
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(30, 60, 30);
        dirLight.castShadow = true;
        scene.add(dirLight);

        // Materials
        const steelMat = new THREE.MeshStandardMaterial({ color: 0x94a3b8, metalness: 0.8, roughness: 0.3 });
        const groundMat = new THREE.MeshStandardMaterial({ color: 0x1e293b });
        const panelMat = new THREE.MeshStandardMaterial({ color: 0x0f172a, emissive: 0x020617, transparent: true, opacity: 0.9, metalness: 0.7, roughness: 0.1 });
        const lineMat = new THREE.LineBasicMaterial({ color: 0x3b82f6 }); // For grid lines on panels

        // Groups
        let structureGroup = new THREE.Group();
        let panelsGroup = new THREE.Group();
        scene.add(structureGroup);
        scene.add(panelsGroup);

        // Ground Plane (Scaled to 300x300 feet)
        const ground = new THREE.Mesh(new THREE.PlaneGeometry(300, 300), groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        scene.add(ground);

        // Global state for calculations
        let totalSteelLength = 0; // In feet

        function createPipe(length, width_ft) {
            let geo = new THREE.BoxGeometry(width_ft, length, width_ft);
            let mesh = new THREE.Mesh(geo, steelMat);
            mesh.castShadow = true;
            mesh.receiveShadow = true;
            totalSteelLength += length;
            return mesh;
        }

        function generateStructure() {
            // Clear existing geometry
            while(structureGroup.children.length > 0){ structureGroup.remove(structureGroup.children[0]); }
            while(panelsGroup.children.length > 0){ panelsGroup.remove(panelsGroup.children[0]); }
            totalSteelLength = 0;

            // Fetch Inputs (Feet)
            const hF = parseFloat(document.getElementById('hFront').value);
            const hB = parseFloat(document.getElementById('hBack').value);
            let lRafter = parseFloat(document.getElementById('lRafter').value);
            const lPurlin = parseFloat(document.getElementById('lPurlin').value);
            const numLegPairs = parseInt(document.getElementById('numLegs').value);
            
            // Convert Inches to Feet for 3D Geometry
            const pipeW_ft = parseFloat(document.getElementById('pipeWidth').value) / 12;
            
            const pHeight = parseFloat(document.getElementById('pHeight').value); // length along rafter
            const pWidth = parseFloat(document.getElementById('pWidth').value); // length along purlin
            const pTotal = parseInt(document.getElementById('pTotal').value);
            const pPerRow = parseInt(document.getElementById('pPerRow').value);

            // Mathematical Validation for Rafter
            const heightDiff = hB - hF;
            if (lRafter <= Math.abs(heightDiff)) {
                lRafter = Math.abs(heightDiff) + 1.5; // Auto-correct to make triangle possible
                document.getElementById('lRafter').value = lRafter.toFixed(1);
            }

            // Calculate Geometry
            const spanDepth = Math.sqrt(Math.pow(lRafter, 2) - Math.pow(heightDiff, 2));
            const angleRad = Math.atan2(heightDiff, spanDepth);
            const angleDeg = (angleRad * 180) / Math.PI;
            document.getElementById('display-angle').innerText = angleDeg.toFixed(1) + '°';

            const zFront = spanDepth / 2;
            const zBack = -spanDepth / 2;

            // 1. Draw Legs
            for(let i = 0; i < numLegPairs; i++) {
                // Distribute legs evenly along the purlin length (X-axis)
                let xPos = (numLegPairs > 1) ? (-lPurlin/2 + i * (lPurlin / (numLegPairs - 1))) : 0;

                // Front Leg
                let frontLeg = createPipe(hF, pipeW_ft);
                frontLeg.position.set(xPos, hF/2, zFront);
                structureGroup.add(frontLeg);

                // Back Leg
                let backLeg = createPipe(hB, pipeW_ft);
                backLeg.position.set(xPos, hB/2, zBack);
                structureGroup.add(backLeg);

                // 2. Draw Rafters directly over each leg pair
                let rafter = createPipe(lRafter, pipeW_ft);
                rafter.rotation.x = angleRad + Math.PI/2;
                rafter.position.set(xPos, (hF + hB)/2, 0);
                structureGroup.add(rafter);
            }

            // Calculate rows needed
            const numRows = Math.ceil(pTotal / pPerRow);
            
            // 3. Draw Purlins (Horizontal beams)
            // Typically 2 purlins per row of panels
            const numPurlins = numRows * 2; 
            
            for(let r = 0; r < numRows; r++) {
                for(let pLine = 0; pLine < 2; pLine++) {
                    let purlin = createPipe(lPurlin, pipeW_ft);
                    purlin.rotation.z = Math.PI/2;
                    purlin.rotation.x = angleRad;
                    
                    // Position along the rafter
                    // Offset based on row and upper/lower mounting points
                    let fractionAlongRafter = (r + (pLine === 0 ? 0.25 : 0.75)) / numRows; 
                    
                    // Convert fraction to Z and Y coordinates
                    let zPos = zFront - (fractionAlongRafter * spanDepth);
                    let yPos = hF + (zFront - zPos) * Math.tan(angleRad) + pipeW_ft; // Add pipe width to sit on top
                    
                    purlin.position.set(0, yPos, zPos);
                    structureGroup.add(purlin);
                }
            }

            // 4. Draw Panels
            let panelsDrawn = 0;
            // Total width of the panel array
            const totalArrayWidth = pPerRow * pWidth;
            const startX = -(totalArrayWidth / 2) + (pWidth / 2);

            for(let r = 0; r < numRows; r++) {
                for(let c = 0; c < pPerRow; c++) {
                    if (panelsDrawn >= pTotal) break;

                    let xPos = startX + (c * pWidth);
                    
                    // Center of the panel along the rafter
                    let fractionAlongRafter = (r + 0.5) / numRows;
                    let zPos = zFront - (fractionAlongRafter * spanDepth);
                    let yPos = hF + (zFront - zPos) * Math.tan(angleRad) + (pipeW_ft * 1.5);

                    // Create Panel
                    let panelGeo = new THREE.BoxGeometry(pWidth - 0.06, 0.1, pHeight - 0.06); // slight gap between panels in feet
                    let panelMesh = new THREE.Mesh(panelGeo, panelMat);
                    panelMesh.position.set(xPos, yPos, zPos);
                    panelMesh.rotation.x = angleRad;
                    panelMesh.castShadow = true;
                    
                    // Add grid lines for realism
                    let edges = new THREE.EdgesGeometry(panelGeo);
                    let line = new THREE.LineSegments(edges, lineMat);
                    panelMesh.add(line);

                    panelsGroup.add(panelMesh);
                    panelsDrawn++;
                }
            }
        }

        // Structural Calculator Engine (Imperial Math)
        function runLocalAnalysis() {
            // Get raw inputs
            const pTotal = parseInt(document.getElementById('pTotal').value);
            const pWeight = parseFloat(document.getElementById('pWeight').value); // lbs
            const windSpeedMph = parseFloat(document.getElementById('windSpeed').value); // mph
            
            const pipeW_ft = parseFloat(document.getElementById('pipeWidth').value) / 12; // convert inches to ft
            const pipeT_ft = parseFloat(document.getElementById('pipeThick').value) / 12; // convert inches to ft
            const pHeight = parseFloat(document.getElementById('pHeight').value); // ft
            const pWidth = parseFloat(document.getElementById('pWidth').value); // ft
            const angleDeg = parseFloat(document.getElementById('display-angle').innerText);

            // 1. Calculate Dead Load (Weight of Structure)
            // Steel cross-sectional area (hollow square tube) in square feet
            const outerArea = pipeW_ft * pipeW_ft;
            const innerArea = Math.pow(pipeW_ft - (2 * pipeT_ft), 2);
            const steelCrossArea = outerArea - innerArea;
            
            // Density of steel in Imperial: approx 490 lbs / cubic foot
            const steelDensity = 490; 
            const totalSteelMassLbs = totalSteelLength * steelCrossArea * steelDensity;
            const totalPanelMassLbs = pTotal * pWeight;
            
            const deadLoad_lbs = totalSteelMassLbs + totalPanelMassLbs;

            // 2. Calculate Wind Load (Uplift Force in Imperial)
            // Dynamic wind pressure (psf - pounds per square foot) = 0.00256 * V^2 (where V is mph)
            const windPressure_psf = 0.00256 * Math.pow(windSpeedMph, 2);
            
            // Total Surface Area of Panels in sq ft
            const totalArea_sqft = pTotal * pHeight * pWidth;
            
            // Wind Force perpendicular to panels F = P * A * Cp (Using Cp roughly 1.2 for open structures)
            const windForceNormal_lbs = windPressure_psf * totalArea_sqft * 1.2;
            
            // Vertical Uplift component = F_normal * cos(tilt_angle)
            const tiltRad = angleDeg * (Math.PI / 180);
            const windUplift_lbs = windForceNormal_lbs * Math.cos(tiltRad);

            // Base Shear (Horizontal force) = F_normal * sin(tilt_angle)
            const baseShear_lbs = windForceNormal_lbs * Math.sin(tiltRad);

            // 3. Safety Factor & Net Forces
            const factorOfSafety = 1.5;
            const requiredResistingForce = windUplift_lbs * factorOfSafety;
            const netVerticalForce = deadLoad_lbs - windUplift_lbs; // Positive means pushing down, Negative means flying away
            
            let statusHTML = "";
            let recommendation = "";
            
            if (deadLoad_lbs >= requiredResistingForce) {
                statusHTML = `<strong class="text-green-500 uppercase">SAFE: Structure is self-ballasted</strong>`;
                recommendation = "The dead weight of the structure and panels is sufficient to resist design wind uplift.";
            } else {
                statusHTML = `<strong class="text-red-500 uppercase">UNSAFE: Uplift Risk Detected</strong>`;
                let deficit_lbs = requiredResistingForce - deadLoad_lbs;
                let numLegsTotal = parseInt(document.getElementById('numLegs').value) * 2;
                let ballastPerLeg = Math.ceil(deficit_lbs / numLegsTotal);
                
                recommendation = `Structure requires foundations! Add concrete footing of at least <b class="text-white">${ballastPerLeg} lbs</b> per leg to achieve a 1.5 Factor of Safety against wind uplift.`;
            }

            // 4. Update UI Panel
            document.getElementById('report-content').innerHTML = `
                <div class="flex justify-between border-b border-slate-700 pb-1 mt-2">
                    <span>Steel Utilized:</span> <strong class="text-white">${totalSteelLength.toFixed(1)} feet</strong>
                </div>
                <div class="flex justify-between border-b border-slate-700 pb-1 mt-2">
                    <span>Total Weight (Dead Load):</span> <strong class="text-blue-400">${deadLoad_lbs.toLocaleString('en-US', {maximumFractionDigits: 0})} lbs</strong>
                </div>
                <div class="flex justify-between border-b border-slate-700 pb-1 mt-2">
                    <span>Wind Uplift (Upward):</span> <strong class="text-red-400">${windUplift_lbs.toLocaleString('en-US', {maximumFractionDigits: 0})} lbs</strong>
                </div>
                <div class="flex justify-between border-b border-slate-700 pb-1 mt-2">
                    <span>Base Shear (Lateral):</span> <strong class="text-orange-400">${baseShear_lbs.toLocaleString('en-US', {maximumFractionDigits: 0})} lbs</strong>
                </div>
                <div class="flex justify-between border-b border-slate-700 pb-1 mt-2">
                    <span>Net Vertical Force:</span> <strong class="${netVerticalForce > 0 ? 'text-green-400' : 'text-red-500'}">${netVerticalForce.toLocaleString('en-US', {maximumFractionDigits: 0})} lbs</strong>
                </div>
                
                <div class="mt-4 p-3 bg-slate-800 rounded border border-slate-600 shadow-inner">
                    <span class="text-[10px] uppercase font-bold text-slate-400 block mb-1">Engineering Conclusion</span>
                    ${statusHTML}<br>
                    <span class="text-xs text-slate-300 block mt-1 leading-tight">${recommendation}</span>
                </div>
            `;
            
            document.getElementById('results-panel').style.display = 'block';
        }

        // Window Resize Handler
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }, false);

        // Render Loop
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }

        // Initialize Scene
        generateStructure();
        animate();

    </script>
</body>
</html>
