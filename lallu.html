<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Access | Udbhav Solar Solutions</title>
    <link rel="icon" type="image/jpeg" href="Donna Stroupe.jpg">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>tailwind.config = { darkMode: 'class' }</script>
    <style>
        .glass-panel { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.3); }
        .dark .glass-panel { background: rgba(15, 23, 42, 0.9); border: 1px solid rgba(255, 255, 255, 0.1); }
        .solar-bg { background: linear-gradient(rgba(30, 58, 138, 0.8), rgba(30, 58, 138, 0.9)), url('1.jpg'); background-size: cover; background-position: center; }
        .dark .solar-bg { background: linear-gradient(rgba(2, 6, 23, 0.85), rgba(2, 6, 23, 0.95)), url('1.jpg'); }
        .btn-glow:hover { box-shadow: 0 0 15px rgba(249, 115, 22, 0.5); border-color: #f97316; }
    </style>
</head>
<body class="solar-bg min-h-screen flex items-center justify-center p-6 transition-colors duration-500">

    <button onclick="toggleTheme()" class="fixed top-6 right-6 p-3 rounded-full bg-white/20 backdrop-blur-lg border border-white/30 text-white hover:bg-orange-500 z-50">
        <i id="theme-icon" data-lucide="moon" class="w-6 h-6"></i>
    </button>

    <div id="login-container" class="glass-panel w-full max-w-md rounded-[2.5rem] shadow-2xl overflow-hidden transition-all duration-500">
        <div class="p-8 md:p-12">
            <div class="flex flex-col items-center mb-10">
                <img src="Donna Stroupe.jpg" alt="Logo" class="h-20 w-20 rounded-full border-4 border-orange-500 object-cover mb-4">
                <h1 class="text-2xl font-black text-blue-900 dark:text-white uppercase tracking-tight">Portal Access</h1>
                <p class="text-[10px] font-bold text-orange-600 tracking-[0.3em] uppercase mt-1">Udbhav Solar Solutions</p>
            </div>
            <form id="loginForm" class="space-y-5">
                <input type="text" id="empId" placeholder="Portal ID" required class="w-full px-6 py-4 bg-white/50 dark:bg-slate-900/50 border border-slate-200 dark:border-slate-700 rounded-2xl outline-none focus:ring-2 focus:ring-orange-500 transition-all dark:text-white">
                <input type="password" id="password" placeholder="Password" required class="w-full px-6 py-4 bg-white/50 dark:bg-slate-900/50 border border-slate-200 dark:border-slate-700 rounded-2xl outline-none focus:ring-2 focus:ring-orange-500 transition-all dark:text-white">
                <button type="submit" id="submit-btn" class="w-full bg-blue-900 text-white py-4 rounded-2xl font-black uppercase tracking-widest hover:bg-orange-600 transition-all flex items-center justify-center gap-2">
                    Access System <i data-lucide="log-in" class="w-5 h-5"></i>
                </button>
            </form>
        </div>
    </div>

    <div id="selection-dialogue" class="hidden fixed inset-0 bg-black/60 backdrop-blur-md flex items-center justify-center p-6 z-[100]">
        <div class="glass-panel max-w-sm w-full rounded-[2.5rem] p-10 text-center border-2 border-orange-500 shadow-2xl">
            <h2 class="text-2xl font-black text-blue-900 dark:text-white mb-2 italic">ACCESS GRANTED</h2>
            <p id="display-name" class="text-orange-500 font-bold tracking-widest uppercase mb-8 underline decoration-2 underline-offset-4">USER</p>
            <div class="space-y-4">
                <button onclick="goToSecurePage('admin-vlogs.html')" class="w-full py-4 bg-white dark:bg-slate-800 text-blue-900 dark:text-white font-black uppercase rounded-2xl btn-glow transition-all flex items-center justify-center gap-3">
                    <i data-lucide="video" class="w-5 h-5"></i> Vlog Admin
                </button>
                <button onclick="goToSecurePage('aitest.html')" class="w-full py-4 bg-white dark:bg-slate-800 text-blue-900 dark:text-white font-black uppercase rounded-2xl btn-glow transition-all flex items-center justify-center gap-3">
                    <i data-lucide="cpu" class="w-5 h-5"></i> AI Test Lab
                </button>
            </div>
        </div>
    </div>

<script>
    lucide.createIcons();

    // The Secret Handshake Function - Adds a security key to the URL
    window.goToSecurePage = function(page) {
        const token = "USS_OFFICIAL_AUTH_2026"; 
        const name = document.getElementById('display-name').innerText;
        window.location.href = `https://ussgreen.in.net/${page}?auth=${token}&user=${encodeURIComponent(name)}`;
    };

    function toggleTheme() {
        document.documentElement.classList.toggle('dark');
        lucide.createIcons();
    }

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('submit-btn');
        btn.disabled = true;
        btn.innerText = "Verifying...";

        try {
            const response = await fetch("https://udbhav121-lallu.hf.space/verify-login", {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    username: document.getElementById('empId').value, 
                    password: document.getElementById('password').value 
                })
            });
            const result = await response.json();
            if (result.success) {
                document.getElementById('login-container').classList.add('hidden');
                document.getElementById('selection-dialogue').classList.remove('hidden');
                document.getElementById('display-name').innerText = result.name;
            } else {
                alert("Invalid Access Credentials.");
                btn.disabled = false;
                btn.innerText = "Access System";
            }
        } catch (err) {
            alert("Server connection failed.");
            btn.disabled = false;
        }
    });
</script>
</body>
</html>
