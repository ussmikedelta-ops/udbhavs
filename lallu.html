<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Access | Udbhav Solar Solutions Ajmer</title>
    <link rel="icon" type="image/jpeg" href="Donna Stroupe.jpg">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
        }
    </script>
    <style>
        .glass-panel {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        .dark .glass-panel {
            background: rgba(15, 23, 42, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .solar-bg {
            background: linear-gradient(rgba(30, 58, 138, 0.8), rgba(30, 58, 138, 0.9)),
                        url('1.jpg');
            background-size: cover;
            background-position: center;
        }
        .dark .solar-bg {
            background: linear-gradient(rgba(2, 6, 23, 0.85), rgba(2, 6, 23, 0.95)),
                        url('1.jpg');
            background-size: cover;
            background-position: center;
        }
    </style>
</head>
<body class="solar-bg min-h-screen flex items-center justify-center p-6 transition-colors duration-500">

    <!-- Theme Toggle -->
    <button onclick="toggleTheme()" class="fixed top-6 right-6 p-3 rounded-full bg-white/20 backdrop-blur-lg border border-white/30 text-white hover:bg-orange-500 transition-all z-50">
        <i id="theme-icon" data-lucide="moon" class="w-6 h-6"></i>
    </button>

    <div class="glass-panel w-full max-w-md rounded-[2.5rem] shadow-2xl overflow-hidden">
        <div class="p-8 md:p-12">

            <div class="flex flex-col items-center mb-10">
                <img src="Donna Stroupe.jpg" alt="Logo" class="h-20 w-20 rounded-full border-4 border-orange-500 object-cover mb-4 shadow-lg">
                <div class="text-center">
                    <h1 class="text-2xl font-black text-blue-900 dark:text-white uppercase tracking-tight">Portal Access</h1>
                    <p class="text-[10px] font-bold text-orange-600 tracking-[0.3em] uppercase mt-1">Udbhav Solar Solutions Ajmer</p>
                </div>
            </div>

            <form id="loginForm" class="space-y-5">
                <div>
                    <label class="block text-xs font-black text-blue-900 dark:text-slate-400 uppercase tracking-widest mb-2 ml-1">Portal ID</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-slate-400">
                            <i data-lucide="user" class="w-5 h-5"></i>
                        </span>
                        <input type="text" id="empId" placeholder="Enter ID" required
                               class="w-full pl-12 pr-4 py-4 bg-white/50 dark:bg-slate-900/50 border border-slate-200 dark:border-slate-700 rounded-2xl focus:ring-2 focus:ring-orange-500 outline-none transition-all font-medium text-slate-700 dark:text-white">
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-black text-blue-900 dark:text-slate-400 uppercase tracking-widest mb-2 ml-1">Password</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-slate-400">
                            <i data-lucide="lock" class="w-5 h-5"></i>
                        </span>
                        <input type="password" id="password" placeholder="••••••••" required
                               class="w-full pl-12 pr-4 py-4 bg-white/50 dark:bg-slate-900/50 border border-slate-200 dark:border-slate-700 rounded-2xl focus:ring-2 focus:ring-orange-500 outline-none transition-all font-medium text-slate-700 dark:text-white">
                    </div>
                </div>

                <button type="submit"
                        class="w-full bg-blue-900 text-white py-4 rounded-2xl font-black uppercase tracking-widest shadow-lg hover:bg-orange-600 transition-all active:scale-[0.98] mt-4 flex items-center justify-center gap-2">
                    Access System <i data-lucide="log-in" class="w-5 h-5"></i>
                </button>
            </form>

            <div class="mt-10 text-center">
                <a href="index.html" class="inline-flex items-center gap-2 text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] hover:text-blue-900 dark:hover:text-white transition">
                    <i data-lucide="chevron-left" class="w-4 h-4"></i> Back to Main Website
                </a>
            </div>
        </div>
    </div>

<script>
    lucide.createIcons();

    function toggleTheme() {
        const html = document.documentElement;
        const icon = document.getElementById('theme-icon');
        if (html.classList.contains('dark')) {
            html.classList.remove('dark');
            localStorage.setItem('theme', 'light');
            icon.setAttribute('data-lucide', 'moon');
        } else {
            html.classList.add('dark');
            localStorage.setItem('theme', 'dark');
            icon.setAttribute('data-lucide', 'sun');
        }
        lucide.createIcons();
    }

    if (localStorage.getItem('theme') === 'dark' || (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.classList.add('dark');
        document.getElementById('theme-icon').setAttribute('data-lucide', 'sun');
        lucide.createIcons();
    }

    const users = {
        "admin": { pass: "udbhav123", name: "Administrator", role: "admin" },
        "uss-solar": { pass: "solar2026", name: "Solar Admin", role: "admin" },
        "USS-EMP-001": { pass: "solar2026", name: "EKLAVYA", role: "staff" },
        "USS-EMP-002": { pass: "ajmer99", name: "RAJ KUMAR", role: "staff" },
        "1": { pass: "1", name: "Test User", role: "staff" }
    };

    const loginForm = document.getElementById('loginForm');

    loginForm.addEventListener('submit', function(e) {
        e.preventDefault();
        const id = document.getElementById('empId').value;
        const pass = document.getElementById('password').value;

        if (users[id] && users[id].pass === pass) {
            const user = users[id];
            sessionStorage.setItem("isSolarAdmin", "true");
            sessionStorage.setItem("adminName", user.name);
            sessionStorage.setItem("userName", user.name);
            alert("Login Successful! Welcome " + user.name);
            window.location.href = "admin-vlogs.html";
        } else {
            alert("Invalid Credentials. Please try again.");
        }
    });
</script>
</body>
</html>
