<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Access | Udbhav Solar Solutions Ajmer</title>
    <link rel="icon" type="image/jpeg" href="Donna Stroupe.jpg">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>
    <style>
        .glass-panel { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.3); }
        .dark .glass-panel { background: rgba(15, 23, 42, 0.9); border: 1px solid rgba(255, 255, 255, 0.1); }
        .solar-bg { background: linear-gradient(rgba(30, 58, 138, 0.8), rgba(30, 58, 138, 0.9)), url('1.jpg'); background-size: cover; background-position: center; }
        .dark .solar-bg { background: linear-gradient(rgba(2, 6, 23, 0.85), rgba(2, 6, 23, 0.95)), url('1.jpg'); background-size: cover; }
        .btn-glow:hover { box-shadow: 0 0 15px rgba(249, 115, 22, 0.5); border-color: #f97316; }
        
        /* Loading Spinner */
        .spinner {
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: #fff;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            display: none;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="solar-bg min-h-screen flex items-center justify-center p-6 transition-colors duration-500">

    <button onclick="toggleTheme()" class="fixed top-6 right-6 p-3 rounded-full bg-white/20 backdrop-blur-lg border border-white/30 text-white hover:bg-orange-500 transition-all z-50">
        <i id="theme-icon" data-lucide="moon" class="w-6 h-6"></i>
    </button>

    <div id="login-container" class="glass-panel w-full max-w-md rounded-[2.5rem] shadow-2xl overflow-hidden transition-all duration-500">
        <div class="p-8 md:p-12">
            <div class="flex flex-col items-center mb-10">
                <img src="Donna Stroupe.jpg" alt="Logo" class="h-20 w-20 rounded-full border-4 border-orange-500 object-cover mb-4 shadow-lg">
                <div class="text-center">
                    <h1 class="text-2xl font-black text-blue-900 dark:text-white uppercase tracking-tight">Portal Access</h1>
                    <p class="text-[10px] font-bold text-orange-600 tracking-[0.3em] uppercase mt-1">Udbhav Solar Solutions Ajmer</p>
                </div>
            </div>

            <form id="loginForm" class="space-y-5">
                <div>
                    <label class="block text-xs font-black text-blue-900 dark:text-slate-400 uppercase tracking-widest mb-2 ml-1">Portal ID</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-slate-400"><i data-lucide="user" class="w-5 h-5"></i></span>
                        <input type="text" id="empId" placeholder="Enter ID" required class="w-full pl-12 pr-4 py-4 bg-white/50 dark:bg-slate-900/50 border border-slate-200 dark:border-slate-700 rounded-2xl focus:ring-2 focus:ring-orange-500 outline-none transition-all text-slate-700 dark:text-white">
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-black text-blue-900 dark:text-slate-400 uppercase tracking-widest mb-2 ml-1">Password</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-slate-400"><i data-lucide="lock" class="w-5 h-5"></i></span>
                        <input type="password" id="password" placeholder="••••••••" required class="w-full pl-12 pr-4 py-4 bg-white/50 dark:bg-slate-900/50 border border-slate-200 dark:border-slate-700 rounded-2xl focus:ring-2 focus:ring-orange-500 outline-none transition-all text-slate-700 dark:text-white">
                    </div>
                </div>
                <button type="submit" id="submit-btn" class="w-full bg-blue-900 text-white py-4 rounded-2xl font-black uppercase tracking-widest shadow-lg hover:bg-orange-600 transition-all active:scale-[0.98] mt-4 flex items-center justify-center gap-3">
                    <span id="btn-text">Access System</span>
                    <div id="btn-spinner" class="spinner"></div>
                    <i id="btn-icon" data-lucide="log-in" class="w-5 h-5"></i>
                </button>
            </form>
        </div>
    </div>

    <div id="selection-dialogue" class="hidden fixed inset-0 bg-black/60 backdrop-blur-md flex items-center justify-center p-6 z-[100]">
        <div class="glass-panel max-w-sm w-full rounded-[2.5rem] p-10 text-center border-2 border-orange-500 shadow-[0_0_30px_rgba(249,115,22,0.3)]">
            <h2 class="text-2xl font-black text-blue-900 dark:text-white mb-2 italic">ACCESS GRANTED</h2>
            <p id="display-name" class="text-orange-500 font-bold tracking-widest uppercase mb-8 underline decoration-2 underline-offset-4">EMPLOYEE</p>
            
            <div class="space-y-4">
                <button onclick="goToSecurePage('vlog-admin.html')" class="w-full py-4 bg-white dark:bg-slate-800 border-2 border-transparent text-blue-900 dark:text-white font-black uppercase tracking-widest rounded-2xl hover:text-orange-500 btn-glow transition-all flex items-center justify-center gap-3 group">
                    <i data-lucide="video" class="w-5 h-5 group-hover:scale-110 transition-transform"></i> Vlog Admin
                </button>
                
                <button onclick="goToSecurePage('log.html')" class="w-full py-4 bg-white dark:bg-slate-800 border-2 border-transparent text-blue-900 dark:text-white font-black uppercase tracking-widest rounded-2xl hover:text-orange-500 btn-glow transition-all flex items-center justify-center gap-3 group">
                    <i data-lucide="receipt" class="w-5 h-5 group-hover:scale-110 transition-transform"></i> Bill Admin
                </button>
            </div>
        </div>
    </div>

<script>
    // 1. Initialize icons
    lucide.createIcons();

    // 2. Global State
    let adminData = { name: "", loggedIn: false };

    // 3. Theme Logic
    function toggleTheme() {
        const html = document.documentElement;
        html.classList.toggle('dark');
        const isDark = html.classList.contains('dark');
        localStorage.setItem('theme', isDark ? 'dark' : 'light');
        document.getElementById('theme-icon').setAttribute('data-lucide', isDark ? 'sun' : 'moon');
        lucide.createIcons();
    }

    // 4. Secure Navigation (Handshake)
    // This adds the ?auth= key to the URL to stop the redirect loop on ussgreen.in.net
    window.goToSecurePage = function(targetPage) {
        const name = document.getElementById('display-name').innerText;
        const baseUrl = "https://ussgreen.in.net/";
        const authKey = "secure_solar_access";
        
        // Final Handshake URL
        const finalUrl = `${baseUrl}${targetPage}?auth=${authKey}&name=${encodeURIComponent(name)}`;
        window.location.href = finalUrl;
    };

    // 5. Login Submission
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const id = document.getElementById('empId').value;
        const pass = document.getElementById('password').value;
        const btn = document.getElementById('submit-btn');
        const spinner = document.getElementById('btn-spinner');
        const icon = document.getElementById('btn-icon');
        const text = document.getElementById('btn-text');

        // Loading State
        btn.disabled = true;
        text.innerText = "Verifying";
        spinner.style.display = "block";
        icon.style.display = "none";

        try {
            const HF_SPACE_URL = "https://udbhav121-lallu.hf.space"; 
            const response = await fetch(`${HF_SPACE_URL}/verify-login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: id, password: pass })
            });

            if (!response.ok) throw new Error("Server Error");

            const result = await response.json();
            
            if (result.success) {
                adminData.name = result.name;
                adminData.loggedIn = true;

                // UI Transition
                document.getElementById('login-container').classList.add('opacity-0', 'scale-95');
                setTimeout(() => {
                    document.getElementById('login-container').classList.add('hidden');
                    document.getElementById('selection-dialogue').classList.remove('hidden');
                    document.getElementById('display-name').innerText = result.name;
                }, 500);

            } else {
                alert("Access Denied: Invalid Credentials.");
                resetBtn();
            }
        } catch (error) {
            console.error(error);
            alert("Connection Error: Authentication server is unreachable.");
            resetBtn();
        }

        function resetBtn() {
            btn.disabled = false;
            text.innerText = "Access System";
            spinner.style.display = "none";
            icon.style.display = "block";
        }
    });

    // Apply saved theme on load
    if (localStorage.getItem('theme') === 'dark') {
        document.documentElement.classList.add('dark');
        document.getElementById('theme-icon').setAttribute('data-lucide', 'sun');
        lucide.createIcons();
    }
</script>
</body>
</html>
