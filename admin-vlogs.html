<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control Panel | Udbhav Solar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-50 p-8">
    <div class="max-w-6xl mx-auto">
        <div class="flex justify-between items-center mb-10">
            <h1 class="text-2xl font-black text-blue-900">VLOG MANAGER</h1>
            <button onclick="openModal()" class="bg-orange-500 text-white px-6 py-2 rounded-xl font-bold text-sm shadow-lg hover:bg-orange-600">ADD NEW POST</button>
        </div>

        <div id="admin-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
    </div>

    <div id="vlog-modal" class="fixed inset-0 bg-black/50 hidden flex items-center justify-center p-4 z-50">
        <div class="bg-white rounded-[2rem] p-8 w-full max-w-lg">
            <h2 class="text-xl font-black text-blue-900 mb-6">Create Post</h2>
            <form id="vlog-form" class="space-y-4">
                <select id="vlog-category" class="w-full p-3 bg-slate-100 rounded-xl text-sm outline-none">
                    <option value="News">News</option>
                    <option value="Project">Project</option>
                    <option value="Subsidy">Subsidy</option>
                </select>
                <input type="text" id="vlog-title" placeholder="Post Title" class="w-full p-3 bg-slate-100 rounded-xl text-sm outline-none">
                <input type="text" id="vlog-link" placeholder="YouTube Link (e.g. https://youtu.be/...)" class="w-full p-3 bg-slate-100 rounded-xl text-sm outline-none">
                <input type="text" id="vlog-image" placeholder="Thumbnail URL" class="w-full p-3 bg-slate-100 rounded-xl text-sm outline-none">
                <textarea id="vlog-desc" placeholder="Brief Description" class="w-full p-3 bg-slate-100 rounded-xl text-sm h-32 outline-none"></textarea>
                <div class="flex gap-3">
                    <button type="button" onclick="saveVlog()" class="flex-1 bg-blue-900 text-white p-3 rounded-xl font-bold">SAVE POST</button>
                    <button type="button" onclick="closeModal()" class="px-6 bg-slate-200 p-3 rounded-xl font-bold">CANCEL</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        let vlogs = JSON.parse(localStorage.getItem('solar_vlogs') || '[]');

        function renderAdmin() {
            const grid = document.getElementById('admin-grid');
            grid.innerHTML = vlogs.map((v, i) => `
                <div class="bg-white p-4 rounded-3xl border shadow-sm relative">
                    <img src="${v.thumbnail || v.image}" class="h-32 w-full object-cover rounded-2xl mb-4">
                    <h3 class="font-bold text-blue-900 mb-1 truncate">${v.title}</h3>
                    <div class="flex justify-between items-center mt-4">
                        <span class="text-[10px] bg-orange-100 text-orange-600 px-3 py-1 rounded-full font-bold">${v.category}</span>
                        <div class="flex gap-2">
                            <button onclick="setFeatured(${i})" class="p-2 bg-yellow-100 text-yellow-600 rounded-lg" title="Set as Featured"><i data-lucide="star" class="w-4 h-4"></i></button>
                            <button onclick="deleteVlog(${i})" class="p-2 bg-red-100 text-red-600 rounded-lg"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                        </div>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        function saveVlog() {
            const newVlog = {
                category: document.getElementById('vlog-category').value,
                title: document.getElementById('vlog-title').value,
                link: document.getElementById('vlog-link').value,
                image: document.getElementById('vlog-image').value,
                description: document.getElementById('vlog-desc').value
            };
            vlogs.push(newVlog);
            localStorage.setItem('solar_vlogs', JSON.stringify(vlogs));
            closeModal();
            renderAdmin();
        }

        function setFeatured(index) {
            localStorage.setItem('featured_vlog_url', vlogs[index].link);
            alert("This video is now featured at the top of Vlogs!");
        }

        function deleteVlog(index) {
            if(confirm("Delete this post?")) {
                vlogs.splice(index, 1);
                localStorage.setItem('solar_vlogs', JSON.stringify(vlogs));
                renderAdmin();
            }
        }

        function openModal() { document.getElementById('vlog-modal').classList.remove('hidden'); }
        function closeModal() { document.getElementById('vlog-modal').classList.add('hidden'); }

        window.onload = renderAdmin;
    </script>
</body>
</html>
