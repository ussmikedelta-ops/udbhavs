<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Udbhav Admin | Control Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        // REDIRECT TO LALLU.HTML IF NOT LOGGED IN
        (function() {
            if (sessionStorage.getItem("isSolarAdmin") !== "true") {
                window.location.replace("lallu.html");
            }
        })();
    </script>
    <style>
        body { background-color: #0f172a; color: #f8fafc; }
        .input-box { background: #1e293b; border: 1px solid #334155; color: white; padding: 12px; border-radius: 12px; width: 100%; outline: none; }
        .input-box:focus { border-color: #f97316; }
        .loading-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100; items-center: center; justify-content: center; flex-direction: column; }
    </style>
</head>
<body class="p-8">
    <div id="loader" class="loading-overlay flex">
        <div class="animate-spin rounded-full h-12 w-12 border-t-2 border-orange-500"></div>
        <p class="mt-4 font-bold text-orange-500">Uploading to GitHub...</p>
    </div>

    <div class="max-w-6xl mx-auto">
        <header class="flex justify-between items-center mb-10 border-b border-slate-800 pb-6">
            <h1 class="text-2xl font-black tracking-widest text-orange-500 uppercase">Udbhav Admin</h1>
            <button onclick="sessionStorage.clear(); window.location.reload();" class="text-red-500 text-xs font-bold uppercase">Logout</button>
        </header>

        <div class="bg-[#1e293b] p-8 rounded-3xl border border-blue-500/30 mb-8">
            <h2 class="text-lg font-bold mb-4 flex items-center gap-2"><i data-lucide="settings"></i> GitHub Configuration</h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <input type="text" id="gh-repo" placeholder="username/repo-name" class="input-box">
                <input type="password" id="gh-token" placeholder="GitHub Personal Access Token" class="input-box">
                <button onclick="saveSettings()" class="bg-blue-600 px-8 py-3 rounded-xl font-bold hover:bg-blue-500 transition uppercase text-sm">Save Config</button>
            </div>
            <p class="text-[10px] text-slate-400 mt-3 italic">* Your Token is stored locally in this browser. Images will upload to the /pic/ folder.</p>
        </div>

        <div class="bg-[#1e293b] p-8 rounded-3xl border border-orange-500/30 mb-12">
            <h2 class="text-lg font-bold mb-4 flex items-center gap-2"><i data-lucide="video"></i> Dedicated Top Player Feed</h2>
            <div class="flex gap-4">
                <input type="text" id="featured-link" placeholder="Paste Main YouTube Link here..." class="input-box">
                <button onclick="setFeatured()" class="bg-orange-600 px-8 py-3 rounded-xl font-bold hover:bg-orange-500 transition">UPDATE PLAYER</button>
            </div>
        </div>

        <div class="flex justify-between items-center mb-6">
            <h2 class="text-xl font-bold">Vlogs & Articles</h2>
            <button onclick="openVlogModal()" class="bg-blue-600 px-6 py-2 rounded-xl font-bold text-sm">+ Create New</button>
        </div>
        <div id="admin-vlog-grid" class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-12"></div>

        <div class="flex justify-between items-center mb-6">
            <h2 class="text-xl font-bold">Gallery (GitHub /pic/ folder)</h2>
            <button onclick="openPhotoModal()" class="bg-blue-600 px-6 py-2 rounded-xl font-bold text-sm">+ Add Photo</button>
        </div>
        <div id="admin-photo-grid" class="grid grid-cols-2 md:grid-cols-6 gap-4"></div>
    </div>

    <div id="vlog-modal" class="fixed inset-0 bg-black/90 hidden z-50 flex items-center justify-center p-4">
        <div class="bg-[#0f172a] border border-slate-700 p-8 rounded-3xl w-full max-w-xl">
            <h2 class="text-xl font-bold mb-6">Create Content</h2>
            <div class="space-y-4">
                <select id="v-cat" class="input-box">
                    <option value="News">News</option>
                    <option value="Installation">Installation</option>
                    <option value="Technical Guide">Technical Guide</option>
                    <option value="Solar Update">Solar Update</option>
                </select>
                <input type="text" id="v-title" placeholder="Title" class="input-box">
                <div>
                    <label class="text-xs text-slate-400 mb-1 block">Cover Image (Upload to GitHub)</label>
                    <input type="file" id="v-img-file" accept="image/*" class="input-box">
                </div>
                <input type="text" id="v-link" placeholder="YouTube Video Link (Optional)" class="input-box">
                <textarea id="v-desc" placeholder="Detailed Description" class="input-box h-32"></textarea>
                <div class="flex gap-3">
                    <button id="v-save-btn" onclick="saveVlog()" class="flex-1 bg-orange-600 py-3 rounded-xl font-bold">SAVE & UPLOAD</button>
                    <button onclick="document.getElementById('vlog-modal').classList.add('hidden')" class="px-6 py-3 rounded-xl bg-slate-800 font-bold">CANCEL</button>
                </div>
            </div>
        </div>
    </div>

    <div id="photo-modal" class="fixed inset-0 bg-black/90 hidden z-50 flex items-center justify-center p-4">
        <div class="bg-[#0f172a] border border-slate-700 p-8 rounded-3xl w-full max-w-sm">
            <h2 class="text-xl font-bold mb-6">Add Installation Image</h2>
            <label class="text-xs text-slate-400 mb-1 block">Select Image</label>
            <input type="file" id="p-img-file" accept="image/*" class="input-box mb-6">
            <div class="flex gap-3">
                <button id="p-save-btn" onclick="savePhoto()" class="flex-1 bg-orange-600 py-3 rounded-xl font-bold">ADD TO GITHUB</button>
                <button onclick="document.getElementById('photo-modal').classList.add('hidden')" class="px-6 py-3 rounded-xl bg-slate-800 font-bold">CANCEL</button>
            </div>
        </div>
    </div>

    <script>
        let vlogs = JSON.parse(localStorage.getItem('solar_vlogs') || '[]');
        let photos = JSON.parse(localStorage.getItem('solar_photos') || '[]');

        function render() {
            const vg = document.getElementById('admin-vlog-grid');
            vg.innerHTML = vlogs.map((v, i) => `
                <div class="bg-[#1e293b] p-4 rounded-2xl border border-slate-800">
                    <img src="${v.image || 'udbhav.jpg'}" class="h-24 w-full object-cover rounded-lg mb-3">
                    <h4 class="font-bold text-sm truncate">${v.title}</h4>
                    <button onclick="deleteV(${i})" class="text-red-500 text-[10px] font-bold mt-4">DELETE</button>
                </div>
            `).join('');

            const pg = document.getElementById('admin-photo-grid');
            pg.innerHTML = photos.map((p, i) => `
                <div class="relative group aspect-square">
                    <img src="${p.url}" class="w-full h-full object-cover rounded-xl border border-slate-800">
                    <button onclick="deleteP(${i})" class="absolute top-1 right-1 bg-red-600 p-1 rounded text-[10px]">X</button>
                </div>
            `).join('');
            lucide.createIcons();
            document.getElementById('loader').style.display = 'none';
        }

        function saveSettings() {
            localStorage.setItem('gh_repo', document.getElementById('gh-repo').value);
            localStorage.setItem('gh_token', document.getElementById('gh-token').value);
            alert("GitHub Configuration Saved!");
        }

        async function uploadToGitHub(file) {
            const repo = localStorage.getItem('gh_repo');
            const token = localStorage.getItem('gh_token');
            
            if (!repo || !token) {
                alert("GitHub Credentials not set! Please fill the config section.");
                return null;
            }

            document.getElementById('loader').style.display = 'flex';
            const fileName = `pic/${Date.now()}-${file.name.replace(/\s/g, '_')}`;
            
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = async () => {
                    const content = reader.result.split(',')[1];
                    try {
                        const response = await fetch(`https://api.github.com/repos/${repo}/contents/${fileName}`, {
                            method: 'PUT',
                            headers: {
                                'Authorization': `token ${token}`,
                                'Content-Type': 'application/json',
                            },
                            body: JSON.stringify({
                                message: `Admin Upload: ${fileName}`,
                                content: content
                            })
                        });
                        const data = await response.json();
                        if (data.content && data.content.download_url) {
                            resolve(data.content.download_url);
                        } else {
                            throw new Error("Upload failed");
                        }
                    } catch (err) {
                        alert("GitHub API Error: Check Repo name or Token permissions");
                        document.getElementById('loader').style.display = 'none';
                        reject(err);
                    }
                };
                reader.readAsDataURL(file);
            });
        }

        async function saveVlog() {
            const fileInput = document.getElementById('v-img-file');
            const btn = document.getElementById('v-save-btn');
            let imageUrl = "";

            if (fileInput.files.length > 0) {
                btn.disabled = true;
                imageUrl = await uploadToGitHub(fileInput.files[0]);
            }

            const obj = { 
                category: document.getElementById('v-cat').value, 
                title: document.getElementById('v-title').value, 
                image: imageUrl || 'udbhav.jpg', 
                link: document.getElementById('v-link').value, 
                description: document.getElementById('v-desc').value 
            };

            vlogs.unshift(obj);
            localStorage.setItem('solar_vlogs', JSON.stringify(vlogs));
            location.reload();
        }

        async function savePhoto() {
            const fileInput = document.getElementById('p-img-file');
            const btn = document.getElementById('p-save-btn');

            if (fileInput.files.length === 0) return alert("Please select a file first");

            btn.disabled = true;
            const githubUrl = await uploadToGitHub(fileInput.files[0]);
            
            if (githubUrl) {
                photos.unshift({ url: githubUrl });
                localStorage.setItem('solar_photos', JSON.stringify(photos));
                location.reload();
            }
        }

        function setFeatured() {
            const link = document.getElementById('featured-link').value;
            localStorage.setItem('featured_video', link);
            alert("Featured Player Updated!");
        }

        function deleteV(i) { 
            if(confirm("Delete this vlog?")) {
                vlogs.splice(i,1); 
                localStorage.setItem('solar_vlogs', JSON.stringify(vlogs)); 
                render(); 
            }
        }

        function deleteP(i) { 
            if(confirm("Delete this photo?")) {
                photos.splice(i,1); 
                localStorage.setItem('solar_photos', JSON.stringify(photos)); 
                render(); 
            }
        }

        function openVlogModal() { document.getElementById('vlog-modal').classList.remove('hidden'); }
        function openPhotoModal() { document.getElementById('photo-modal').classList.remove('hidden'); }

        window.onload = () => {
            document.getElementById('gh-repo').value = localStorage.getItem('gh_repo') || '';
            document.getElementById('gh-token').value = localStorage.getItem('gh_token') || '';
            document.getElementById('featured-link').value = localStorage.getItem('featured_video') || '';
            render();
        };
    </script>
</body>
</html>
