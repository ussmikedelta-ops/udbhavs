<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control Panel | Udbhav Solar Solutions</title>

    <link rel="icon" type="image/jpeg" href="Donna Stroupe.jpg">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
    // 1. Check if we just arrived from the login page with a secure token
    const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get('auth');
    const adminName = urlParams.get('name');

    if (token === "secure_solar_access") {
        // Save the session locally on ussgreen.in.net
        sessionStorage.setItem("isSolarAdmin", "true");
        if (adminName) sessionStorage.setItem("adminName", adminName);
        
        // Clean the URL so the password isn't visible in the address bar
        window.history.replaceState({}, document.title, window.location.pathname);
    }

    // 2. Final Security Check
    if (sessionStorage.getItem("isSolarAdmin") !== "true") {
        // If no session and no token, go back to login
        window.location.href = "lallu.html";
    }
</script>
    <style>
        .glass-morphism { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        .admin-card { background: white; border: 1px solid #e2e8f0; border-radius: 1.5rem; padding: 2rem; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); }
        input, textarea, select {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 1px solid #e2e8f0;
            border-radius: 0.75rem;
            margin-top: 0.5rem;
            font-size: 0.875rem;
        }
        input:focus, textarea:focus { outline: none; border-color: #f97316; ring: 2px ring-orange-100; }
        label { font-size: 0.75rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.05em; color: #64748b; }
        .preview-img { max-height: 150px; object-fit: cover; border-radius: 0.75rem; margin-top: 0.5rem; border: 2px solid #e2e8f0; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">

    <nav class="glass-morphism fixed w-full z-40 border-b border-gray-200">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-20 items-center">
                <div class="flex items-center gap-3">
                    <img src="Donna Stroupe.jpg" alt="Logo" class="h-10 w-10 rounded-full border-2 border-orange-500 object-cover">
                    <div class="flex flex-col">
                        <span class="font-black text-blue-900 uppercase tracking-tight text-md leading-none">Admin Panel</span>
                        <span class="text-[10px] font-bold text-orange-600 tracking-widest uppercase">Udbhav Solar</span>
                    </div>
                </div>
                <div class="flex space-x-6 font-bold text-xs uppercase tracking-wider">
                    <button onclick="exportData()" class="text-blue-600 hover:text-blue-800 transition flex items-center gap-2">
                        <i data-lucide="download" class="w-4 h-4"></i> Backup
                    </button>
                    <button onclick="logout()" class="text-red-600 hover:text-red-800 transition flex items-center gap-2">
                        <i data-lucide="log-out" class="w-4 h-4"></i> Logout
                    </button>
                    <a href="vlogs.html" class="text-blue-900 hover:text-orange-500 transition flex items-center gap-2">
                        <i data-lucide="eye" class="w-4 h-4"></i> View Page
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <main class="pt-32 pb-16 px-6 max-w-5xl mx-auto">

        <div class="mb-10 flex items-center justify-between bg-blue-900 p-6 rounded-3xl text-white">
            <div>
                <h1 class="text-2xl font-black uppercase">Welcome, <span id="admin-name">Admin</span></h1>
                <p class="text-xs font-bold text-blue-200 uppercase tracking-widest mt-1">Solar Vlogs & News Management</p>
            </div>
            <i data-lucide="shield-check" class="w-12 h-12 text-orange-400 opacity-50"></i>
        </div>

        <!-- Section: Featured Video -->
        <section class="mb-12">
            <div class="flex items-center gap-4 mb-6">
                <i data-lucide="youtube" class="text-red-600 w-6 h-6"></i>
                <h2 class="text-xl font-black text-blue-900 uppercase">Featured Video</h2>
            </div>
            <div class="admin-card">
                <div class="flex flex-col md:flex-row gap-4 items-end">
                    <div class="flex-grow">
                        <label>YouTube Video ID</label>
                        <input type="text" id="yt-id" placeholder="e.g. dQw4w9WgXcQ">
                    </div>
                    <button onclick="saveVideoId()" class="bg-blue-900 text-white px-6 py-3 rounded-xl font-bold text-xs uppercase tracking-widest hover:bg-orange-600 transition">
                        Update Video
                    </button>
                </div>
                <p class="text-[10px] text-slate-400 mt-2">Enter the ID from the YouTube URL (the part after v=)</p>
            </div>
        </section>

        <!-- Section: Vlogs & News -->
        <section class="mb-12">
            <div class="flex items-center justify-between mb-6">
                <div class="flex items-center gap-4">
                    <i data-lucide="layout-list" class="text-orange-500 w-6 h-6"></i>
                    <h2 class="text-xl font-black text-blue-900 uppercase">Manage Vlogs & News</h2>
                </div>
                <button onclick="openVlogModal()" class="bg-orange-500 text-white px-4 py-2 rounded-lg font-bold text-xs uppercase flex items-center gap-2 hover:bg-blue-900 transition">
                    <i data-lucide="plus" class="w-4 h-4"></i> Add New
                </button>
            </div>

            <div id="vlogs-list" class="space-y-4">
            </div>
        </section>

        <!-- Section: Photo Gallery -->
        <section>
            <div class="flex items-center justify-between mb-6">
                <div class="flex items-center gap-4">
                    <i data-lucide="image" class="text-blue-600 w-6 h-6"></i>
                    <h2 class="text-xl font-black text-blue-900 uppercase">Installation Photos</h2>
                </div>
                <button onclick="openPhotoModal()" class="bg-blue-600 text-white px-4 py-2 rounded-lg font-bold text-xs uppercase flex items-center gap-2 hover:bg-orange-600 transition">
                    <i data-lucide="plus" class="w-4 h-4"></i> Add Photo
                </button>
            </div>
            <div id="photos-grid" class="grid grid-cols-2 md:grid-cols-4 gap-4">
            </div>
        </section>

    </main>

    <!-- Modal for Vlog -->
    <div id="vlog-modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 hidden flex items-center justify-center p-6">
        <div class="bg-white rounded-[2rem] w-full max-w-xl p-8 shadow-2xl overflow-y-auto max-h-[90vh]">
            <h3 id="modal-title" class="text-2xl font-black text-blue-900 uppercase mb-6">Add New Vlog</h3>
            <form id="vlog-form" class="space-y-4">
                <input type="hidden" id="vlog-index">
                <div>
                    <label>Title</label>
                    <input type="text" id="vlog-title" required>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label>Category</label>
                        <select id="vlog-category">
                            <option value="Solar News">Solar News</option>
                            <option value="Maintenance">Maintenance</option>
                            <option value="Site Update">Site Update</option>
                            <option value="Subsidy Info">Subsidy Info</option>
                            <option value="Tech Guide">Tech Guide</option>
                        </select>
                    </div>
                    <div>
                        <label>Image URL</label>
                        <input type="text" id="vlog-image" placeholder="https://..." oninput="updateVlogPreview()">
                        <img id="vlog-preview" class="preview-img hidden" src="">
                    </div>
                </div>
                <div>
                    <label>Article/Video Link</label>
                    <input type="text" id="vlog-link" placeholder="URL to redirect">
                </div>
                <div>
                    <label>Description</label>
                    <textarea id="vlog-desc" rows="3"></textarea>
                </div>
                <div class="flex gap-4 pt-4">
                    <button type="button" onclick="closeVlogModal()" class="flex-1 px-6 py-3 rounded-xl border border-slate-200 font-bold text-xs uppercase tracking-widest hover:bg-slate-50">Cancel</button>
                    <button type="submit" class="flex-1 px-6 py-3 rounded-xl bg-orange-500 text-white font-bold text-xs uppercase tracking-widest hover:bg-blue-900 shadow-lg">Save Vlog</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Modal for Photo -->
    <div id="photo-modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 hidden flex items-center justify-center p-6">
        <div class="bg-white rounded-[2rem] w-full max-w-md p-8 shadow-2xl">
            <h3 class="text-2xl font-black text-blue-900 uppercase mb-6">Add Photo</h3>
            <form id="photo-form" class="space-y-4">
                <div>
                    <label>Photo URL</label>
                    <input type="text" id="photo-url" required placeholder="https://..." oninput="updatePhotoPreview()">
                    <img id="photo-preview" class="preview-img hidden w-full" src="">
                </div>
                <div>
                    <label>Caption</label>
                    <input type="text" id="photo-caption" placeholder="Installation at Jodhpur...">
                </div>
                <div class="flex gap-4 pt-4">
                    <button type="button" onclick="closePhotoModal()" class="flex-1 px-6 py-3 rounded-xl border border-slate-200 font-bold text-xs uppercase tracking-widest">Cancel</button>
                    <button type="submit" class="flex-1 px-6 py-3 rounded-xl bg-blue-900 text-white font-bold text-xs uppercase tracking-widest hover:bg-orange-500 shadow-lg">Upload</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        lucide.createIcons();

        document.getElementById('admin-name').innerText = sessionStorage.getItem("adminName") || "Admin";

        function logout() {
            sessionStorage.clear();
            window.location.href = "lallu.html";
        }

        let vlogs = JSON.parse(localStorage.getItem('solar_vlogs') || '[]');
        let photos = JSON.parse(localStorage.getItem('solar_photos') || '[]');
        let videoId = localStorage.getItem('solar_featured_video') || 'dQw4w9WgXcQ';

        document.getElementById('yt-id').value = videoId;
        renderVlogs();
        renderPhotos();

        function saveVideoId() {
            const val = document.getElementById('yt-id').value;
            localStorage.setItem('solar_featured_video', val);
            alert('Video ID updated!');
        }

        function updateVlogPreview() {
            const url = document.getElementById('vlog-image').value;
            const img = document.getElementById('vlog-preview');
            if(url) { img.src = url; img.classList.remove('hidden'); }
            else { img.classList.add('hidden'); }
        }

        function updatePhotoPreview() {
            const url = document.getElementById('photo-url').value;
            const img = document.getElementById('photo-preview');
            if(url) { img.src = url; img.classList.remove('hidden'); }
            else { img.classList.add('hidden'); }
        }

        function renderVlogs() {
            const container = document.getElementById('vlogs-list');
            container.innerHTML = vlogs.map((v, i) => `
                <div class="admin-card py-4 flex items-center justify-between gap-4">
                    <div class="flex items-center gap-4 flex-grow overflow-hidden">
                        <img src="${v.image}" class="w-16 h-16 rounded-xl object-cover bg-slate-100 flex-shrink-0">
                        <div class="overflow-hidden">
                            <h4 class="font-black text-blue-900 text-sm truncate uppercase">${v.title}</h4>
                            <p class="text-[10px] text-slate-400 font-bold tracking-widest uppercase">${v.category}</p>
                        </div>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="editVlog(${i})" class="p-2 text-blue-600 hover:bg-blue-50 rounded-lg"><i data-lucide="edit-3" class="w-4 h-4"></i></button>
                        <button onclick="deleteVlog(${i})" class="p-2 text-red-500 hover:bg-red-50 rounded-lg"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        function renderPhotos() {
            const container = document.getElementById('photos-grid');
            container.innerHTML = photos.map((p, i) => `
                <div class="relative group aspect-square rounded-2xl overflow-hidden bg-slate-100 border border-slate-200">
                    <img src="${p.url}" class="w-full h-full object-cover">
                    <button onclick="deletePhoto(${i})" class="absolute top-2 right-2 bg-red-500 text-white p-2 rounded-lg opacity-0 group-hover:opacity-100 transition shadow-lg">
                        <i data-lucide="trash-2" class="w-3 h-3"></i>
                    </button>
                </div>
            `).join('');
            lucide.createIcons();
        }

        const vlogModal = document.getElementById('vlog-modal');
        function openVlogModal() {
            document.getElementById('vlog-form').reset();
            document.getElementById('vlog-index').value = "";
            document.getElementById('modal-title').innerText = "Add New Vlog";
            document.getElementById('vlog-preview').classList.add('hidden');
            vlogModal.classList.remove('hidden');
        }
        function closeVlogModal() { vlogModal.classList.add('hidden'); }

        document.getElementById('vlog-form').onsubmit = (e) => {
            e.preventDefault();
            const index = document.getElementById('vlog-index').value;
            const data = {
                title: document.getElementById('vlog-title').value,
                category: document.getElementById('vlog-category').value,
                image: document.getElementById('vlog-image').value,
                link: document.getElementById('vlog-link').value,
                description: document.getElementById('vlog-desc').value
            };

            if (index === "") vlogs.push(data);
            else vlogs[index] = data;

            localStorage.setItem('solar_vlogs', JSON.stringify(vlogs));
            renderVlogs();
            closeVlogModal();
        };

        function editVlog(i) {
            const v = vlogs[i];
            document.getElementById('vlog-index').value = i;
            document.getElementById('vlog-title').value = v.title;
            document.getElementById('vlog-category').value = v.category;
            document.getElementById('vlog-image').value = v.image;
            document.getElementById('vlog-link').value = v.link;
            document.getElementById('vlog-desc').value = v.description;
            document.getElementById('modal-title').innerText = "Edit Vlog";
            updateVlogPreview();
            vlogModal.classList.remove('hidden');
        }

        function deleteVlog(i) {
            if (confirm('Delete this vlog?')) {
                vlogs.splice(i, 1);
                localStorage.setItem('solar_vlogs', JSON.stringify(vlogs));
                renderVlogs();
            }
        }

        const photoModal = document.getElementById('photo-modal');
        function openPhotoModal() {
            document.getElementById('photo-form').reset();
            document.getElementById('photo-preview').classList.add('hidden');
            photoModal.classList.remove('hidden');
        }
        function closePhotoModal() { photoModal.classList.add('hidden'); }

        document.getElementById('photo-form').onsubmit = (e) => {
            e.preventDefault();
            photos.push({
                url: document.getElementById('photo-url').value,
                caption: document.getElementById('photo-caption').value
            });
            localStorage.setItem('solar_photos', JSON.stringify(photos));
            renderPhotos();
            closePhotoModal();
        };

        function deletePhoto(i) {
            if (confirm('Delete this photo?')) {
                photos.splice(i, 1);
                localStorage.setItem('solar_photos', JSON.stringify(photos));
                renderPhotos();
            }
        }

        function exportData() {
            const data = {
                vlogs: vlogs,
                photos: photos,
                videoId: videoId
            };
            const blob = new Blob([JSON.stringify(data)], {type: 'application/json'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `udbhav_solar_backup_${new Date().toLocaleDateString()}.json`;
            a.click();
        }

    </script>
</body>
</html>
