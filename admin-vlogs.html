<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Udbhav Admin | Control Center</title>
    <link rel="icon" type="image/png" href="unnamed.jpg">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        // REDIRECT TO LALLU.HTML IF NOT LOGGED IN
        (function() {
            if (sessionStorage.getItem("isSolarAdmin") !== "true") {
                window.location.replace("lallu.html");
            }
        })();
    </script>
    <style>
        body { background-color: #0f172a; color: #f8fafc; }
        .input-box { background: #1e293b; border: 1px solid #334155; color: white; padding: 12px; border-radius: 12px; width: 100%; outline: none; }
        .input-box:focus { border-color: #f97316; }
        .loading-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 100; align-items: center; justify-content: center; flex-direction: column; }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #f97316; border-radius: 10px; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div id="loader" class="loading-overlay">
        <div class="animate-spin rounded-full h-16 w-16 border-t-4 border-orange-500 mb-4"></div>
        <p class="font-black text-orange-500 uppercase tracking-widest animate-pulse">Syncing with GitHub...</p>
    </div>

    <div class="max-w-6xl mx-auto">
        <header class="flex justify-between items-center mb-10 border-b border-slate-800 pb-6">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-orange-500 rounded-full flex items-center justify-center shadow-[0_0_15px_#f97316]">
                    <i data-lucide="sun" class="text-white"></i>
                </div>
                <h1 class="text-2xl font-black tracking-widest text-white uppercase">Udbhav <span class="text-orange-500">Admin</span></h1>
            </div>
            <button onclick="sessionStorage.clear(); window.location.reload();" class="bg-red-500/10 text-red-500 px-4 py-2 rounded-lg text-xs font-bold uppercase border border-red-500/20 hover:bg-red-500 hover:text-white transition">Logout</button>
        </header>

        <div class="bg-blue-500/10 p-4 rounded-2xl border border-blue-500/30 mb-8 flex items-center gap-4">
            <i data-lucide="shield-check" class="text-blue-400"></i>
            <p class="text-xs text-blue-200">Secure Mode Active: GitHub Credentials managed by Hugging Face API.</p>
        </div>

        <div class="bg-[#1e293b] p-6 md:p-8 rounded-3xl border border-orange-500/30 mb-12 shadow-xl">
            <h2 class="text-lg font-bold mb-4 flex items-center gap-2 text-orange-500">
                <i data-lucide="layout-template"></i> Main Player Feed
            </h2>
            <div class="flex flex-col md:flex-row gap-4">
                <input type="text" id="featured-link" placeholder="Paste Main YouTube Link here..." class="input-box">
                <button onclick="saveAllToCloud('Featured Player Updated!')" class="bg-orange-600 px-8 py-3 rounded-xl font-black hover:bg-orange-500 transition shadow-lg shadow-orange-600/20 uppercase text-sm">Update Player</button>
            </div>
        </div>

        <div class="flex justify-between items-center mb-6">
            <h2 class="text-xl font-bold flex items-center gap-2"><i data-lucide="video"></i> Vlogs & Articles</h2>
            <button onclick="openVlogModal()" class="bg-blue-600 px-6 py-2 rounded-xl font-bold text-sm hover:bg-blue-500 transition shadow-lg shadow-blue-600/20">+ Create New</button>
        </div>
        <div id="admin-vlog-grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6 mb-12"></div>

        <div class="flex justify-between items-center mb-6">
            <h2 class="text-xl font-bold flex items-center gap-2"><i data-lucide="image"></i> Installation Gallery</h2>
            <button onclick="openPhotoModal()" class="bg-blue-600 px-6 py-2 rounded-xl font-bold text-sm hover:bg-blue-500 transition shadow-lg shadow-blue-600/20">+ Add Photo</button>
        </div>
        <div id="admin-photo-grid" class="grid grid-cols-2 sm:grid-cols-4 md:grid-cols-6 gap-4"></div>
    </div>

    <div id="vlog-modal" class="fixed inset-0 bg-black/95 hidden z-50 flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-[#1e293b] border border-slate-700 p-8 rounded-3xl w-full max-w-xl shadow-2xl">
            <h2 class="text-2xl font-black mb-6 text-orange-500 uppercase tracking-tighter">New Content</h2>
            <div class="space-y-4">
                <select id="v-cat" class="input-box">
                    <option value="News">News</option>
                    <option value="Installation">Installation</option>
                    <option value="Technical Guide">Technical Guide</option>
                    <option value="Solar Update">Solar Update</option>
                </select>
                <input type="text" id="v-title" placeholder="Title" class="input-box">
                <div>
                    <label class="text-[10px] font-bold text-slate-400 mb-2 block uppercase tracking-widest">Cover Image</label>
                    <input type="file" id="v-img-file" accept="image/*" class="input-box text-xs">
                </div>
                <input type="text" id="v-link" placeholder="YouTube Link (Optional)" class="input-box">
                <textarea id="v-desc" placeholder="Detailed Description..." class="input-box h-32"></textarea>
                <div class="flex gap-3 pt-4">
                    <button id="v-save-btn" onclick="handleVlogSave()" class="flex-1 bg-orange-600 py-4 rounded-2xl font-black uppercase tracking-widest hover:bg-orange-500 transition">Save & Publish</button>
                    <button onclick="closeModals()" class="px-6 py-4 rounded-2xl bg-slate-800 font-bold hover:bg-slate-700 transition">Cancel</button>
                </div>
            </div>
        </div>
    </div>

    <div id="photo-modal" class="fixed inset-0 bg-black/95 hidden z-50 flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-[#1e293b] border border-slate-700 p-8 rounded-3xl w-full max-w-sm shadow-2xl">
            <h2 class="text-xl font-black mb-6 text-orange-500 uppercase tracking-tighter">Add to Gallery</h2>
            <input type="file" id="p-img-file" accept="image/*" class="input-box mb-6 text-xs">
            <div class="flex gap-3">
                <button id="p-save-btn" onclick="handlePhotoSave()" class="flex-1 bg-orange-600 py-4 rounded-2xl font-black uppercase tracking-widest hover:bg-orange-500 transition">Upload</button>
                <button onclick="closeModals()" class="px-6 py-4 rounded-2xl bg-slate-800 font-bold hover:bg-slate-700 transition">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        // !!! IMPORTANT: CHANGE THIS TO YOUR HUGGING FACE SPACE URL !!!
        const API_BASE = "https://udbhav121-admin-vlogs.hf.space";

        let vlogs = [];
        let photos = [];

        // 1. SYNC DATA FROM GITHUB
        async function syncData() {
            showLoader(true);
            try {
                const response = await fetch(`${API_BASE}/api/sync`);
                const data = await response.json();
                
                vlogs = data.vlogs || [];
                photos = data.photos || [];
                document.getElementById('featured-link').value = data.featured_video || '';
                
                render();
            } catch (err) {
                console.error(err);
                alert("Critical Error: Unable to reach Hugging Face API.");
            } finally {
                showLoader(false);
            }
        }

        // 2. RENDER UI
        function render() {
            const vg = document.getElementById('admin-vlog-grid');
            vg.innerHTML = vlogs.map((v, i) => `
                <div class="bg-[#1e293b] p-5 rounded-3xl border border-slate-800 hover:border-orange-500/50 transition group">
                    <div class="h-32 w-full bg-slate-900 rounded-2xl mb-4 overflow-hidden">
                        <img src="${v.image || 'udbhav.jpg'}" class="h-full w-full object-cover group-hover:scale-110 transition duration-500">
                    </div>
                    <span class="text-[9px] font-black text-orange-500 uppercase tracking-widest">${v.category}</span>
                    <h4 class="font-bold text-sm truncate text-white mt-1">${v.title}</h4>
                    <button onclick="deleteV(${i})" class="w-full mt-4 py-2 rounded-lg bg-red-500/10 text-red-500 text-[10px] font-bold uppercase hover:bg-red-500 hover:text-white transition">Delete Entry</button>
                </div>
            `).join('');

            const pg = document.getElementById('admin-photo-grid');
            pg.innerHTML = photos.map((p, i) => `
                <div class="relative group aspect-square">
                    <img src="${p.url}" class="w-full h-full object-cover rounded-2xl border border-slate-800 group-hover:border-orange-500 transition">
                    <button onclick="deleteP(${i})" class="absolute -top-2 -right-2 bg-red-600 text-white w-6 h-6 rounded-full flex items-center justify-center text-[10px] shadow-lg opacity-0 group-hover:opacity-100 transition">
                        <i data-lucide="trash-2" class="w-3 h-3"></i>
                    </button>
                </div>
            `).join('');
            lucide.createIcons();
        }

        // 3. MASTER SAVE
        async function saveAllToCloud(successMsg = "Changes Published!") {
            showLoader(true);
            const payload = {
                vlogs: vlogs,
                photos: photos,
                featured_video: document.getElementById('featured-link').value
            };

            try {
                const response = await fetch(`${API_BASE}/api/save`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (response.ok) {
                    alert(successMsg);
                    render();
                } else {
                    throw new Error("Save failed");
                }
            } catch (err) {
                alert("API Error: Syncing to GitHub failed.");
            } finally {
                showLoader(false);
            }
        }

        // 4. IMAGE UPLOAD HANDLER
        async function uploadFile(file) {
            const formData = new FormData();
            formData.append('file', file);

            const response = await fetch(`${API_BASE}/api/upload-pic`, {
                method: 'POST',
                body: formData
            });

            const data = await response.json();
            return data.url || null;
        }

        // 5. FEATURE LOGIC
        async function handleVlogSave() {
            const fileInput = document.getElementById('v-img-file');
            let imageUrl = "";

            showLoader(true);
            if (fileInput.files.length > 0) {
                imageUrl = await uploadFile(fileInput.files[0]);
            }

            const obj = { 
                category: document.getElementById('v-cat').value, 
                title: document.getElementById('v-title').value, 
                image: imageUrl || 'udbhav.jpg', 
                link: document.getElementById('v-link').value, 
                description: document.getElementById('v-desc').value 
            };

            vlogs.unshift(obj);
            closeModals();
            await saveAllToCloud("Vlog Published Successfully!");
        }

        async function handlePhotoSave() {
            const fileInput = document.getElementById('p-img-file');
            if (fileInput.files.length === 0) return alert("Select a photo");

            showLoader(true);
            const url = await uploadFile(fileInput.files[0]);
            if (url) {
                photos.unshift({ url: url });
                closeModals();
                await saveAllToCloud("Photo added to Gallery!");
            }
        }

        function deleteV(i) {
            if(confirm("Permanently remove this vlog?")) {
                vlogs.splice(i,1);
                saveAllToCloud("Vlog deleted.");
            }
        }

        function deleteP(i) {
            if(confirm("Remove this photo?")) {
                photos.splice(i,1);
                saveAllToCloud("Photo removed.");
            }
        }

        // UI Helpers
        function showLoader(show) { document.getElementById('loader').style.display = show ? 'flex' : 'none'; }
        function openVlogModal() { document.getElementById('vlog-modal').classList.remove('hidden'); }
        function openPhotoModal() { document.getElementById('photo-modal').classList.remove('hidden'); }
        function closeModals() {
            document.getElementById('vlog-modal').classList.add('hidden');
            document.getElementById('photo-modal').classList.add('hidden');
        }

        window.onload = syncData;
    </script>
</body>
</html>
